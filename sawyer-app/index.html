      const delS=document.createElement('button');delS.style.cssText='background:none;border:none;color:var(--p-mut);font-size:15px;padding:3px;cursor:pointer;flex-shrink:0';delS.textContent='✕';
      delS.onclick=()=>{ST.ptaskForm.steps=ST.ptaskForm.steps.filter((_,j)=>j!==si);renderStepsInPlace();};
      sr.appendChild(num);sr.appendChild(reCol);sr.appendChild(stepIn);sr.appendChild(delS);stepsContainer.appendChild(sr);
    });
    const addStep=document.createElement('button');addStep.style.cssText='background:var(--p-bg);border:1px dashed var(--p-bor);border-radius:8px;padding:8px;font-size:13px;color:var(--p-sub);font-weight:600;width:100%;cursor:pointer';
    addStep.textContent='+ Add step';addStep.onclick=()=>{ST.ptaskForm.steps=[...ST.ptaskForm.steps,''];renderStepsInPlace();};
    stepsContainer.appendChild(addStep);
  }
  renderStepsInPlace();
  div.appendChild(stepsContainer);

  // ── Save / Cancel ─────────────────────────────────────────────────────────
  const btns=document.createElement('div');btns.style.cssText='display:flex;gap:8px';
  const addBtn=document.createElement('button');addBtn.className='p-btn-primary';addBtn.textContent='Add Task';
  addBtn.onclick=()=>{
    const steps=ST.ptaskForm.steps.filter(s=>s.trim());
    if(!ST.ptaskForm.title.trim()||steps.length===0){
      addBtn.style.animation='shake .4s ease';setTimeout(()=>addBtn.style.animation='',500);return;
    }
    const base={id:'ct_'+Date.now(),title:ST.ptaskForm.title,emoji:ST.ptaskForm.emoji,colorKey:ST.ptaskForm.colorKey,estimatedMinutes:Number(ST.ptaskForm.estimatedMinutes),starMultiplier:ST.ptaskForm.starMultiplier||1,isAnchor:!!ST.ptaskForm.isAnchor,steps};
    if(isRec)ST.recurring.push({...base,repeat:ST.ptaskForm.repeat,customDays:ST.ptaskForm.customDays||[]});
    else ST.oneoff.push({...base,date:ST.ptaskForm.date});
    ST.ptaskForm={title:'',emoji:'📝',colorKey:'sky',estimatedMinutes:15,repeat:'weekdays',customDays:[],steps:[''],date:DATE_ISO,starMultiplier:1,isAnchor:false};
    ST.ptaskAdding=false;saveS();renderParentContent();
  };
  const cancelBtn=document.createElement('button');cancelBtn.className='p-btn-secondary';cancelBtn.textContent='Cancel';
  cancelBtn.onclick=()=>{ST.ptaskAdding=false;renderParentContent();};
  btns.appendChild(addBtn);btns.appendChild(cancelBtn);div.appendChild(btns);
  return div;
}

function buildReminderCard(r){

  // Save emoji without re-rendering (kills focus)
  emojiIn.oninput=e=>{ST.reminders=ST.reminders.map(x=>x.id!==r.id?x:{...x,emoji:e.target.value});saveS();};
  const textIn=document.createElement('input');textIn.value=r.text;textIn.style.cssText='flex:1;background:transparent;border:none;font-size:14px;font-weight:800;color:var(--p-text);outline:none;font-family:Nunito,sans-serif;padding:0;min-width:0';
  textIn.oninput=e=>{ST.reminders=ST.reminders.map(x=>x.id!==r.id?x:{...x,text:e.target.value});saveS();};
  const delBtn=document.createElement('button');delBtn.style.cssText='background:var(--p-redbg);border:1px solid rgba(220,38,38,.27);border-radius:8px;padding:5px 9px;font-size:12px;color:var(--p-red);font-weight:600;flex-shrink:0';
  delBtn.textContent='✕';delBtn.onclick=()=>{ST.reminders=ST.reminders.filter(x=>x.id!==r.id);saveS();renderParentContent();};
  row1.appendChild(emojiIn);row1.appendChild(textIn);row1.appendChild(delBtn);div.appendChild(row1);
  // Date row
  const dateDiv=document.createElement('div');
  dateDiv.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Date</div>';
  const dateIn=document.createElement('input');dateIn.type='date';dateIn.value=r.date||'';dateIn.style.cssText='width:100%;background:var(--p-bg);border:1px solid var(--p-bor);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--p-text);outline:none;box-sizing:border-box';
  dateIn.oninput=e=>{ST.reminders=ST.reminders.map(x=>x.id!==r.id?x:{...x,date:e.target.value});saveS();};
  dateIn.onchange=e=>{renderHeader();};
  dateDiv.appendChild(dateIn);div.appendChild(dateDiv);
  // Time row (toggled)
  if(!showTime){
    const togBtn=document.createElement('button');
    togBtn.style.cssText='background:transparent;border:1px dashed var(--p-bor);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--p-mut);font-weight:600;text-align:left;width:100%';
    togBtn.textContent='+ Add a time (optional)';
    togBtn.onclick=()=>{ST.reminders=ST.reminders.map(x=>x.id!==r.id?x:{...x,_showTime:true});renderParentContent();};
    div.appendChild(togBtn);
  } else {
    const timeDiv=document.createElement('div');
    timeDiv.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Time <span style="font-weight:400;text-transform:none;letter-spacing:0">(e.g. 8:30 am)</span></div>';
    const timeIn=document.createElement('input');
    timeIn.type='text';timeIn.inputMode='text';
    timeIn.value=r.time?fmt12(r.time):r._timeDisplay||'';
    timeIn.placeholder='e.g. 8:30 am';
    timeIn.style.cssText='width:100%;background:var(--p-bg);border:1px solid var(--p-bor);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--p-text);outline:none;box-sizing:border-box;font-family:Nunito,sans-serif;font-weight:700';
    // Save raw display value on every keystroke (no re-render)

      saveS();renderHeader();
    };

  }
  return div;
}

  info.textContent='These appear on Sawyer\'s screen when he finishes all tasks — free rewards just for finishing.';wrap.appendChild(info);
  const DAILY_EMOJIS=['🍕','📺','🎮','🧁','🎬','🛌','🍦','🏖️','🎲','🏆','🎵','🍔','🍿','⚽','🎨','💰','🎁','🎉','🌟','🎠'];
  DAYS.forEach(day=>{
    const r=(ST.dailyRewards||DEFAULT_DAILY_REWARDS)[day]||{emoji:'🎉',text:'Great work today!'};

    const div=document.createElement('div');div.className='daily-reward-card';
    div.innerHTML=`<div class="daily-reward-day">${FULL_DAYS[day]}</div>`;

    ti.onchange=saveText;ti.onblur=saveText;
    row.appendChild(emojiBtn);row.appendChild(ti);div.appendChild(row);
    // Emoji picker grid (shown when tapped)
    if(isPickingEmoji){
      const grid=document.createElement('div');grid.style.cssText='display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:var(--p-bg);border-radius:10px;margin-top:4px';

        eb.textContent=em;
        eb.onclick=()=>{
          ST.dailyRewards={...ST.dailyRewards,[day]:{...r,emoji:em}};
          ST._editingDailyEmoji=null;saveS();renderParentContent();
        };
        grid.appendChild(eb);
      });
      // Custom emoji text input
      const customIn=document.createElement('input');customIn.placeholder='✏️';
      customIn.style.cssText='width:42px;height:34px;background:#fff;border:1px solid var(--p-bor);border-radius:7px;font-size:16px;text-align:center;outline:none;padding:0 4px';
      customIn.onchange=e=>{
        if(e.target.value.trim()){
          ST.dailyRewards={...ST.dailyRewards,[day]:{...r,emoji:e.target.value.trim()}};

// ─── PIN LOGIC ────────────────────────────────────────────────────────────────
function renderPin(){
  const dots=el('pin-dots');dots.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');d.className='pin-dot'+(ST.pinInput.length>i?' filled':'');dots.appendChild(d);
  }
  if(el('pin-overlay').classList.contains('hidden'))return;
  const pad=el('numpad');pad.innerHTML='';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(d=>{
    const b=document.createElement('button');
    if(d===''){b.className='num-btn empty';b.style.cssText='background:transparent;border:none';}
    else{b.className='num-btn';b.onclick=()=>pinPress(d);}
    b.textContent=d;pad.appendChild(b);
  });
}

function pinPress(d){
  if(d==='⌫'){ST.pinInput=ST.pinInput.slice(0,-1);renderPin();return;}
  if(ST.pinInput.length>=4)return;
  const nxt=ST.pinInput+String(d);ST.pinInput=nxt;renderPin();
  if(nxt.length===4){
    if(nxt===ST.pin){setTimeout(()=>{hide('pin-overlay');ST.pinInput='';ST.parentMode=true;show('parent-overlay');render();},200);}
    else{
      el('pin-sheet').style.animation='shake .4s ease';
      setTimeout(()=>{ST.pinInput='';el('pin-sheet').style.animation='';renderPin();},600);
    }
  }
}

function showPin(){hide('parent-overlay');show('pin-overlay');ST.pinInput='';renderPin();}
function closePin(){hide('pin-overlay');ST.pinInput='';}
function closeParent(){hide('parent-overlay');ST.parentMode=false;render();}

function doChangePin(){
  const cur=el('pin-current')?.value;const nw=el('pin-new')?.value;const conf=el('pin-confirm')?.value;
  const msgEl=el('pin-msg');if(!msgEl)return;
  function showMsg(txt,ok){msgEl.style.cssText=`background:${ok?'var(--p-greenbg)':'var(--p-redbg)'};border:1px solid ${ok?'rgba(22,163,74,.27)':'rgba(220,38,38,.27)'};border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;color:${ok?'var(--p-green)':'var(--p-red)'}`;msgEl.textContent=txt;msgEl.classList.remove('hidden');if(ok)setTimeout(()=>msgEl.classList.add('hidden'),3000);}
  if(cur!==ST.pin){showMsg('Current PIN is incorrect',false);return;}
  if(!/^\d{4}$/.test(nw)){showMsg('New PIN must be exactly 4 digits',false);return;}
  if(nw!==conf){showMsg("New PINs don't match",false);return;}
  ST.pin=nw;saveS();showMsg('PIN updated successfully ✓',true);render();
}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
function setMainTab(tab){
  ST.mainTab=tab;render();
}

function handleCheckin(mood){
  ST.mood=mood;
  if(mood==='rough'||mood==='tired'){ST.phase='breathe';saveS();render();startBreathe();}
  else{ST.phase='pick';saveS();render();}
}
function handleBreatheDone(){ST.phase='pick';saveS();render();}
function handleReady(){ST.phase='do';saveS();startTaskTimer();render();}
function handlePickOther(task){
  const cur=ST.taskOrder.indexOf(task.id);
  const no=[...ST.taskOrder];no.splice(cur,1);no.splice(ST.taskIdx,0,task.id);
  ST.taskOrder=no;ST.phase='do';ST.showOthers=false;saveS();startTaskTimer();render();
}

function startTaskTimer(){
  if(ST.taskTimerIv)clearInterval(ST.taskTimerIv);
  ST.taskTimerSecs=0;
  ST.taskTimerIv=setInterval(()=>{ST.taskTimerSecs++;if(ST.phase==='do')renderDo();},1000);
}
function stopTaskTimer(){if(ST.taskTimerIv)clearInterval(ST.taskTimerIv);}

function toggleStep(taskId,idx){
  const done=ST.stepsDone[taskId]||[];
  const skipped=(ST.stepsSkipped||{})[taskId]||[];
  if(skipped.includes(idx))return;
  const nd=done.includes(idx)?done.filter(i=>i!==idx):[...done,idx];
  ST.stepsDone={...ST.stepsDone,[taskId]:nd};
  if(!done.includes(idx)){
    // Step was just checked — award star
    const task=getTodayTasks().find(t=>t.id===taskId);
    const mult=task?.starMultiplier||1;
    ST.stars+=mult;saveS();showStarPop();
    // Check if all steps are accounted for (done or skipped)
    if(task&&new Set([...nd,...skipped]).size>=task.steps.length){
      setTimeout(handleTaskComplete,400);return;
    }
  }
  saveS();
  renderDo();
}

function skipStep(taskId,idx){
  const done=ST.stepsDone[taskId]||[];
  if(done.includes(idx))return;
  const skipped=(ST.stepsSkipped||{})[taskId]||[];
  const newSkipped=[...skipped,idx];
  ST.stepsSkipped={...ST.stepsSkipped,[taskId]:newSkipped};
  const task=getTodayTasks().find(t=>t.id===taskId);
  if(task&&new Set([...done,...newSkipped]).size>=task.steps.length){saveS();setTimeout(handleTaskComplete,400);return;}
  saveS();
  renderDo();
}

function handleStuck(action){
  const task=getCurrentTask();if(!task)return;
  if(action==='breathe'){ST.phase='breathe';stopTaskTimer();saveS();render();startBreathe();return;}
  if(action==='skip'){
    const done=ST.stepsDone[task.id]||[];
    const skipped=(ST.stepsSkipped||{})[task.id]||[];
    const first=task.steps.findIndex((_,i)=>!done.includes(i)&&!skipped.includes(i));
    if(first===-1){handleTaskComplete();return;}
    const ns=[...skipped,first];ST.stepsSkipped={...ST.stepsSkipped,[task.id]:ns};
    if(new Set([...done,...ns]).size>=task.steps.length){saveS();handleTaskComplete();return;}
    saveS();renderDo();
  }
}

function toggleStuck(){ST.showStuck=!ST.showStuck;renderDo();}

function handleTaskComplete(){
  stopTaskTimer();ST.showStuck=false;
  saveS();fireConfetti();ST.phase='taskdone';render();
}

function handleNext(override){
  if(override==='alldone'){ST.phase='alldone';ST.showReview=false;saveS();render();return;}
  const n=ST.taskIdx+1;
  if(n>=getAllOrdered().length){ST.phase='alldone';ST.showReview=false;}
  else{ST.taskIdx=n;ST.phase='pick';ST.showOthers=false;}
  saveS();render();
}

function handleReset(){
  ST.phase='checkin';ST.mood=null;ST.taskIdx=0;ST.showOthers=false;ST.showReview=false;
  ST.taskOrder=getTodayTasks().map(t=>t.id);
  ST.stepsDone={};ST.stepsSkipped={};stopTaskTimer();ST.taskTimerSecs=0;
  saveS();render();
}

function handleRequest(r){
  if(ST.stars<r.cost)return;
  ST.pendingReqs.push({id:'req_'+Date.now(),rewardId:r.id,emoji:r.emoji,title:r.title,cost:r.cost,status:'pending',date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})});
  saveS();render();
}

function handleUnskipStep(taskId,idx){
  ST.stepsSkipped={...ST.stepsSkipped,[taskId]:(ST.stepsSkipped[taskId]||[]).filter(i=>i!==idx)};
  const cur=ST.stepsDone[taskId]||[];
  if(!cur.includes(idx)){
    const task=getTodayTasks().find(t=>t.id===taskId);
    const mult=task?.starMultiplier||1;
    ST.stars+=mult;showStarPop();
    ST.stepsDone={...ST.stepsDone,[taskId]:[...cur,idx]};
  }
  saveS();
  render();
  if(anchorsDone()){fireConfetti();}
}

function adjustStars(delta){ST.stars=Math.max(0,ST.stars+delta);saveS();render();}
function applyCustomStars(){const v=parseInt(el('custom-stars-in')?.value||'');if(!isNaN(v)&&v!==0){ST.stars=Math.max(0,ST.stars+v);saveS();render();}}

// ─── EFFECTS ──────────────────────────────────────────────────────────────────
function showStarPop(){
  const sp=el('starpop');sp.style.display='flex';sp.classList.remove('hidden');
  sp.style.animation='spop .7s ease forwards';
  setTimeout(()=>{sp.style.display='none';},900);
}

function fireConfetti(){
  const wrap=el('confetti-wrap');wrap.innerHTML='';wrap.classList.remove('hidden');
  const colors=['#2563EB','#3B82F6','#22C55E','#F59E0B','#A78BFA','#F472B6'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    const size=6+Math.random()*8;const round=i%3===0;
    p.style.cssText=`left:${3+Math.random()*94}%;width:${size}px;height:${size}px;background:${colors[i%6]};border-radius:${round?'50%':'3px'};animation-delay:${Math.random()*.5}s`;
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';wrap.classList.add('hidden');},2000);
}

// CSS shake for pin
const style=document.createElement('style');
style.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}';
document.head.appendChild(style);

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Render a skeleton immediately so the UI is never blank while Firebase loads
render();
// Then connect Firebase/localStorage in background — will re-render when data arrives
initFirebase();
// Safety net: if Firebase never responds in 6s, hide loader and run with defaults
setTimeout(()=>{ if(!ST._loaded){ ST._db=ST._db||'local'; hideLoader(); checkWeeklyReset(); if(!ST.taskOrder?.length){ST.taskOrder=getTasksForDay(ST.recurring,ST.oneoff,TODAY,DATE_ISO).map(t=>t.id);} ST._loaded=true; render(); } },6000);

</script>
