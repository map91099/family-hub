<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Sawyer's Day</title>

<!-- PWA: installs as app on iPhone/Android home screen -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Sawyer's Day"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#EEF5FF"/>
<meta name="description" content="Sawyer's daily task coach"/>

<!-- App icon — uses emoji as favicon, works on all devices -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌅</text></svg>"/>

<!-- Firebase SDKs (v9 compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:0;height:0}
body{font-family:'Nunito',sans-serif;background:#EEF5FF;color:#162033}
button{font-family:'Nunito',sans-serif;cursor:pointer}
input,textarea,select{font-family:'Nunito',sans-serif}

/* Sawyer palette */
:root{
  --s-bg:#EEF5FF;--s-bgd:#E3EFFE;--s-card:#FFF;--s-bor:#CDDFF5;
  --s-text:#162033;--s-sub:#3D5A7A;--s-mut:#7A9BBD;
  --s-blue:#2563EB;--s-bluel:#DBEAFE;--s-bluep:#F0F6FF;
  --s-green:#16A34A;--s-greenm:#22C55E;--s-greenbg:#DCFCE7;--s-greenp:#F0FDF4;
  --s-amber:#D97706;--s-amberm:#F59E0B;--s-amberbg:#FEF3C7;
  --s-red:#DC2626;--s-redbg:#FEE2E2;
  /* Parent palette */
  --p-bg:#F4F6F5;--p-bgd:#EAEEEC;--p-card:#FFF;--p-bor:#D4DDD8;
  --p-text:#1A2820;--p-sub:#3D5249;--p-mut:#7A9488;
  --p-teal:#0D9488;--p-teall:#CCFBF1;
  --p-green:#16A34A;--p-greenbg:#DCFCE7;
  --p-amber:#D97706;--p-amberbg:#FEF3C7;
  --p-red:#DC2626;--p-redbg:#FEE2E2;
}

#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--s-bg)}
.screen{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.hidden{display:none!important}

/* Header */
#header{background:#fff;border-bottom:1px solid var(--s-bor);padding:13px 20px 0;position:sticky;top:0;z-index:50}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tabs{display:flex}
.tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--s-mut);border-bottom:2.5px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--s-blue);font-weight:800;border-bottom-color:var(--s-blue)}
.star-badge{background:var(--s-amberbg);border:1px solid rgba(245,158,11,.2);border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:5px;font-size:15px;font-weight:900;color:var(--s-amber)}
.parent-btn-wrap{position:relative;display:inline-flex}
.parent-btn{background:none;border:1px solid var(--s-bor);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--s-mut);transition:all .2s}
.parent-btn.pending{background:var(--s-amberbg);border-color:var(--s-amberm);color:var(--s-amber)}
.notif-dot{position:absolute;top:-6px;right:-6px;background:var(--s-red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--s-bg);animation:pulse 1.8s ease infinite}
.reminder-strip{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.reminder-chip{display:flex;align-items:center;gap:8px;background:var(--s-amberbg);border:1px solid rgba(245,158,11,.27);border-radius:10px;padding:7px 12px}
.reminder-chip .rtxt{font-size:13px;font-weight:800;color:var(--s-amber);flex:1;min-width:0}
.reminder-chip .rtime{font-size:12px;font-weight:700;color:var(--s-amber);opacity:.8;flex-shrink:0}

/* Check-in */
#checkin-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;gap:24px;text-align:center}
.mood-grid{display:flex;flex-wrap:wrap;gap:10px;width:100%;max-width:320px;justify-content:center}
.mood-btn{background:#fff;border:1.5px solid var(--s-bor);border-radius:16px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s;width:calc(50% - 5px);min-width:120px}
.mood-btn:hover{border-color:var(--s-blue);background:var(--s-bluep)}
.reminder-banners{width:100%;max-width:360px;display:flex;flex-direction:column;gap:8px}
.reminder-banner{background:var(--s-amberbg);border:1.5px solid rgba(245,158,11,.33);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;text-align:left}

/* Breathing */
#breathe-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:32px;text-align:center}
#breath-circle{border-radius:50%;background:var(--s-bluel);border:3px solid var(--s-blue);display:flex;align-items:center;justify-content:center;transition:all 1s ease;font-size:32px}
.breath-dots{display:flex;gap:8px}
.breath-dot{width:10px;height:10px;border-radius:50%;background:var(--s-bor);transition:background .3s}
.breath-dot.done{background:var(--s-blue)}

/* Task pick */
#pick-screen{flex:1;display:flex;flex-direction:column;padding:24px 20px;gap:20px}
.task-card{border:2px solid;border-radius:20px;padding:28px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.other-tasks{display:flex;flex-direction:column;gap:8px}
.other-task-btn{border:1.5px solid;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left}

/* Do task */
#do-screen{flex:1;display:flex;flex-direction:column}
#do-header{border-bottom:1.5px solid;padding:18px 20px 14px}
#do-header .task-meta{display:flex;align-items:center;gap:12px;margin-bottom:10px}
#do-steps{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.step-row{display:flex;gap:8px;align-items:stretch}
.step-btn{flex:1;border:1.5px solid var(--s-bor);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;text-align:left;transition:all .2s}
.step-btn.done{background:var(--s-greenp);border-color:var(--s-greenm);opacity:.8}
.step-btn.skipped{background:#f8f8f8;border-color:var(--s-bor);opacity:.5;cursor:default}
.step-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--s-bor);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:#fff}
.step-check.done{background:var(--s-green);border-color:var(--s-green)}
.step-check.skipped{background:#ddd;border-color:#bbb}
.skip-step-btn{background:var(--s-bgd);border:1.5px solid var(--s-bor);border-radius:12px;padding:0 12px;font-size:16px;color:var(--s-mut);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.skip-step-btn:hover{border-color:var(--s-red);color:var(--s-red)}
#stuck-area{padding:12px 20px 20px;border-top:1px solid var(--s-bor)}
.stuck-options{display:flex;flex-direction:column;gap:8px}
.stuck-opt{background:var(--s-bgd);border:1.5px solid var(--s-bor);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--s-sub)}

/* Task done */
#taskdone-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px;text-align:center}

/* All done */
#alldone-screen{flex:1;display:flex;flex-direction:column;overflow-y:auto}
#alldone-inner{display:flex;flex-direction:column;align-items:center;padding:28px 24px;gap:18px;text-align:center}
.reward-card{border:2px solid;border-radius:20px;padding:20px;width:100%;max-width:340px;transition:all .4s}
.reward-card.unlocked{background:var(--s-greenp);border-color:var(--s-greenm)}
.reward-card.locked{background:var(--s-bgd);border-color:var(--s-bor);opacity:.7}
.review-section{width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px}
.review-task{background:#fff;border:1px solid var(--s-bor);border-radius:14px;overflow:hidden}
.review-task-header{padding:10px 14px;display:flex;align-items:center;gap:10px}
.review-step-btn{background:var(--s-bgd);border:1.5px solid var(--s-bor);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;text-align:left;width:100%;margin-bottom:8px;cursor:pointer;font-family:"Nunito",sans-serif;transition:all .15s}
.review-step-btn:hover,.review-step-btn:active{background:var(--s-greenbg);border-color:var(--s-greenm)}

/* Star store */
#tasks-screen{padding:16px 16px 80px;display:flex;flex-direction:column;gap:12px}
#store-screen{padding:20px 20px 80px;display:flex;flex-direction:column;gap:16px}
.reward-item{background:#fff;border:1.5px solid var(--s-bor);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.progress-bar-wrap{margin-top:6px;background:var(--s-bor);border-radius:4px;height:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .4s}

/* Parent mode */
#parent-overlay{position:fixed;inset:0;background:var(--p-bg);z-index:100;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden}
#parent-header{background:#fff;border-bottom:1px solid var(--p-bor);padding:16px 20px 0;flex-shrink:0}
#parent-tabs{display:flex;overflow-x:auto;scrollbar-width:none}
#parent-tabs::-webkit-scrollbar{display:none}
.ptab-btn{flex-shrink:0;padding:10px 12px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--p-mut);border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap}
.ptab-btn.active{color:var(--p-teal);font-weight:800;border-bottom-color:var(--p-teal)}
.ptab-btn.urgent{color:var(--p-amber);font-weight:800;border-bottom-color:var(--p-amber)}
#parent-content{flex:1;overflow-y:auto;color:var(--p-text);-webkit-overflow-scrolling:touch;min-height:0}
.p-section{padding:20px 20px 80px;display:flex;flex-direction:column;gap:14px}
.p-card{background:#fff;border:1px solid var(--p-bor);border-radius:14px;padding:14px 16px}
.p-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.p-progress{background:var(--p-bor);border-radius:6px;height:8px;overflow:hidden}
.p-bar{height:100%;border-radius:6px;transition:width .4s;background:var(--p-teal)}
.p-input{background:var(--p-bg);border:1px solid var(--p-bor);border-radius:8px;padding:8px 12px;font-size:14px;font-weight:700;color:var(--p-text);outline:none;font-family:'Nunito',sans-serif;width:100%;box-sizing:border-box}
.p-btn-primary{background:var(--p-teal);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:800;flex:1}
.p-btn-secondary{background:var(--p-bg);border:1px solid var(--p-bor);border-radius:10px;padding:11px 16px;font-size:14px;color:var(--p-sub);font-weight:600}
.subtab-toggle{display:flex;margin-bottom:16px;border-radius:12px;overflow:hidden;border:1px solid var(--p-bor)}
.subtab-btn{flex:1;padding:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.subtab-btn.active{background:var(--p-teal);color:#fff;font-weight:800}
.subtab-btn:not(.active){background:#fff;color:var(--p-sub)}
.multiplier-btns{display:flex;gap:5px}
.mult-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--p-bor);background:transparent;color:var(--p-sub);font-size:13px;font-weight:800;cursor:pointer}
.mult-btn.active{border-color:var(--p-teal);background:var(--p-teall);color:var(--p-teal)}
.anchor-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--p-bor);background:transparent;color:var(--p-sub);font-size:13px;font-weight:800;cursor:pointer}
.anchor-btn.active{border-color:var(--p-green);background:var(--p-greenbg);color:var(--p-green)}
.day-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--p-bor);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--p-sub)}
.day-btn.active{background:var(--p-teal);color:#fff;font-weight:800;border-color:var(--p-teal)}
.repeat-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--p-bor);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--p-sub)}
.repeat-btn.active{border-color:var(--p-teal);background:var(--p-teall);color:var(--p-teal);font-weight:800}
.approve-card{background:#fff;border:1px solid rgba(245,158,11,.33);border-radius:16px;padding:18px;margin-bottom:10px}
.history-item{background:#fff;border:1px solid var(--p-bor);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:8px;opacity:.65}
.status-pill{font-size:11px;font-weight:800;border-radius:20px;padding:3px 10px}
.status-pill.approved{color:var(--p-green);background:var(--p-greenbg)}
.status-pill.declined{color:var(--p-red);background:var(--p-redbg)}
.daily-reward-card{background:#fff;border:1px solid var(--p-bor);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.daily-reward-day{font-size:12px;font-weight:800;color:var(--p-teal);text-transform:uppercase;letter-spacing:.07em}

/* PIN */
#pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;z-index:200}
#pin-sheet{background:#fff;border-radius:24px 24px 0 0;border:1px solid var(--p-bor);padding:32px 24px 44px;width:100%;max-width:480px;box-shadow:0 -12px 60px rgba(0,0,0,.15)}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:var(--p-bor);transition:background .15s}
.pin-dot.filled{background:var(--p-teal)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto 20px}
.num-btn{background:var(--p-bg);border:1px solid var(--p-bor);border-radius:14px;padding:18px;font-size:20px;font-weight:800;color:var(--p-text)}
.num-btn.empty{background:transparent;border-color:transparent;cursor:default}

/* Confetti */
#confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.confetti-piece{position:absolute;top:0;animation:cf 1.5s ease-in forwards}
@keyframes cf{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(900deg);opacity:0}}

/* Star pop */
#starpop{position:fixed;top:30%;left:50%;transform:translateX(-50%);z-index:500;pointer-events:none;background:var(--s-amberbg);border:2px solid var(--s-amberm);border-radius:40px;padding:10px 22px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 24px rgba(245,158,11,.33);animation:spop .7s ease forwards}
@keyframes spop{0%{transform:translateX(-50%) scale(.5);opacity:0}40%{transform:translateX(-50%) scale(1.3);opacity:1}100%{transform:translateX(-50%) scale(1) translateY(-30px);opacity:0}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.8}}

/* Shared util */
.btn-blue{background:var(--s-blue);color:#fff;border:none;border-radius:16px;padding:18px;font-size:18px;font-weight:900;box-shadow:0 4px 20px rgba(37,99,235,.27)}
.btn-outline{background:transparent;border:1.5px solid var(--s-bor);border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;color:var(--s-mut)}
.badge-green{font-size:10px;font-weight:800;color:var(--s-green);background:var(--s-greenbg);border-radius:10px;padding:2px 7px}
.badge-amber{font-size:10px;font-weight:800;color:var(--s-amber);background:var(--s-amberbg);border-radius:10px;padding:2px 7px}
.label-upper{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--s-mut)}
</style>

<style>
/* Offline bar */
#offline-bar{position:fixed;top:0;left:0;right:0;background:#D97706;color:#fff;font-size:12px;font-weight:700;text-align:center;padding:8px 16px;z-index:9998;font-family:'Nunito',sans-serif}

</style>


</head>
<body>

<!-- Loading overlay — hidden once Firebase/localStorage data is ready -->
<div id="app-loader" style="position:fixed;inset:0;background:#EEF5FF;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:'Nunito',sans-serif">
  <div style="font-size:48px">🌅</div>
  <div style="font-size:18px;font-weight:800;color:#3D5A7A">Loading Sawyer's Day…</div>
  <div style="width:48px;height:4px;background:#CDDFF5;border-radius:2px;overflow:hidden"><div style="width:100%;height:100%;background:#2563EB;border-radius:2px;animation:ldbar 1.2s ease-in-out infinite"></div></div>
</div>
<style>@keyframes ldbar{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}</style>

<!-- Offline indicator -->
<div id="offline-bar" class="hidden">You're offline — changes will sync when reconnected</div>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="header-row">
      <div>
        <div class="label-upper" id="hdr-day"></div>
        <div style="font-size:19px;font-weight:900;line-height:1.1" id="hdr-title">Sawyer's Day</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="star-badge hidden" id="star-badge">⭐ <span id="star-count">0</span></div>
        <div class="parent-btn-wrap">
          <button class="parent-btn" id="parent-btn" onclick="showPin()">🔒 Parent</button>
          <span class="notif-dot hidden" id="notif-dot">0</span>
        </div>
      </div>
    </div>
    <div class="reminder-strip hidden" id="reminder-strip"></div>
    <div class="tabs" id="main-tabs">
      <button class="tab-btn active" onclick="setMainTab('today')">Today</button>
      <button class="tab-btn" id="tasks-tab-btn" onclick="setMainTab('tasks')">My Tasks</button>
      <button class="tab-btn" id="store-tab-btn" onclick="setMainTab('store')">⭐ Store</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="screen" id="main-content">

    <!-- CHECK-IN -->
    <div id="checkin-screen">
      <div class="reminder-banners hidden" id="checkin-reminders"></div>
      <div style="font-size:52px">👋</div>
      <div>
        <div style="font-size:26px;font-weight:900;line-height:1.1;margin-bottom:8px">Hey Sawyer!</div>
        <div style="font-size:16px;color:var(--s-sub);font-weight:600;line-height:1.4">How are you feeling right now?</div>
      </div>
      <div class="mood-grid" id="mood-grid"></div>
    </div>

    <!-- BREATHE -->
    <div id="breathe-screen" class="hidden" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:32px;text-align:center">
      <div style="font-size:22px;font-weight:900">Let's take 3 breaths first</div>
      <div id="breath-circle" style="width:110px;height:110px">🌬️</div>
      <div id="breath-label" style="font-size:20px;font-weight:800;color:var(--s-blue)">Breathe in…</div>
      <div class="breath-dots" id="breath-dots"></div>
      <button class="btn-blue hidden" id="breathe-done-btn" onclick="handleBreatheDone()" style="padding:16px 40px;font-size:16px">Ready to start →</button>
    </div>

    <!-- TASK PICK -->
    <div id="pick-screen" class="hidden"></div>

    <!-- DO TASK -->
    <div id="do-screen" class="hidden">
      <div id="do-header"></div>
      <div id="do-steps"></div>
      <div id="stuck-area">
        <button class="btn-outline" style="width:100%;padding:12px;font-size:14px;font-weight:700;color:var(--s-mut)" onclick="toggleStuck()">😰 I'm stuck</button>
        <div class="stuck-options hidden" id="stuck-opts"></div>
      </div>
    </div>

    <!-- TASK DONE -->
    <div id="taskdone-screen" class="hidden"></div>

    <!-- ALL DONE -->
    <div id="alldone-screen" class="hidden">
      <div id="alldone-inner"></div>
    </div>

    <!-- MY TASKS -->
    <div id="tasks-screen" class="hidden"></div>

    <!-- STAR STORE -->
    <div id="store-screen" class="hidden"></div>

  </div>
</div>

<!-- CONFETTI -->
<div id="confetti-wrap" class="hidden"></div>

<!-- STAR POP -->
<div id="starpop" class="hidden" style="display:none"></div>

<!-- PIN OVERLAY -->

  <div id="pin-sheet">

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function todayKey(){return DAYS[new Date().getDay()===0?6:new Date().getDay()-1];}
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getWeekKey(){const d=new Date(),dow=d.getDay(),diff=d.getDate()-dow+(dow===0?-6:1),m=new Date(new Date().setDate(new Date().getDate()-dow+(dow===0?-6:1)));return`${m.getFullYear()}-${m.getMonth()+1}-${m.getDate()}`;}
function fmt12(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'pm':'am'}`;}
// Parse flexible time strings like "8:30 am", "830am", "14:00", "2pm", "9" → "HH:MM" 24h, or '' if unparseable
function parseTimeInput(raw){
  if(!raw||!raw.trim())return'';
  const s=raw.trim().toLowerCase().replace(/\s+/g,'');
  const pm=s.includes('pm');const am=s.includes('am');
  const digits=s.replace(/[^0-9:]/g,'');
  let h,m=0;
  if(digits.includes(':')){const[a,b]=digits.split(':');h=parseInt(a);m=parseInt(b)||0;}
  else if(digits.length<=2){h=parseInt(digits);}
  else if(digits.length===3){h=parseInt(digits[0]);m=parseInt(digits.slice(1));}
  else if(digits.length===4){h=parseInt(digits.slice(0,2));m=parseInt(digits.slice(2));}
  else return'';
  if(isNaN(h)||isNaN(m))return'';
  if(pm&&h<12)h+=12;
  if(am&&h===12)h=0;
  if(h<0||h>23||m<0||m>59)return'';
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function fmtSecs(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function getTasksForDay(recurring,oneoff,dayKey,dateISO){
  const fromR=recurring.filter(r=>{
    if(r.repeat==='daily')return true;
    if(r.repeat==='weekdays')return WEEKDAYS.includes(dayKey);
    if(r.repeat==='weekends')return WEEKEND.includes(dayKey);
    if(r.repeat==='custom')return(r.customDays||[]).includes(dayKey);
    return false;
  }).map(r=>({...r,source:'recurring'}));
  const fromO=oneoff.filter(o=>o.date===dateISO).map(o=>({...o,source:'oneoff'}));
  return [...fromR,...fromO];
}
function getRemindersForToday(reminders,dateISO){return reminders.filter(r=>r.date&&r.date.trim()===dateISO.trim());}
function h(tag,attrs,children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of(Array.isArray(children)?children:[children??''])){
    if(c===null||c===undefined)continue;
    el.append(typeof c==='string'||typeof c==='number'?String(c):c);
  }
  return el;
}
function el(id){return document.getElementById(id);}
function show(id){const e=el(id);if(e){e.classList.remove('hidden');}}
function hide(id){const e=el(id);if(e){e.classList.add('hidden');}}
function setHTML(id,html){const e=el(id);if(e)e.innerHTML=html;}
function append(id,child){const e=el(id);if(e)e.appendChild(child);}

const DATE_ISO = todayISO();

// ── Fields that are persisted to Firestore ───────────────────────────────────
function getPersistedFields() {
  return {
    recurring:    ST.recurring,
    oneoff:       ST.oneoff,
    reminders:    ST.reminders,
    stars:        ST.stars,
    rewards:      ST.rewards,
    dailyRewards: ST.dailyRewards,
    pendingReqs:  ST.pendingReqs,
    redemptions:  ST.redemptions,
    weekKey:      ST.weekKey,
    pin:          ST.pin,
    phase:        ST.phase,
    mood:         ST.mood,
    taskIdx:      ST.taskIdx,
    taskOrder:    ST.taskOrder,
    taskOrderDate:ST.taskOrderDate,
    stepsDone:    ST.stepsDone,
    stepsSkipped: ST.stepsSkipped,
  };
}

// ── Apply Firestore data to ST ───────────────────────────────────────────────
function applyRemoteData(data) {
  if (!data) return;
  const fields = [
    'recurring','oneoff','reminders','stars','rewards','dailyRewards',
    'pendingReqs','redemptions','weekKey','pin','phase','mood',
    'taskIdx','taskOrder','taskOrderDate','stepsDone','stepsSkipped',
  ];
  fields.forEach(f => {
    if (data[f] !== undefined) ST[f] = data[f];
  });
  // Fill in defaults for fields not yet in Firestore
  if (!ST.recurring?.length)    ST.recurring    = JSON.parse(JSON.stringify(DEFAULT_RECURRING));
  if (!ST.rewards?.length)      ST.rewards      = JSON.parse(JSON.stringify(DEFAULT_REWARDS));
  if (!ST.dailyRewards)         ST.dailyRewards = JSON.parse(JSON.stringify(DEFAULT_DAILY_REWARDS));
  if (!ST.pin)                  ST.pin          = '1234';
  if (!ST.weekKey)              ST.weekKey      = CUR_WEEK;
}

// ── Debounced save to Firestore ──────────────────────────────────────────────
let _saveTimer = null;
function saveS() {
  if (!ST._db) return; // not yet initialised — skip
  if (ST._db === 'local') {
    try {
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => {
        localStorage.setItem('sawyer_v12', JSON.stringify(getPersistedFields()));
      }, 200);
    } catch(e) {}
    return;
  }
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try {
      await firebase.firestore().collection(FAMILY_ID).doc('app').set(getPersistedFields());
    } catch(e) {
      console.warn('Save failed:', e.message);
      showOfflineBar('Changes will sync when back online');
    }
  }, 400); // 400ms debounce — avoid hammering on rapid taps
}

// ── Online/offline handling ───────────────────────────────────────────────────
window.addEventListener('online',  () => { ST._online = true;  hideOfflineBar(); });
window.addEventListener('offline', () => { ST._online = false; showOfflineBar("You're offline — changes will sync when reconnected"); });
function showOfflineBar(msg) {
  let bar = document.getElementById('offline-bar');
  if (!bar) return;
  bar.textContent = msg || "You're offline";
  bar.classList.remove('hidden');
}
function hideOfflineBar() {
  const bar = document.getElementById('offline-bar');
  if (bar) bar.classList.add('hidden');
}

// ── Weekly reset ──────────────────────────────────────────────────────────────
function checkWeeklyReset() {
  let dirty = false;
  if (CUR_WEEK !== ST.weekKey) {
    ST.stepsDone   = {};
    ST.stepsSkipped = {};
    ST.phase       = 'checkin';
    ST.taskIdx     = 0;
    ST.mood        = null;
    ST.weekKey     = CUR_WEEK;
    ST.taskOrder   = getTasksForDay(ST.recurring, ST.oneoff, TODAY, DATE_ISO).map(t => t.id);
    ST.taskOrderDate = DATE_ISO;
    dirty = true;
  }
  // New day reset
  if (!ST.taskOrderDate || ST.taskOrderDate !== DATE_ISO) {
    ST.phase       = 'checkin';
    ST.mood        = null;
    ST.taskIdx     = 0;
    ST.taskOrder   = getTasksForDay(ST.recurring, ST.oneoff, TODAY, DATE_ISO).map(t => t.id);
    ST.taskOrderDate = DATE_ISO;
    dirty = true;
  }
  if (dirty) saveS();
}

// ── Firebase initialisation & real-time listener ─────────────────────────────
function initFirebase() {
  // These values are replaced by you during setup — see SETUP.md
  const firebaseConfig = {
    apiKey:            "AIzaSyCsDmOYC4KMiNE3lyaBujTI0SPU9OCIlRE",
    authDomain:        "sawyer-app-ee238.firebaseapp.com",
    projectId:         "sawyer-app-ee238",
    storageBucket:     "sawyer-app-ee238.firebasestorage.app",
    messagingSenderId: "952257558311",
    appId:             "1:952257558311:web:79468c0e359d229d6a9b02",
  };

  // Detect if config has been filled in
  if (firebaseConfig.apiKey === 'REPLACE_API_KEY') {
    // Running without Firebase — fall back to localStorage for local testing
    console.warn('Firebase not configured. Using localStorage. See SETUP.md.');
    const SK = 'sawyer_v12';
    try {
      const raw = localStorage.getItem(SK);
      if (raw) applyRemoteData(JSON.parse(raw));
    } catch(e) {}
    ST._db = 'local'; // sentinel so saveS uses localStorage
    checkWeeklyReset();
    // Ensure taskOrder is populated
    if (!ST.taskOrder?.length) {
      ST.taskOrder = getTasksForDay(ST.recurring, ST.oneoff, TODAY, DATE_ISO).map(t => t.id);
    }
    ST._loaded = true;
    hideLoader();
    render();
    return;
  }

  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    ST._db = firebase.firestore();
    // Enable offline persistence (works even without network)
    ST._db.enablePersistence({ synchronizeTabs: true }).catch(() => {});

    const docRef = ST._db.collection(FAMILY_ID).doc('app');

    // Real-time listener — fires on every change from any device
    ST._unsubscribe = docRef.onSnapshot(
      (snap) => {
        if (snap.exists) {
          applyRemoteData(snap.data());
        }
        if (!ST._loaded) {
          // First load — run weekly/daily reset AFTER remote data applied
          checkWeeklyReset();
          // Build task order if not set
          if (!ST.taskOrder?.length) {
            ST.taskOrder = getTasksForDay(ST.recurring, ST.oneoff, TODAY, DATE_ISO).map(t => t.id);
          }
          ST._loaded = true;
          hideLoader();
          render();
        } else {
          // Remote update while app is open — re-render silently
          render();
        }
      },
      (err) => {
        console.error('Firestore listener error:', err);
        if (!ST._loaded) {
          // Try to load from local cache
          checkWeeklyReset();
          if (!ST.taskOrder?.length) {
            ST.taskOrder = getTasksForDay(ST.recurring, ST.oneoff, TODAY, DATE_ISO).map(t => t.id);
          }
          ST._loaded = true;
          hideLoader();
          render();
        }
        showOfflineBar('Sync issue — data may be out of date');
      }
    );
  } catch(e) {
    console.error('Firebase init failed:', e);
    // Fallback to localStorage if Firebase crashes entirely
    ST._db = 'local';
    try {
      const raw = localStorage.getItem('sawyer_v12');
      if (raw) applyRemoteData(JSON.parse(raw));
    } catch(_) {}
    checkWeeklyReset();
    if (!ST.taskOrder?.length) {
      ST.taskOrder = getTasksForDay(ST.recurring, ST.oneoff, TODAY, DATE_ISO).map(t => t.id);
    }
    ST._loaded = true;
    hideLoader();
    render();
  }
}

function hideLoader() {
  const loader = document.getElementById('app-loader');
  if (loader) loader.style.display = 'none';
}

// (local-mode save is handled inside the original saveS via ST._db === 'local' check)


function getTodayTasks(){return getTasksForDay(ST.recurring,ST.oneoff,TODAY,DATE_ISO);}
function getAllOrdered(){
  const all=getTodayTasks();
  const ordered=ST.taskOrder.map(id=>all.find(t=>t.id===id)).filter(Boolean);
  const missing=all.filter(t=>!ST.taskOrder.includes(t.id));
  return [...ordered,...missing];
}
function getCurrentTask(){return getAllOrdered()[ST.taskIdx]||null;}
function getStarsEarned(){const t=getCurrentTask();return t?(ST.stepsDone[t.id]||[]).length:0;}
function getPendingCount(){return ST.pendingReqs.filter(r=>r.status==='pending').length;}
function anchorsDone(){
  const todayTasks=getTodayTasks();
  const anchors=todayTasks.filter(t=>t.isAnchor);
  if(anchors.length===0){
    // No anchors today — reward unlocks when ALL tasks are finished
    if(todayTasks.length===0)return false;
    return todayTasks.every(t=>(ST.stepsDone[t.id]||[]).length>=t.steps.length);
  }
  return anchors.every(t=>(ST.stepsDone[t.id]||[]).length>=t.steps.length);
}
function getTodayReminders(){return getRemindersForToday(ST.reminders,DATE_ISO);}

// ─── RENDER ENGINE ────────────────────────────────────────────────────────────
function render(){
  renderHeader();
  renderMainContent();
  renderPin();
  renderParent();
}

function renderHeader(){
  el('hdr-day').textContent=FULL_DAYS[TODAY]||TODAY;
  const pending=getPendingCount();
  // Star badge
  if(ST.stars>0){show('star-badge');el('star-count').textContent=ST.stars;}else{hide('star-badge');}
  // Parent btn
  const pb=el('parent-btn');
  if(pending>0){pb.classList.add('pending');}else{pb.classList.remove('pending');}
  const nd=el('notif-dot');
  if(pending>0){show('notif-dot');nd.textContent=pending;}else{hide('notif-dot');}
  // Store tab label
  el('store-tab-btn').textContent=`⭐ Store${pending>0?` · ${pending}`:''}`;
  // Tabs active state
  document.querySelectorAll('#main-tabs .tab-btn').forEach((b,i)=>{
    const activeIdx = ST.mainTab==='today'?0:ST.mainTab==='tasks'?1:2;
    b.classList.toggle('active',i===activeIdx);
  });
  // Reminder strip
  const reminders=getTodayReminders();
  const strip=el('reminder-strip');
  if(reminders.length>0){
    show('reminder-strip');
    strip.innerHTML='';
    reminders.forEach(r=>{
      const chip=document.createElement('div');
      chip.className='reminder-chip';
      chip.innerHTML=`<span style="font-size:16px;flex-shrink:0">${r.emoji||'📅'}</span><span class="rtxt">${r.text}</span>${r.time?`<span class="rtime">${fmt12(r.time)}</span>`:''}`;
      strip.appendChild(chip);
    });
  } else {hide('reminder-strip');}
}

function renderMainContent(){
  // Show/hide tabs
  ['checkin-screen','breathe-screen','pick-screen','do-screen','taskdone-screen','alldone-screen','store-screen','tasks-screen'].forEach(id=>hide(id));
  if(ST.mainTab==='store'){show('store-screen');renderStore();return;}
  if(ST.mainTab==='tasks'){show('tasks-screen');renderTasksTab();return;}
  // Today tab
  switch(ST.phase){
    case 'checkin': show('checkin-screen'); renderCheckin(); break;
    case 'breathe': show('breathe-screen'); break;
    case 'pick':    show('pick-screen'); renderPick(); break;
    case 'do':      show('do-screen'); renderDo(); break;
    case 'taskdone':show('taskdone-screen'); renderTaskDone(); break;
    case 'alldone': show('alldone-screen'); renderAllDone(); break;
  }
}

// ── Check-in ──────────────────────────────────────────────────────────────────
function renderCheckin(){
  try {
    const reminders=getTodayReminders();
    const rb=el('checkin-reminders');
    if(rb){
      if(reminders.length>0){
        show('checkin-reminders');
        rb.innerHTML='';
        reminders.forEach(r=>{
          const div=document.createElement('div');
          div.className='reminder-banner';
          div.innerHTML=`<span style="font-size:22px;flex-shrink:0">${r.emoji||'📅'}</span><div><div style="font-size:13px;font-weight:800;color:var(--s-amber)">Today's reminder</div><div style="font-size:15px;font-weight:800">${r.text}</div>${r.time?`<div style="font-size:12px;color:var(--s-sub);font-weight:600;margin-top:1px">at ${fmt12(r.time)}</div>`:''}</div>`;
          rb.appendChild(div);
        });
      } else {hide('checkin-reminders');}
    }
    const grid=el('mood-grid');
    if(!grid){console.error('mood-grid element not found');return;}
    grid.innerHTML='';
    MOODS.forEach(m=>{
      const btn=document.createElement('button');
      btn.className='mood-btn';
      btn.innerHTML=`<span style="font-size:30px">${m.emoji}</span><span style="font-size:13px;font-weight:800;color:var(--s-sub)">${m.label}</span>`;
      btn.onclick=()=>handleCheckin(m.id);
      grid.appendChild(btn);
    });
  } catch(e) { console.error('renderCheckin failed:', e); }
}

// ── Breathe ───────────────────────────────────────────────────────────────────
function startBreathe(){
  if(ST.breathIv)clearInterval(ST.breathIv);
  ST.breathPhase='in';ST.breathCount=0;
  const seq=[];
  for(let i=0;i<3;i++)seq.push({p:'in',d:4},{p:'hold',d:2},{p:'out',d:4});
  let si=0,tc=0;
  const labels={in:'Breathe in…',hold:'Hold…',out:'Breathe out…',done:'Nice work 👍'};
  function updateUI(){
    const ph=ST.breathPhase;
    const circle=el('breath-circle');
    const sz={in:110,hold:110,out:80,done:90}[ph]||90;
    circle.style.width=sz+'px';circle.style.height=sz+'px';
    circle.style.boxShadow=ph==='in'?`0 0 0 16px rgba(37,99,235,.13)`:'none';
    circle.textContent=ph==='done'?'✅':'🌬️';
    el('breath-label').textContent=labels[ph];
    // dots
    const dots=el('breath-dots');dots.innerHTML='';
    for(let i=0;i<3;i++){const d=document.createElement('div');d.className='breath-dot'+(i<ST.breathCount?' done':'');dots.appendChild(d);}
    if(ph==='done'){show('breathe-done-btn');}else{hide('breathe-done-btn');}
  }
  updateUI();
  ST.breathIv=setInterval(()=>{
    tc++;const s=seq[si];
    if(!s){clearInterval(ST.breathIv);ST.breathPhase='done';updateUI();return;}
    if(tc>=s.d){si++;tc=0;if(si<seq.length)ST.breathPhase=seq[si].p;if(s.p==='out')ST.breathCount++;}
    else ST.breathPhase=s.p;
    updateUI();
  },1000);
}

// ── Do task ───────────────────────────────────────────────────────────────────
function renderDo(){
  const task=getCurrentTask();if(!task)return;
  const col=TASK_COLORS[task.colorKey]||TASK_COLORS.sky;
  const done=ST.stepsDone[task.id]||[];
  const skipped=(ST.stepsSkipped||{})[task.id]||[];
  const pct=Math.round((done.length/task.steps.length)*100);
  const skippedCount=skipped.length;
  const secs=ST.taskTimerSecs;
  const enc=secs<120?'You\'ve got this 💪':secs<300?'Keep going, doing great!':'One step at a time';
  // Header
  const hdr=el('do-header');
  hdr.style.cssText=`background:${col.bg};border-bottom:1.5px solid ${col.border};padding:18px 20px 14px`;
  hdr.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <span style="font-size:34px">${task.emoji}</span>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-size:20px;font-weight:900;line-height:1.1">${task.title}</div>
          ${task.isAnchor?'<span class="badge-green">🔑 anchor</span>':''}
          ${(task.starMultiplier||1)>1?`<span class="badge-amber">${task.starMultiplier}x ⭐</span>`:''}
        </div>
        <div style="font-size:13px;color:var(--s-sub);font-weight:600;margin-top:2px">${enc}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:18px;font-weight:900;color:${col.accent}">${fmtSecs(secs)}</div>
        <div style="font-size:10px;color:var(--s-mut);font-weight:700;text-transform:uppercase;letter-spacing:.06em">elapsed</div>
      </div>
    </div>
    <div style="background:${col.border};border-radius:6px;height:8px;overflow:hidden">
      <div style="background:${col.accent};height:100%;width:${pct}%;border-radius:6px;transition:width .4s"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="font-size:11px;color:var(--s-mut);font-weight:600">${done.length} of ${task.steps.length} done${skippedCount>0?' · '+skippedCount+' skipped':''}</span>
      <span style="font-size:11px;color:var(--s-amber);font-weight:800">⭐ ${ST.stars}</span>
    </div>`;
  // Steps
  const stepsDiv=el('do-steps');stepsDiv.innerHTML='';
  task.steps.forEach((step,idx)=>{
    const isDone=done.includes(idx);const isSkipped=skipped.includes(idx);
    const row=document.createElement('div');row.className='step-row';
    const btn=document.createElement('button');
    btn.className='step-btn'+(isDone?' done':isSkipped?' skipped':'');
    btn.onclick=()=>{if(!isSkipped)toggleStep(task.id,idx);};
    const check=document.createElement('div');
    check.className='step-check'+(isDone?' done':isSkipped?' skipped':'');
    if(isDone)check.innerHTML='<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    if(isSkipped)check.textContent='⊘';
    const txt=document.createElement('span');
    txt.style.cssText=`font-size:15px;font-weight:${isDone||isSkipped?500:700};color:${isDone?'var(--s-mut)':isSkipped?'#aaa':'var(--s-text)'};text-decoration:${isDone||isSkipped?'line-through':'none'};line-height:1.3;flex:1`;
    txt.textContent=step;
    btn.appendChild(check);btn.appendChild(txt);
    if(!isDone&&!isSkipped){
      const starlabel=document.createElement('span');
      starlabel.style.cssText='font-size:11px;color:var(--s-amber);font-weight:800;white-space:nowrap';
      starlabel.textContent=`⭐+${task.starMultiplier||1}`;
      btn.appendChild(starlabel);
    }
    if(isSkipped){const sl=document.createElement('span');sl.style.cssText='font-size:10px;font-weight:700;color:#aaa;white-space:nowrap';sl.textContent='skipped';btn.appendChild(sl);}
    row.appendChild(btn);
    if(!isDone&&!isSkipped){
      const skipBtn=document.createElement('button');
      skipBtn.className='skip-step-btn';skipBtn.title='Skip this step — no star';
      skipBtn.textContent='⊘';skipBtn.onclick=()=>skipStep(task.id,idx);
      row.appendChild(skipBtn);
    }
    stepsDiv.appendChild(row);
  });
  // Stuck
  renderStuck();
}

function renderStuck(){
  const stuckArea=el('stuck-area');
  const stuckBtn=stuckArea?.querySelector('.btn-outline');
  const opts=el('stuck-opts');
  if(!stuckBtn||!opts)return;
  if(ST.showStuck){
    stuckBtn.classList.add('hidden');show('stuck-opts');
    opts.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--s-sub);text-align:center;margin-bottom:2px">That\'s okay. What would help?</div>';
    const stuckOpts=[{label:'Take a breathing break',action:'breathe',emoji:'🌬️'},{label:'Skip the next step',action:'skip',emoji:'⏭️'},{label:'Get a parent',action:'parent',emoji:'👋'}];
    stuckOpts.forEach(opt=>{
      const b=document.createElement('button');b.className='stuck-opt';b.style.width='100%';
      b.innerHTML=`<span style="font-size:20px">${opt.emoji}</span><span>${opt.label}</span>`;
      b.onclick=()=>{ST.showStuck=false;if(opt.action!=='parent')handleStuck(opt.action);renderDo();};
      opts.appendChild(b);
    });
    const nm=document.createElement('button');
    nm.style.cssText='background:none;border:none;font-size:13px;color:var(--s-mut);padding:6px;width:100%';
    nm.textContent='Never mind, keep going';nm.onclick=()=>{ST.showStuck=false;renderDo();};
    opts.appendChild(nm);
  } else {
    stuckBtn.classList.remove('hidden');hide('stuck-opts');opts.innerHTML='';
  }
}

        <div style="font-size:10px;color:var(--s-mut);font-weight:700;margin-top:2px">${canAfford?'Ready to spend!':r.cost-ST.stars+' more stars to go'}</div>
      </div>
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px">
        <div style="font-size:13px;font-weight:800;color:var(--s-amber)">⭐${r.cost}</div>
        ${isPending?'<span style="font-size:10px;font-weight:700;color:var(--s-blue);background:var(--s-bluel);border-radius:10px;padding:3px 8px">Pending</span>':''}
      </div>`;
    if(!isPending){
      const reqBtn=document.createElement('button');
      reqBtn.disabled=!canAfford;
      reqBtn.style.cssText=`background:${canAfford?'var(--s-amber)':'#ddd'};color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:800;cursor:${canAfford?'pointer':'not-allowed'};transition:background .2s`;
      reqBtn.textContent='Request';
      reqBtn.onclick=()=>{if(!canAfford)return;handleRequest(r);};
      div.querySelector('div:last-child').appendChild(reqBtn);
    }
    screen.appendChild(div);
  });
}

// ─── MY TASKS TAB ────────────────────────────────────────────────────────────
function renderTasksTab(){
  const screen = document.getElementById('tasks-screen');
  screen.innerHTML = '';

  const tasks = getTodayTasks();
  if(tasks.length === 0){
    screen.innerHTML = '<div style="text-align:center;padding:48px 24px;color:var(--s-mut)"><div style="font-size:36px;margin-bottom:8px">📋</div><div style="font-size:16px;font-weight:700">No tasks today</div></div>';
    return;
  }

  // Header blurb
  const blurb = document.createElement('div');
  blurb.style.cssText = 'font-size:13px;color:var(--s-mut);font-weight:600;line-height:1.4;padding:0 4px';
  const totalSkipped = tasks.reduce((s,t)=>s+((ST.stepsSkipped||{})[t.id]||[]).length,0);
  blurb.textContent = totalSkipped > 0
    ? 'Tap any skipped step to mark it done and earn your star.'
    : 'All your tasks for today. Tap a step to check it off.';
  screen.appendChild(blurb);

  tasks.forEach(task => {
    const done = ST.stepsDone[task.id] || [];
    const skipped = (ST.stepsSkipped || {})[task.id] || [];
    const col = TASK_COLORS[task.colorKey] || TASK_COLORS.sky;
    const allDone = done.length >= task.steps.length;
    const hasSkipped = skipped.length > 0;

    const card = document.createElement('div');
    card.style.cssText = 'background:#fff;border:1.5px solid ' + (hasSkipped ? 'var(--s-amber)' : allDone ? 'var(--s-greenm)' : 'var(--s-bor)') + ';border-radius:16px;overflow:hidden;opacity:' + (allDone && !hasSkipped ? '0.7' : '1');

    // Task header
    const hdr = document.createElement('div');
    hdr.style.cssText = 'background:' + col.bg + ';padding:12px 16px;display:flex;align-items:center;gap:10px';
    hdr.innerHTML =
      '<span style="font-size:22px">' + task.emoji + '</span>' +
      '<div style="flex:1">' +
        '<div style="font-size:15px;font-weight:800">' + task.title + '</div>' +
        '<div style="font-size:11px;color:var(--s-sub);font-weight:600;margin-top:2px">' +
          done.length + ' of ' + task.steps.length + ' done' +
          (skipped.length > 0 ? ' · ' + skipped.length + ' skipped' : '') +
        '</div>' +
      '</div>' +
      (task.isAnchor ? '<span class="badge-green">🔑</span>' : '') +
      ((task.starMultiplier||1)>1 ? '<span class="badge-amber">' + task.starMultiplier + 'x ⭐</span>' : '');
    card.appendChild(hdr);

    // Steps list — show all steps with their state
    const stepsDiv = document.createElement('div');
    stepsDiv.style.cssText = 'padding:10px 14px;display:flex;flex-direction:column;gap:8px';

    task.steps.forEach((step, idx) => {
      const isDone = done.includes(idx);
      const isSkipped = skipped.includes(idx);

      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1.5px solid ' +
        (isDone ? 'var(--s-greenm)' : isSkipped ? 'var(--s-amber)' : 'var(--s-bor)') + ';background:' +
        (isDone ? 'var(--s-greenp)' : isSkipped ? 'var(--s-amberbg)' : '#fff') + ';cursor:' +
        (isSkipped ? 'pointer' : 'default') + ';transition:all .15s;font-family:Nunito,sans-serif';

      // Circle indicator
      const circle = document.createElement('div');
      circle.style.cssText = 'width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid ' +
        (isDone ? 'var(--s-green)' : isSkipped ? 'var(--s-amber)' : 'var(--s-bor)') + ';background:' +
        (isDone ? 'var(--s-green)' : 'transparent') + ';color:' +
        (isDone ? '#fff' : isSkipped ? 'var(--s-amber)' : 'var(--s-mut)');
      if(isDone) circle.innerHTML = '<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 3.5L4 6.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      else if(isSkipped) circle.textContent = '⊘';
      else circle.textContent = String(idx+1);

      const label = document.createElement('div');
      label.style.cssText = 'flex:1;min-width:0';
      label.innerHTML =
        '<div style="font-size:13px;font-weight:' + (isDone ? '600' : '700') + ';color:' +
        (isDone ? 'var(--s-mut)' : isSkipped ? 'var(--s-amber)' : 'var(--s-text)') +
        ';text-decoration:' + (isDone ? 'line-through' : 'none') + '">' + step + '</div>' +
        (isSkipped ? '<div style="font-size:11px;color:var(--s-amber);font-weight:600;margin-top:1px">Tap to mark done — earn ⭐+' + (task.starMultiplier||1) + '</div>' : '');

      row.appendChild(circle);
      row.appendChild(label);

      if(!isDone && !isSkipped){
        const starLbl = document.createElement('span');
        starLbl.style.cssText = 'font-size:11px;color:var(--s-amber);font-weight:800;white-space:nowrap';
        starLbl.textContent = '⭐+' + (task.starMultiplier||1);
        row.appendChild(starLbl);
      }

      if(isSkipped){
        row.onclick = () => handleUnskipStep(task.id, idx);
        row.style.cursor = 'pointer';
        // Active feedback
        row.onmousedown = () => row.style.background = 'var(--s-greenp)';
        row.onmouseup = () => {};
      }

      stepsDiv.appendChild(row);
    });

    card.appendChild(stepsDiv);
    screen.appendChild(card);
  });
}

// ─── PARENT RENDER ────────────────────────────────────────────────────────────
function renderParent(){
  if(!ST.parentMode)return;
  renderParentTabs();
  renderParentContent();
}

function renderParentTabs(){
  const pending=getPendingCount();
  const tabs=[
    {id:'today',label:'Today'},{id:'tasks',label:'Tasks'},
    {id:'reminders',label:'Reminders'},{id:'stars',label:'Stars'},
    {id:'store',label:'Store'},{id:'approve',label:`Approvals${pending>0?` (${pending})`:''}`,urgent:pending>0},
    {id:'rewards',label:'Daily Rewards'},{id:'settings',label:'Settings'},
  ];
  const tabBar=el('parent-tabs');tabBar.innerHTML='';
  tabs.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='ptab-btn'+(ST.parentTab===t.id?' active':t.urgent?' urgent':'');
    btn.textContent=t.label;btn.onclick=()=>{ST.parentTab=t.id;renderParentContent();renderParentTabs();};
    tabBar.appendChild(btn);
  });
}

function renderParentContent(){
  const content=el('parent-content');content.innerHTML='';
  switch(ST.parentTab){
    case 'today':     renderPToday(content);break;
    case 'tasks':     renderPTasks(content);break;
    case 'reminders': renderPReminders(content);break;
    case 'stars':     renderPStars(content);break;
    case 'store':     renderPStore(content);break;
    case 'approve':   renderPApprove(content);break;
    case 'rewards':   renderPDailyRewards(content);break;
    case 'settings':  renderPSettings(content);break;
  }
}

function renderPToday(el){
  const tasks=getTodayTasks();
  const totalSteps=tasks.reduce((s,t)=>s+t.steps.length,0);
  const doneSteps=tasks.reduce((s,t)=>s+(ST.stepsDone[t.id]||[]).length,0);
  const skippedSteps=tasks.reduce((s,t)=>s+((ST.stepsSkipped||{})[t.id]||[]).length,0);
  const pct=totalSteps>0?Math.round((doneSteps/totalSteps)*100):0;
  el.innerHTML=`<div class="p-section">
    <div class="p-card">
      <div style="font-size:13px;font-weight:700;color:var(--p-sub);margin-bottom:12px">Today — ${FULL_DAYS[TODAY]}</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
        <div style="text-align:center"><div style="font-size:36px;font-weight:900;color:${pct===100?'var(--p-green)':'var(--p-teal)'};line-height:1">${pct}%</div><div style="font-size:11px;color:var(--p-sub);font-weight:600">complete</div></div>
        <div style="flex:1"><div class="p-progress"><div class="p-bar" style="background:${pct===100?'var(--p-green)':'var(--p-teal)'};width:${pct}%"></div></div><div style="font-size:12px;color:var(--p-sub);font-weight:600;margin-top:4px">${doneSteps} of ${totalSteps} steps done${skippedSteps>0?' · '+skippedSteps+' skipped':''}</div></div>
      </div>
      <div style="display:flex;gap:10px">
        <div style="flex:1;background:var(--p-bg);border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--p-amber)">⭐ ${ST.stars}</div><div style="font-size:11px;color:var(--p-sub);font-weight:600">total stars</div></div>
        <div style="flex:1;background:var(--p-bg);border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--p-teal)">${tasks.length}</div><div style="font-size:11px;color:var(--p-sub);font-weight:600">tasks today</div></div>
      </div>
    </div>
    ${tasks.map(t=>{
      const d=ST.stepsDone[t.id]||[];const p=Math.round((d.length/t.steps.length)*100);
      const col=TASK_COLORS[t.colorKey]||TASK_COLORS.sky;
      return`<div class="p-card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:22px">${t.emoji}</span><div style="flex:1"><div style="font-size:14px;font-weight:800;color:var(--p-text)">${t.title}</div><div style="display:flex;gap:6px;align-items:center;margin-top:2px"><span style="font-size:12px;color:var(--p-sub);font-weight:600">${d.length}/${t.steps.length} steps</span>${t.source==='recurring'?'<span style="font-size:10px;font-weight:700;color:var(--p-teal);background:var(--p-teall);border-radius:10px;padding:1px 6px">repeating</span>':''}</div></div><span style="font-size:13px;font-weight:800;color:${p===100?'var(--p-green)':'var(--p-teal)'}">${p}%</span></div><div class="p-progress"><div class="p-bar" style="background:${p===100?'var(--p-green)':col.accent};width:${p}%"></div></div></div>`;
    }).join('')}
  </div>`;
}

function renderPTasks(container){
  const wrap=document.createElement('div');wrap.className='p-section';wrap.style.gap='0';
  // Sub-tabs
  const tog=document.createElement('div');tog.className='subtab-toggle';
  ['Repeating Tasks','One-off Tasks'].forEach((label,i)=>{
    const id=i===0?'recurring':'oneoff';
    const b=document.createElement('button');b.className='subtab-btn'+(ST.ptaskTab===id?' active':'');
    b.textContent=label;b.onclick=()=>{ST.ptaskTab=id;ST.ptaskEditId=null;ST.ptaskAdding=false;renderParentContent();};
    tog.appendChild(b);
  });
  wrap.appendChild(tog);
  // Info
  const info=document.createElement('div');
  info.style.cssText='font-size:12px;color:var(--p-mut);font-weight:600;margin-bottom:12px;line-height:1.4';
  info.textContent=ST.ptaskTab==='recurring'?'Repeating tasks appear automatically on the days you choose. Use ▲▼ to reorder.':'One-off tasks appear on a specific date only. Use ▲▼ to reorder.';
  wrap.appendChild(info);
  // Task list with reorder controls
  const taskList=ST.ptaskTab==='recurring'?ST.recurring:ST.oneoff;
  taskList.forEach((task,idx)=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:6px;align-items:flex-start;margin-bottom:8px';
    // Reorder column
    const reorderCol=document.createElement('div');
    reorderCol.style.cssText='display:flex;flex-direction:column;gap:3px;padding-top:10px;flex-shrink:0';
    // Move to top button (only show if not already first)
    if(idx>0){
      const topBtn=document.createElement('button');
      topBtn.title='Move to top';
      topBtn.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:6px;width:28px;height:22px;font-size:11px;color:var(--p-teal);font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1';
      topBtn.textContent='⤒';
      topBtn.onclick=()=>{
        const arr=ST.ptaskTab==='recurring'?[...ST.recurring]:[...ST.oneoff];
        const [item]=arr.splice(idx,1);arr.unshift(item);
        if(ST.ptaskTab==='recurring')ST.recurring=arr;else ST.oneoff=arr;
        saveS();renderParentContent();
      };
      reorderCol.appendChild(topBtn);
    }
    if(idx>0){
      const upBtn=document.createElement('button');
      upBtn.title='Move up';
      upBtn.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:6px;width:28px;height:22px;font-size:12px;color:var(--p-sub);cursor:pointer;display:flex;align-items:center;justify-content:center';
      upBtn.textContent='▲';
      upBtn.onclick=()=>{
        const arr=ST.ptaskTab==='recurring'?[...ST.recurring]:[...ST.oneoff];
        [arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]];
        if(ST.ptaskTab==='recurring')ST.recurring=arr;else ST.oneoff=arr;
        saveS();renderParentContent();
      };
      reorderCol.appendChild(upBtn);
    }
    if(idx<taskList.length-1){
      const dnBtn=document.createElement('button');
      dnBtn.title='Move down';
      dnBtn.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:6px;width:28px;height:22px;font-size:12px;color:var(--p-sub);cursor:pointer;display:flex;align-items:center;justify-content:center';
      dnBtn.textContent='▼';
      dnBtn.onclick=()=>{
        const arr=ST.ptaskTab==='recurring'?[...ST.recurring]:[...ST.oneoff];
        [arr[idx],arr[idx+1]]=[arr[idx+1],arr[idx]];
        if(ST.ptaskTab==='recurring')ST.recurring=arr;else ST.oneoff=arr;
        saveS();renderParentContent();
      };
      reorderCol.appendChild(dnBtn);
    }
    row.appendChild(reorderCol);
    const editorWrap=document.createElement('div');editorWrap.style.cssText='flex:1;min-width:0';
    editorWrap.appendChild(buildTaskEditor(task, ST.ptaskTab==='recurring'));
    row.appendChild(editorWrap);
    wrap.appendChild(row);
  });
  // Add button / form
  if(!ST.ptaskAdding){
    const addBtn=document.createElement('button');
    addBtn.style.cssText='background:transparent;border:1.5px dashed var(--p-bor);border-radius:14px;padding:14px;font-size:14px;font-weight:700;color:var(--p-sub);width:100%;margin-top:4px;cursor:pointer';
    addBtn.textContent=`+ Add ${ST.ptaskTab==='recurring'?'repeating':'one-off'} task`;
    addBtn.onclick=()=>{ST.ptaskAdding=true;renderParentContent();};
    wrap.appendChild(addBtn);
  } else {
    wrap.appendChild(buildAddTaskForm());
  }
  container.appendChild(wrap);
}

function buildTaskEditor(task, isRecurring){
  const isEdit=ST.ptaskEditId===task.id;
  const div=document.createElement('div');
  div.style.cssText=`background:#fff;border:1px solid ${isEdit?'var(--p-teal)':'var(--p-bor)'};border-radius:14px;overflow:hidden;margin-bottom:8px`;
  const hdr=document.createElement('div');
  hdr.style.cssText='padding:13px 16px;display:flex;align-items:center;gap:10px';
  hdr.innerHTML=`<span style="font-size:20px">${task.emoji}</span>
    <div style="flex:1"><div style="font-size:14px;font-weight:800;color:var(--p-text)">${task.title}</div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:2px">
      <span style="font-size:12px;color:var(--p-sub);font-weight:600">${task.steps.length} steps · ${task.estimatedMinutes} min</span>
      ${isRecurring?`<span style="font-size:10px;font-weight:700;color:var(--p-teal);background:var(--p-teall);border-radius:10px;padding:1px 6px">${REPEAT_OPTIONS.find(r=>r.id===task.repeat)?.label||task.repeat}</span>`:''}
      ${!isRecurring&&task.date?`<span style="font-size:10px;font-weight:700;color:var(--p-amber);background:var(--p-amberbg);border-radius:10px;padding:1px 6px">${task.date}</span>`:''}
    </div></div>`;
  const editBtn=document.createElement('button');
  editBtn.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--p-sub);font-weight:600';
  editBtn.textContent=isEdit?'Done':'Edit';
  editBtn.onclick=()=>{ST.ptaskEditId=isEdit?null:task.id;renderParentContent();};
  const delBtn=document.createElement('button');
  delBtn.style.cssText='background:var(--p-redbg);border:1px solid rgba(220,38,38,.27);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--p-red);font-weight:600';
  delBtn.textContent='✕';
  delBtn.onclick=()=>{
    if(isRecurring)ST.recurring=ST.recurring.filter(t=>t.id!==task.id);
    else ST.oneoff=ST.oneoff.filter(t=>t.id!==task.id);
    saveS();renderParentContent();
  };
  hdr.appendChild(editBtn);hdr.appendChild(delBtn);
  div.appendChild(hdr);
  if(isEdit){
    const body=document.createElement('div');
    body.style.cssText='border-top:1px solid var(--p-bor);padding:14px 16px;display:flex;flex-direction:column;gap:10px;background:var(--p-bgd)';

    // Work directly on a live reference to the task object in ST arrays
    const getTask=()=>(isRecurring?ST.recurring:ST.oneoff).find(t=>t.id===task.id)||task;
    const updateTask=(field,val)=>{
      if(isRecurring)ST.recurring=ST.recurring.map(t=>t.id!==task.id?t:{...t,[field]:val});
      else ST.oneoff=ST.oneoff.map(t=>t.id!==task.id?t:{...t,[field]:val});
      saveS();
    };

    // Emoji (plain text input — no re-render needed)
    const row1=document.createElement('div');row1.style.cssText='display:flex;gap:8px';
    const emojiIn=document.createElement('input');emojiIn.value=getTask().emoji;emojiIn.style.cssText='width:44px;background:#fff;border:1px solid var(--p-bor);border-radius:8px;padding:8px;font-size:18px;text-align:center;color:var(--p-text);outline:none';
    emojiIn.oninput=e=>updateTask('emoji',e.target.value);
    const titleIn=document.createElement('input');titleIn.value=getTask().title;titleIn.style.cssText='flex:1;background:#fff;border:1px solid var(--p-bor);border-radius:8px;padding:8px 12px;font-size:14px;font-weight:700;color:var(--p-text);outline:none;font-family:Nunito,sans-serif';
    titleIn.oninput=e=>updateTask('title',e.target.value);
    const minsIn=document.createElement('input');minsIn.type='number';minsIn.min='1';minsIn.value=getTask().estimatedMinutes;minsIn.style.cssText='width:52px;background:#fff;border:1px solid var(--p-bor);border-radius:8px;padding:8px;font-size:13px;color:var(--p-text);outline:none;text-align:center';
    minsIn.oninput=e=>updateTask('estimatedMinutes',Number(e.target.value));
    row1.appendChild(emojiIn);row1.appendChild(titleIn);row1.appendChild(minsIn);body.appendChild(row1);

    // Colors — surgical in-place update
    const colRow=document.createElement('div');colRow.style.cssText='display:flex;gap:6px';
    Object.entries(TASK_COLORS).forEach(([k,v])=>{
      const b=document.createElement('button');b.style.cssText=`width:26px;height:26px;border-radius:50%;background:${v.bg};border:2.5px solid ${getTask().colorKey===k?v.accent:v.border};cursor:pointer`;
      b.onclick=()=>{updateTask('colorKey',k);colRow.querySelectorAll('button').forEach((cb,ci)=>{const ck=Object.keys(TASK_COLORS)[ci];const cv=TASK_COLORS[ck];cb.style.borderColor=ck===k?cv.accent:cv.border;});};
      colRow.appendChild(b);
    });
    body.appendChild(colRow);

    // Star multiplier + anchor — surgical
    const mrow=document.createElement('div');mrow.style.cssText='display:flex;gap:8px;align-items:center';
    const mleft=document.createElement('div');mleft.style.flex='1';
    mleft.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Stars per step</div>';
    const mbtns=document.createElement('div');mbtns.className='multiplier-btns';
    [1,2,3].forEach(m=>{
      const b=document.createElement('button');b.className='mult-btn'+((getTask().starMultiplier||1)===m?' active':'');
      b.textContent=m+'x ⭐';
      b.onclick=()=>{updateTask('starMultiplier',m);mbtns.querySelectorAll('button').forEach((mb,mi)=>{mb.className='mult-btn'+([1,2,3][mi]===m?' active':'');});};
      mbtns.appendChild(b);
    });
    mleft.appendChild(mbtns);mrow.appendChild(mleft);
    const mright=document.createElement('div');mright.style.flexShrink='0';
    mright.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Anchor task?</div>';
    const ancBtn=document.createElement('button');ancBtn.className='anchor-btn'+(getTask().isAnchor?' active':'');
    ancBtn.textContent=getTask().isAnchor?'🔑 Yes':'No';
    ancBtn.onclick=()=>{const na=!getTask().isAnchor;updateTask('isAnchor',na);ancBtn.className='anchor-btn'+(na?' active':'');ancBtn.textContent=na?'🔑 Yes':'No';};
    mright.appendChild(ancBtn);mrow.appendChild(mright);body.appendChild(mrow);

    // Repeat / Date — surgical
    if(isRecurring){
      const rrow=document.createElement('div');rrow.style.cssText='display:flex;gap:6px;flex-wrap:wrap';
      REPEAT_OPTIONS.forEach(opt=>{
        const b=document.createElement('button');b.className='repeat-btn'+(getTask().repeat===opt.id?' active':'');
        b.textContent=opt.label;
        b.onclick=()=>{updateTask('repeat',opt.id);rrow.querySelectorAll('button').forEach(rb=>{rb.className='repeat-btn'+(rb.textContent===opt.label?' active':'');});customDaysWrap.style.display=opt.id==='custom'?'flex':'none';};
        rrow.appendChild(b);
      });
      body.appendChild(rrow);
      const customDaysWrap=document.createElement('div');customDaysWrap.style.cssText=`display:${getTask().repeat==='custom'?'flex':'none'};gap:5px;flex-wrap:wrap`;
      DAYS.forEach(d=>{
        const b=document.createElement('button');b.className='day-btn'+((getTask().customDays||[]).includes(d)?' active':'');
        b.textContent=d;
        b.onclick=()=>{const cur=getTask().customDays||[];const nd=cur.includes(d)?cur.filter(x=>x!==d):[...cur,d];updateTask('customDays',nd);b.className='day-btn'+(nd.includes(d)?' active':'');};
        customDaysWrap.appendChild(b);
      });
      body.appendChild(customDaysWrap);
    } else {
      const dateRow=document.createElement('div');dateRow.style.cssText='display:flex;align-items:center;gap:8px';
      dateRow.innerHTML='<span style="font-size:12px;color:var(--p-sub);font-weight:700">Date:</span>';
      const di=document.createElement('input');di.type='date';di.value=getTask().date||'';di.className='p-input';di.style.flex='1';
      di.oninput=e=>updateTask('date',e.target.value);dateRow.appendChild(di);body.appendChild(dateRow);
    }

    // Steps — self-contained, in-place
    const slbl=document.createElement('div');slbl.style.cssText='font-size:11px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em';slbl.textContent='Steps';body.appendChild(slbl);
    const stepsWrap=document.createElement('div');stepsWrap.style.cssText='display:flex;flex-direction:column;gap:4px';
    function rebuildSteps(){
      stepsWrap.innerHTML='';
      const t=getTask();
      t.steps.forEach((step,si)=>{
        const sr=document.createElement('div');sr.style.cssText='display:flex;gap:4px;align-items:center';
        const num=document.createElement('span');num.style.cssText='font-size:11px;color:var(--p-mut);font-weight:700;width:14px;text-align:center;flex-shrink:0';num.textContent=si+1;
        const reCol=document.createElement('div');reCol.style.cssText='display:flex;flex-direction:column;gap:1px;flex-shrink:0';
        if(si>0){const upS=document.createElement('button');upS.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:3px;width:20px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--p-sub)';upS.textContent='▲';upS.onclick=()=>{const ns=[...getTask().steps];[ns[si-1],ns[si]]=[ns[si],ns[si-1]];updateTask('steps',ns);rebuildSteps();};reCol.appendChild(upS);}else{const ph=document.createElement('div');ph.style.cssText='width:20px;height:16px';reCol.appendChild(ph);}
        if(si<t.steps.length-1){const dnS=document.createElement('button');dnS.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:3px;width:20px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--p-sub)';dnS.textContent='▼';dnS.onclick=()=>{const ns=[...getTask().steps];[ns[si],ns[si+1]]=[ns[si+1],ns[si]];updateTask('steps',ns);rebuildSteps();};reCol.appendChild(dnS);}else{const ph=document.createElement('div');ph.style.cssText='width:20px;height:16px';reCol.appendChild(ph);}
        const stepIn=document.createElement('input');stepIn.value=step;stepIn.className='p-input';stepIn.style.flex='1';stepIn.placeholder=`Step ${si+1}`;
        stepIn.oninput=e=>{const ns=[...getTask().steps];ns[si]=e.target.value;updateTask('steps',ns);};
        const delS=document.createElement('button');delS.style.cssText='background:none;border:none;color:var(--p-mut);font-size:15px;padding:3px;cursor:pointer;flex-shrink:0';delS.textContent='✕';
        delS.onclick=()=>{updateTask('steps',getTask().steps.filter((_,j)=>j!==si));rebuildSteps();};
        sr.appendChild(num);sr.appendChild(reCol);sr.appendChild(stepIn);sr.appendChild(delS);stepsWrap.appendChild(sr);
      });
      const addStep=document.createElement('button');addStep.style.cssText='background:var(--p-bg);border:1px dashed var(--p-bor);border-radius:8px;padding:8px;font-size:13px;color:var(--p-sub);font-weight:600;width:100%;cursor:pointer';
      addStep.textContent='+ Add step';addStep.onclick=()=>{updateTask('steps',[...getTask().steps,'']);rebuildSteps();};
      stepsWrap.appendChild(addStep);
    }
    rebuildSteps();
    body.appendChild(stepsWrap);
    div.appendChild(body);
  }
  return div;
}

function buildTaskFields(task, isRecurring, onField, onSteps){
  const frag=document.createDocumentFragment();
  // Emoji + title + minutes
  const row1=document.createElement('div');row1.style.cssText='display:flex;gap:8px';
  const emojiIn=document.createElement('input');emojiIn.value=task.emoji;emojiIn.style.cssText='width:44px;background:#fff;border:1px solid var(--p-bor);border-radius:8px;padding:8px;font-size:18px;text-align:center;color:var(--p-text);outline:none';
  // Text inputs: save on input but DON'T re-render (would kill focus)
  emojiIn.oninput=e=>onField('emoji',e.target.value);
  const titleIn=document.createElement('input');titleIn.value=task.title;titleIn.style.cssText='flex:1;background:#fff;border:1px solid var(--p-bor);border-radius:8px;padding:8px 12px;font-size:14px;font-weight:700;color:var(--p-text);outline:none;font-family:Nunito,sans-serif';
  titleIn.oninput=e=>onField('title',e.target.value);
  const minsIn=document.createElement('input');minsIn.type='number';minsIn.min='1';minsIn.value=task.estimatedMinutes;minsIn.style.cssText='width:52px;background:#fff;border:1px solid var(--p-bor);border-radius:8px;padding:8px;font-size:13px;color:var(--p-text);outline:none;text-align:center';
  minsIn.oninput=e=>onField('estimatedMinutes',Number(e.target.value));
  row1.appendChild(emojiIn);row1.appendChild(titleIn);row1.appendChild(minsIn);frag.appendChild(row1);
  // Colors — structural, OK to re-render
  const colRow=document.createElement('div');colRow.style.cssText='display:flex;gap:6px';
  Object.entries(TASK_COLORS).forEach(([k,v])=>{
    const b=document.createElement('button');b.style.cssText=`width:26px;height:26px;border-radius:50%;background:${v.bg};border:2.5px solid ${task.colorKey===k?v.accent:v.border};cursor:pointer`;
    b.onclick=()=>onField('colorKey',k);colRow.appendChild(b);
  });
  frag.appendChild(colRow);
  // Star multiplier + anchor — structural, OK to re-render
  const mrow=document.createElement('div');mrow.style.cssText='display:flex;gap:8px;align-items:center';
  const mleft=document.createElement('div');mleft.style.flex='1';
  mleft.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Stars per step</div>';
  const mbtns=document.createElement('div');mbtns.className='multiplier-btns';
  [1,2,3].forEach(m=>{
    const b=document.createElement('button');b.className='mult-btn'+((task.starMultiplier||1)===m?' active':'');
    b.textContent=m+'x ⭐';b.onclick=()=>onField('starMultiplier',m);mbtns.appendChild(b);
  });
  mleft.appendChild(mbtns);mrow.appendChild(mleft);
  const mright=document.createElement('div');mright.style.flexShrink='0';
  mright.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Anchor task?</div>';
  const ancBtn=document.createElement('button');ancBtn.className='anchor-btn'+(task.isAnchor?' active':'');
  ancBtn.textContent=task.isAnchor?'🔑 Yes':'No';ancBtn.onclick=()=>onField('isAnchor',!task.isAnchor);
  mright.appendChild(ancBtn);mrow.appendChild(mright);frag.appendChild(mrow);
  // Repeat or date
  if(isRecurring){
    const rrow=document.createElement('div');rrow.style.cssText='display:flex;gap:6px;flex-wrap:wrap';
    REPEAT_OPTIONS.forEach(opt=>{
      const b=document.createElement('button');b.className='repeat-btn'+(task.repeat===opt.id?' active':'');
      b.textContent=opt.label;b.onclick=()=>onField('repeat',opt.id);rrow.appendChild(b);
    });
    frag.appendChild(rrow);
    if(task.repeat==='custom'){
      const drow=document.createElement('div');drow.style.cssText='display:flex;gap:5px;flex-wrap:wrap';
      DAYS.forEach(d=>{
        const b=document.createElement('button');b.className='day-btn'+((task.customDays||[]).includes(d)?' active':'');
        b.textContent=d;b.onclick=()=>{
          const cur=task.customDays||[];
          onField('customDays',cur.includes(d)?cur.filter(x=>x!==d):[...cur,d]);
        };drow.appendChild(b);
      });
      frag.appendChild(drow);
    }
  } else {
    const dateRow=document.createElement('div');dateRow.style.cssText='display:flex;align-items:center;gap:8px';
    dateRow.innerHTML='<span style="font-size:12px;color:var(--p-sub);font-weight:700">Date:</span>';
    const di=document.createElement('input');di.type='date';di.value=task.date||'';di.className='p-input';di.style.flex='1';
    di.oninput=e=>onField('date',e.target.value);dateRow.appendChild(di);frag.appendChild(dateRow);
  }
  // Steps — step text inputs also must NOT re-render on keystroke
  const slbl=document.createElement('div');slbl.style.cssText='font-size:11px;font-weight:700;color:var(--p-mut);text-transform:uppercase;letter-spacing:.07em';slbl.textContent='Steps';frag.appendChild(slbl);
  task.steps.forEach((step,si)=>{
    const sr=document.createElement('div');sr.style.cssText='display:flex;gap:4px;align-items:center;margin-bottom:4px';
    // Step number
    const num=document.createElement('span');num.style.cssText='font-size:11px;color:var(--p-mut);font-weight:700;width:14px;text-align:center;flex-shrink:0';num.textContent=si+1;
    // Reorder buttons column
    const reCol=document.createElement('div');reCol.style.cssText='display:flex;flex-direction:column;gap:2px;flex-shrink:0';
    if(si>0){
      const upS=document.createElement('button');upS.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:4px;width:20px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--p-sub)';
      upS.textContent='▲';upS.title='Move up';
      upS.onclick=()=>{const ns=[...task.steps];[ns[si-1],ns[si]]=[ns[si],ns[si-1]];onSteps(ns,true);};
      reCol.appendChild(upS);
    } else {
      const ph=document.createElement('div');ph.style.cssText='width:20px;height:16px';reCol.appendChild(ph);
    }
    if(si<task.steps.length-1){
      const dnS=document.createElement('button');dnS.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:4px;width:20px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--p-sub)';
      dnS.textContent='▼';dnS.title='Move down';
      dnS.onclick=()=>{const ns=[...task.steps];[ns[si],ns[si+1]]=[ns[si+1],ns[si]];onSteps(ns,true);};
      reCol.appendChild(dnS);
    } else {
      const ph=document.createElement('div');ph.style.cssText='width:20px;height:16px';reCol.appendChild(ph);
    }
    const stepIn=document.createElement('input');stepIn.value=step;stepIn.className='p-input';stepIn.style.flex='1';
    stepIn.placeholder=`Step ${si+1}`;
    // Save step text without re-rendering
    stepIn.oninput=e=>{const ns=[...task.steps];ns[si]=e.target.value;onSteps(ns,false);};
    const delS=document.createElement('button');delS.style.cssText='background:none;border:none;color:var(--p-mut);font-size:15px;padding:3px;cursor:pointer;flex-shrink:0';delS.textContent='✕';
    // Delete step IS structural — re-render is fine here
    delS.onclick=()=>onSteps(task.steps.filter((_,j)=>j!==si),true);
    sr.appendChild(num);sr.appendChild(reCol);sr.appendChild(stepIn);sr.appendChild(delS);frag.appendChild(sr);
  });
  const addStep=document.createElement('button');
  addStep.style.cssText='background:var(--p-bg);border:1px dashed var(--p-bor);border-radius:8px;padding:8px;font-size:13px;color:var(--p-sub);font-weight:600;width:100%;cursor:pointer';
  addStep.textContent='+ Add step';addStep.onclick=()=>onSteps([...task.steps,''],true);
  frag.appendChild(addStep);
  return frag;
}

      if(si>0){const upS=document.createElement('button');upS.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:3px;width:20px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--p-sub)';upS.textContent='▲';upS.onclick=()=>{const ns=[...ST.ptaskForm.steps];[ns[si-1],ns[si]]=[ns[si],ns[si-1]];ST.ptaskForm.steps=ns;renderStepsInPlace();};reCol.appendChild(upS);}else{const ph=document.createElement('div');ph.style.cssText='width:20px;height:16px';reCol.appendChild(ph);}
      if(si<ST.ptaskForm.steps.length-1){const dnS=document.createElement('button');dnS.style.cssText='background:var(--p-bg);border:1px solid var(--p-bor);border-radius:3px;width:20px;height:16px;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--p-sub)';dnS.textContent='▼';dnS.onclick=()=>{const ns=[...ST.ptaskForm.steps];[ns[si],ns[si+1]]=[ns[si+1],ns[si]];ST.ptaskForm.steps=ns;renderStepsInPlace();};reCol.appendChild(dnS);}else{const ph=document.createElement('div');ph.style.cssText='width:20px;height:16px';reCol.appendChild(ph);}
      const stepIn=document.createElement('input');stepIn.value=step;stepIn.className='p-input';stepIn.style.flex='1';stepIn.placeholder=`Step ${si+1}`;
