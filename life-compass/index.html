// TASKS TAB
// ═══════════════════════════════════════════════════════════════════════════════
function renderTasks() {
  const els = [];
  const wrapper = h('div', {});
  if (!U.tasks.form) U.tasks.form = {text:'',time:'15min',category:'personal',deadline:'',area:''};

  // Helper: small explainer card so users understand the difference
  const intro = h('div', {style:{background:'linear-gradient(135deg,#faf5ff,#f3e8ff)',border:'1px solid #e9d5ff',borderRadius:'12px',padding:'10px 14px',marginBottom:'12px',fontSize:'12px',color:'#6b21a8',lineHeight:'1.6'}}, [
    h('strong', {}, ['Life admin: ']),
    "things that just need to get done so they don't fall through the cracks. Optionally link a task to one of your areas if it also moves the needle there."
  ]);
  wrapper.appendChild(intro);

  // Legend
  const leg = h('div', {style:{display:'flex',gap:'8px',marginBottom:'12px',flexWrap:'wrap',alignItems:'center'}});
  TIME_OPTIONS.forEach(t => leg.appendChild(timeBadge(t, false)));
  wrapper.appendChild(leg);

  // Header
  wrapper.appendChild(h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}, [
    h('div', {style:{fontSize:'13px',color:C.sub}}, [(S.adminTasks||[]).filter(t => !t.done).length+' open']),
    btn(U.tasks.showForm?'Cancel':'+ Add task', () => {
      U.tasks.showForm = !U.tasks.showForm;
      if (!U.tasks.showForm) U.tasks.form = {text:'',time:'15min',category:'personal',deadline:'',area:''};
      render();
    }, 'primary', true),
  ]));

  if (U.tasks.showForm) {
    const f = U.tasks.form;
    const fc = h('div', {class:'card', style:{marginBottom:'12px'}});
    fc.appendChild(h('span', {class:'slabel'}, ['New Task']));
    const ti = inp('What needs to get done?', f.text, v => { f.text = v; });
    ti.style.marginBottom = '10px';
    fc.appendChild(ti);
    fc.appendChild(h('div', {style:{fontSize:'11px',color:C.muted,marginBottom:'6px',fontWeight:'700'}}, ['TIME NEEDED']));
    const tr = h('div', {style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'10px'}});
    TIME_OPTIONS.forEach(t => {
      const tc = TC[t]; const sel = f.time === t;
      tr.appendChild(h('div', {style:{background:sel?tc.bg:'#f8fafc',color:sel?tc.text:C.muted,border:`2px solid ${sel?tc.border:C.border}`,borderRadius:'8px',padding:'5px 14px',fontSize:'12px',fontWeight:'800',cursor:'pointer'},
        onClick: () => { f.time = t; render(); }}, [tc.label]));
    });
    fc.appendChild(tr);
    fc.appendChild(h('div', {class:'two-col', style:{marginBottom:'10px'}}, [
      h('div', {}, [
        h('div', {style:{fontSize:'11px',color:C.muted,marginBottom:'4px',fontWeight:'700'}}, ['CATEGORY']),
        (() => {
          const s = h('select', {class:'inp'});
          CATEGORY_OPTIONS.forEach(c => {
            const o = h('option', {value:c}, [c]);
            if (c === f.category) o.selected = true;
            s.appendChild(o);
          });
          s.addEventListener('change', e => { f.category = e.target.value; });
          return s;
        })(),
      ]),
      h('div', {}, [
        h('div', {style:{fontSize:'11px',color:C.muted,marginBottom:'4px',fontWeight:'700'}}, ['DUE DATE']),
        (() => { const s = inp('','',v => {f.deadline = v;}, 'date'); s.value = f.deadline; return s; })(),
      ]),
    ]));

    // Linked area picker — chip-style, compact
    if (getAreas().length > 0) {
      fc.appendChild(h('div', {style:{fontSize:'11px',color:C.muted,marginBottom:'6px',fontWeight:'700'}}, ['LINK TO AN AREA (OPTIONAL)']));
      const areaRow = h('div', {style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'14px'}});
      // "None" chip
      areaRow.appendChild(h('div', {style:{padding:'6px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:'700',cursor:'pointer',background:f.area===''?'#1f2937':'#fff',color:f.area===''?'#fff':C.sub,border:`1.5px solid ${f.area===''?'#1f2937':C.border}`},
        onClick: () => { f.area = ''; render(); }}, ['None']));
      getAreas().forEach(a => {
        const sel = f.area === a.id;
        areaRow.appendChild(h('div', {style:{padding:'6px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:'700',cursor:'pointer',background:sel?a.color:a.color+'15',color:sel?'#fff':a.color,border:`1.5px solid ${sel?a.color:a.color+'44'}`,display:'flex',alignItems:'center',gap:'5px'},
          onClick: () => { f.area = a.id; render(); }
        }, [
          h('span', {style:{fontSize:'13px'}}, [a.icon]),
          h('span', {}, [a.label]),
        ]));
      });
      fc.appendChild(areaRow);
    }

    fc.appendChild(btn('Add task', () => {
      if (!f.text.trim()) return;
      setState({adminTasks:[...(S.adminTasks||[]), {...f, id:uid(), done:false, created:todayKey()}]});
      U.tasks.form = {text:'',time:'15min',category:'personal',deadline:'',area:''};
      U.tasks.showForm = false;
    }, 'primary', false, false, {width:'100%'}));
    wrapper.appendChild(fc);
  }

  const order = {'15min':0,'30min':1,'1hr':2,'2hr+':3};
  const sorted = [...(S.adminTasks||[])].sort((a,b) => (order[a.time]||0) - (order[b.time]||0));
  const open = sorted.filter(t => !t.done);
  const done = sorted.filter(t => t.done);

  if (open.length === 0 && !U.tasks.showForm) {
    wrapper.appendChild(h('div', {class:'card'}, [h('div', {style:{color:C.muted,fontSize:'13px',textAlign:'center',padding:'12px 0'}}, ['No tasks yet.'])]));
  }

  open.forEach(t => {
    const tc = TC[t.time] || {bg:'#f1f5f9',text:C.sub,border:C.border,label:t.time};
    const overdue = t.deadline && t.deadline < todayKey();
    const isExp = U.tasks.expandedId === t.id;
    const linkedArea = t.area ? getAreas().find(a => a.id === t.area) : null;

    const taskEl = h('div', {style:{background:'#fff',borderRadius:'14px',marginBottom:'10px',overflow:'hidden',border:`1.5px solid ${overdue?'#ef444466':linkedArea?linkedArea.color+'66':tc.border}`,boxShadow:overdue?'0 2px 12px rgba(239,68,68,.1)':'none'}});
    if (linkedArea) {
      // Color stripe on the left
      taskEl.style.borderLeft = `4px solid ${linkedArea.color}`;
    }
    const mainRow = h('div', {style:{display:'flex',alignItems:'stretch'}});
    mainRow.appendChild(h('div', {style:{flex:'1',padding:'12px 14px',cursor:'pointer'},
      onClick: () => { U.tasks.expandedId = isExp?null:t.id; render(); }
    }, [
      h('div', {style:{fontSize:'14px',fontWeight:'700',color:C.text,lineHeight:'1.3'}}, [t.text]),
      h('div', {style:{display:'flex',gap:'10px',alignItems:'center',marginTop:'4px',flexWrap:'wrap'}}, [
        linkedArea ? h('span', {style:{fontSize:'11px',color:linkedArea.color,fontWeight:'700',display:'flex',alignItems:'center',gap:'3px'}}, [
          h('span', {style:{fontSize:'12px'}}, [linkedArea.icon]),
          h('span', {}, [linkedArea.label]),
        ]) : null,
        h('span', {style:{fontSize:'10px',color:C.muted,textTransform:'uppercase',letterSpacing:'1px',fontWeight:'700'}}, [t.category]),
        overdue ? h('span', {style:{fontSize:'11px',color:'#ef4444',fontWeight:'700'}}, ['⚠ overdue']) : (t.deadline ? h('span', {style:{fontSize:'11px',color:C.sub}}, ['due '+t.deadline]) : null),
      ]),
    ]));
    mainRow.appendChild(h('div', {class:'task-time-block', style:{background:tc.bg,borderColor:tc.border}}, [
      h('span', {style:{color:tc.text,fontSize:'11px',fontWeight:'800',whiteSpace:'nowrap'}}, [tc.label]),
    ]));
    mainRow.appendChild(h('div', {style:{display:'flex',alignItems:'center',padding:'0 14px',cursor:'pointer',background:'#f8fafc',borderLeft:`1.5px solid ${C.border}`},
      onClick: () => {
        // Mark done. If linked to an area, update lastTouched and add to completionLog.
        const newAdmin = (S.adminTasks||[]).map(x => x.id===t.id ? {...x, done:true, doneAt:todayKey()} : x);
        const patch = {adminTasks: newAdmin};
        if (linkedArea) {
          patch.lastTouched = {...(S.lastTouched||{}), [linkedArea.id]: todayKey()};
          patch.completionLog = [...(S.completionLog||[]), {date:todayKey(), type:'admin', label:t.text, area:linkedArea.id}].slice(-1000);
          showToast(`✓ Done — moved ${linkedArea.label} forward`, linkedArea.color, 1800);
        } else {
          showToast('✓ Done', '#10b981', 1200);
        }
        setState(patch);
      }
    }, [h('span', {style:{fontSize:'18px',color:C.sub}}, ['→'])]));
    taskEl.appendChild(mainRow);

    if (isExp) {
      const exp = h('div', {style:{padding:'10px 14px',borderTop:`1px solid ${C.border}`,background:'#f8fafc'}});
      // Quick re-link in expanded view
      exp.appendChild(h('div', {style:{fontSize:'10px',color:C.muted,fontWeight:'700',marginBottom:'6px',letterSpacing:'1px'}}, ['LINK TO AREA']));
      const linkRow = h('div', {style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'10px'}});
      linkRow.appendChild(h('div', {style:{padding:'4px 10px',borderRadius:'16px',fontSize:'11px',fontWeight:'700',cursor:'pointer',background:!t.area?'#1f2937':'#fff',color:!t.area?'#fff':C.sub,border:`1px solid ${!t.area?'#1f2937':C.border}`},
        onClick: () => {
          setState({adminTasks:(S.adminTasks||[]).map(x => x.id===t.id ? {...x, area:''} : x)});
        }}, ['None']));
      getAreas().forEach(a => {
        const sel = t.area === a.id;
        linkRow.appendChild(h('div', {style:{padding:'4px 10px',borderRadius:'16px',fontSize:'11px',fontWeight:'700',cursor:'pointer',background:sel?a.color:a.color+'15',color:sel?'#fff':a.color,border:`1px solid ${sel?a.color:a.color+'44'}`,display:'flex',alignItems:'center',gap:'4px'},
          onClick: () => {
            setState({adminTasks:(S.adminTasks||[]).map(x => x.id===t.id ? {...x, area:a.id} : x)});
          }}, [
          h('span', {style:{fontSize:'12px'}}, [a.icon]),
          h('span', {}, [a.label]),
        ]));
      });
      exp.appendChild(linkRow);
      exp.appendChild(h('div', {style:{display:'flex',gap:'8px'}}, [
        btn('Delete', () => {
          setState({adminTasks:(S.adminTasks||[]).filter(x => x.id !== t.id)});
          U.tasks.expandedId = null;
        }, 'ghost', true, false, {color:'#ef4444',borderColor:'#fecaca'}),
      ]));
      taskEl.appendChild(exp);
    }
    wrapper.appendChild(taskEl);
  });

  // Done tasks — collapsed
  if (done.length > 0) {
    let doneOpen = false;
    const toggle = h('div', {style:{fontSize:'11px',color:C.muted,cursor:'pointer',fontWeight:'600',padding:'6px 0',textAlign:'center'},
      onClick: () => {
        doneOpen = !doneOpen;
        toggle.textContent = (doneOpen?'▲ Hide ':'▼ Show ') + done.length + ' completed';
        doneList.style.display = doneOpen?'block':'none';
      }
    }, ['▼ Show '+done.length+' completed']);
    const doneList = h('div', {style:{display:'none',opacity:'0.5'}});
    done.forEach(t => {
      const tc = TC[t.time] || {};
      doneList.appendChild(h('div', {style:{background:'#fff',borderRadius:'14px',marginBottom:'8px',border:`1px solid ${C.border}`,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}, [
        h('span', {style:{fontSize:'13px',color:C.muted,textDecoration:'line-through'}}, [t.text]),
        h('span', {style:{fontSize:'10px',color:C.muted,cursor:'pointer'},
          onClick: () => setState({adminTasks:(S.adminTasks||[]).filter(x => x.id !== t.id)})}, ['remove']),
      ]));
    });
    wrapper.appendChild(toggle);
    wrapper.appendChild(doneList);
  }

  els.push(wrapper);
  return els;
}

// WEEKLY TAB — One question at a time, past reviews collapsed
// ═══════════════════════════════════════════════════════════════════════════════
function renderWeekly() {
  const els = [];
  const wrapper = h('div', {});

  // Toggle
  const toggle = h('div', {style:{display:'flex',background:'#f1f5f9',borderRadius:'12px',padding:'4px',marginBottom:'14px',gap:'4px'}});
  [{id:'review',label:'Sunday Review'},{id:'progress',label:'Progress'}].forEach(v => {
    toggle.appendChild(h('div', {style:{flex:'1',textAlign:'center',padding:'8px 0',borderRadius:'10px',background:U.weekly.view===v.id?'linear-gradient(135deg,#a855f7,#c084fc)':'transparent',color:U.weekly.view===v.id?'#fff':C.sub,fontWeight:'700',fontSize:'13px',cursor:'pointer',transition:'all .2s'},
      onClick: () => { U.weekly.view = v.id; render(); }}, [v.label]));

  if (U.weekly.view === 'review') renderReview(wrapper);
  else renderProgress(wrapper);

  els.push(wrapper);
  return els;

function renderReview(container) {
  const qs = [
    {key:'q1', label:'What actually happened this week — wins, misses, surprises?'},
    {key:'q2', label:'What did you avoid or deprioritize — and honestly, why?'},
    {key:'q3', label:'What brought you genuine joy this week?'},
    {key:'q4', label:'When did you feel most like yourself?'},
    {key:'q5', label:'What is the ONE thing next week that connects to your most important goal?'},
  ];

  // Intro card
  container.appendChild(h('div', {style:{background:'linear-gradient(135deg,#f0fdfa,#ccfbf1)',border:'1px solid #5eead4',borderRadius:'14px',padding:'14px 16px',marginBottom:'14px'}}, [
    h('div', {style:{fontSize:'13px',fontWeight:'700',color:'#0f766e',marginBottom:'4px'}}, ['📅 The Sunday Reset']),
    h('div', {style:{fontSize:'13px',color:'#115e59',lineHeight:'1.6'}}, ['Five questions, one at a time. The most useful 15 minutes of your week.']),
  ]));

  const totalQ = qs.length;
  const idx = Math.min(U.weekly.currentQ, totalQ);

  if (idx < totalQ) {
    // Current question only
    const q = qs[idx];

    // Progress dots
    const dots = h('div', {style:{display:'flex',gap:'6px',justifyContent:'center',marginBottom:'14px'}});
    qs.forEach((_, i) => {
      dots.appendChild(h('div', {style:{width:'8px',height:'8px',borderRadius:'50%',background:i<idx?'#10b981':i===idx?'#6366f1':'#e2e8f6'}}));
    });
    container.appendChild(dots);

    const c = h('div', {class:'card', style:{marginBottom:'14px'}});
    c.appendChild(h('div', {style:{fontSize:'11px',color:'#6366f1',fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}}, [`Question ${idx+1} of ${totalQ}`]));
    c.appendChild(h('div', {style:{fontSize:'15px',fontWeight:'700',color:C.text,marginBottom:'12px',lineHeight:'1.5'}}, [q.label]));
    const ta = textarea('Be honest with yourself...', U.weekly.answers[q.key], v => { U.weekly.answers[q.key] = v; }, 4);
    c.appendChild(ta);
    container.appendChild(c);

    container.appendChild(h('div', {style:{display:'flex',gap:'10px'}}, [
      idx > 0 ? btn('← Back', () => { U.weekly.currentQ = idx - 1; render(); }, 'ghost') : null,
      btn(idx < totalQ-1 ? 'Next →' : 'Finish & get coaching →', () => {
        if (idx < 3 && !U.weekly.answers[q.key].trim()) {
          showToast('Take a moment with this one.', '#f59e0b', 2500);
          return;
        }
        U.weekly.currentQ = idx + 1;
        render();
      }, 'primary', false, false, {flex:'1'}),
    ]));
  }
  else {
    // All questions answered — submit for coaching
    if (U.weekly.submitting) {
      container.appendChild(h('div', {class:'card', style:{textAlign:'center',padding:'24px'}}, [
        h('div', {style:{fontSize:'30px',marginBottom:'8px'}}, ['🤔']),
        h('div', {style:{fontSize:'14px',color:C.sub}}, ['Reading your week...']),
      ]));
    } else {
      container.appendChild(h('div', {class:'card', style:{marginBottom:'14px'}}, [
        h('div', {style:{fontSize:'14px',fontWeight:'800',color:C.text,marginBottom:'10px'}}, ['Ready when you are.']),
        h('div', {style:{fontSize:'13px',color:C.sub,lineHeight:'1.6',marginBottom:'14px'}}, ['Click below to get a brief coaching response based on your answers.']),
        btn('Submit & get coaching →', async () => {
          U.weekly.submitting = true;
          render();
          try {
            const trunc = (s, n=300) => s && s.length > n ? s.slice(0,n)+'...' : (s || '(not answered)');
            const recentMoods = Object.entries(S.dailyIntentions||{})
              .filter(([d]) => d >= todayKey().substring(0,7))
              .map(([d,v]) => v.mood).filter(Boolean).slice(-7);
            const moodLine = recentMoods.length ? 'Recent mood: ' + recentMoods.join(', ') : '';

            // Find the area most touched recently to focus the coaching
            const touchedDays = Object.entries(S.lastTouched||{}).map(([a,d]) => ({area:a, days:daysSince(d)})).filter(x => x.days !== null);
            const stalest = touchedDays.sort((a,b) => (b.days||9999) - (a.days||9999))[0];
            const focusArea = stalest ? `Stalest area: ${getArea(stalest.area).label} (${stalest.days}d ago)` : '';

            const prompt = `You are a warm, direct life coach doing a weekly review. The person values living well, not just doing more.

CRITICAL RULES:
- Do NOT suggest they should be doing more. If anything, suggest what they could do less of, or do with more presence.
- Acknowledge wins AND gaps honestly.
- Notice the joy and the avoidance both.
- Look for cross-area conflicts: if their actions in one area undermine their identity in another, name it gently.
- 4-5 sentences total. No fluff. No bullet lists.
- End with ONE concrete recommendation OR one open question that goes deeper than what they wrote.

Their identity goals:
${getAreas().map(a => `- ${a.label}: ${S.northStar[a.id] || a.identity || '(not set)'}`).join('\n')}

${moodLine}
${focusArea}

This week:
- What happened: ${trunc(U.weekly.answers.q1)}
- What avoided: ${trunc(U.weekly.answers.q2)}
- Joy: ${trunc(U.weekly.answers.q3)}
- Felt like self when: ${trunc(U.weekly.answers.q4)}
- ONE priority next week: ${trunc(U.weekly.answers.q5)}

Respond as a coach who knows when to push and when to bless rest.`;

            const text = await callClaude(prompt, 600);
            const entry = {date:todayKey(), answers:{...U.weekly.answers}, coaching:text};
            S.weeklyLog = [...(S.weeklyLog||[]), entry].slice(-104);
            U.weekly.submitting = false;
            U.weekly.answers = {q1:'',q2:'',q3:'',q4:'',q5:''};
            U.weekly.currentQ = 0;
            U.weekly._lastCoaching = text;
            setState({});
          } catch (e) {
            U.weekly.submitting = false;
            // Still save the answers locally so they're not lost
            const entry = {date:todayKey(), answers:{...U.weekly.answers}, coaching:null, error:String(e.message||e)};
            S.weeklyLog = [...(S.weeklyLog||[]), entry].slice(-104);
            U.weekly._lastCoaching = '⚠ Coaching unavailable right now (' + (e.message||'unknown') + '). Your answers are saved — you can paste them into Claude using the Export for Coaching button in Settings.';
            U.weekly.answers = {q1:'',q2:'',q3:'',q4:'',q5:''};
            U.weekly.currentQ = 0;
            setState({});
          }
        }, 'primary', false, false, {width:'100%',background:'linear-gradient(135deg,#a855f7,#c084fc)',color:'#fff',boxShadow:'0 4px 14px rgba(168,85,247,.3)'}),
        btn('← Edit answers', () => { U.weekly.currentQ = 0; render(); }, 'ghost', true, false, {marginTop:'8px',width:'100%'}),
      ]));
    }
  }

  // Show last coaching response if just generated
  if (U.weekly._lastCoaching) {
    container.appendChild(h('div', {class:'card', style:{background:'linear-gradient(135deg,#faf5ff,#f3e8ff)',border:'1px solid #e9d5ff',marginBottom:'14px'}}, [
      h('span', {class:'slabel', style:{color:'#6366f1'}}, ['Coaching from this review']),
      h('div', {style:{fontSize:'14px',color:C.text,lineHeight:'1.8',whiteSpace:'pre-wrap'}}, [U.weekly._lastCoaching]),
      h('div', {style:{fontSize:'11px',color:C.muted,marginTop:'12px',cursor:'pointer'},
        onClick: () => { delete U.weekly._lastCoaching; render(); }}, ['dismiss']),
    ]));
  }

  // Past reviews — collapsed by default, no answers shown inline (per your noise-reduction request)
  if ((S.weeklyLog||[]).length > 0) {
    container.appendChild(h('div', {style:{marginTop:'18px'}}, [
      h('span', {class:'slabel'}, [`Past reviews (${S.weeklyLog.length})`]),
    ]));

    // Show only most recent 3 by default
    let allOpen = false;
    const reviewsList = h('div', {});
    function renderReviewsList() {
      reviewsList.innerHTML = '';
      const all = [...(S.weeklyLog||[])].reverse();
      const toShow = allOpen ? all.slice(0, 12) : all.slice(0, 3);
      toShow.forEach(log => {
        let open = false;
        let confirmDel = false;
        const c = h('div', {class:'card', style:{marginBottom:'8px',padding:'12px 14px'}});
        const headerRow = h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'},
          onClick: () => {
            open = !open;
            detail.style.display = open?'block':'none';
            chev.textContent = open?'▲':'▼';
          }
        }, [
          h('div', {style:{fontSize:'13px',fontWeight:'700',color:C.text}}, [log.date]),
          (() => { const x = h('span', {style:{fontSize:'12px',color:'#a855f7',fontWeight:'600'}}, ['▼']); return x; })(),
        ]);
        const chev = headerRow.querySelector('span');
        c.appendChild(headerRow);
        const detail = h('div', {style:{display:'none',marginTop:'10px',paddingTop:'10px',borderTop:`1px solid ${C.border}`}});
        if (log.coaching) {
          detail.appendChild(h('div', {style:{fontSize:'10px',color:'#a855f7',fontWeight:'700',letterSpacing:'1px',marginBottom:'6px'}}, ['COACHING']));
          detail.appendChild(h('div', {style:{fontSize:'13px',color:C.text,lineHeight:'1.7',marginBottom:'10px',fontStyle:'italic',whiteSpace:'pre-wrap'}}, [log.coaching]));
        }
        if (log.answers) {
          let answersOpen = false;
          const aToggle = h('div', {style:{fontSize:'11px',color:C.muted,cursor:'pointer',fontWeight:'600'},
            onClick: () => {
              answersOpen = !answersOpen;
              aDetail.style.display = answersOpen?'block':'none';
              aToggle.textContent = answersOpen?'▲ hide my answers':'▼ show my answers';
            }}, ['▼ show my answers']);
          const aDetail = h('div', {style:{display:'none',marginTop:'8px'}});
          [{key:'q1',label:'What happened'},{key:'q2',label:'What I avoided'},{key:'q3',label:'Joy'},{key:'q4',label:'Felt like myself'},{key:'q5',label:'ONE priority'}].filter(q => log.answers[q.key]).forEach(q => {
            aDetail.appendChild(h('div', {style:{marginBottom:'8px'}}, [
              h('div', {style:{fontSize:'10px',color:C.muted,fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'2px'}}, [q.label]),
              h('div', {style:{fontSize:'13px',color:C.sub,lineHeight:'1.5'}}, ['"'+log.answers[q.key]+'"']),
            ]));
          });
          detail.appendChild(aToggle);
          detail.appendChild(aDetail);
        }
        // Delete this review
        const delRow = h('div', {style:{display:'flex',justifyContent:'flex-end',marginTop:'10px',paddingTop:'10px',borderTop:`1px dashed ${C.border}`}});
        const delBtn = h('button', {class:'btn btn-sm', style:{fontSize:'11px',color:'#ef4444',background:'none',border:'1px solid #fecaca',padding:'4px 12px'}}, ['Delete this review']);
        delBtn.addEventListener('click', () => {
          if (!confirmDel) {
            confirmDel = true;
            delBtn.textContent = 'Tap again to confirm';
            delBtn.style.background = '#fee2e2';
            setTimeout(() => { confirmDel = false; if (delBtn.isConnected) { delBtn.textContent = 'Delete this review'; delBtn.style.background = 'none'; } }, 3000);
            return;
          }
          S.weeklyLog = (S.weeklyLog||[]).filter(x => !(x.date === log.date && x.coaching === log.coaching));
          saveState();
          render();
          showToast('Review deleted', '#6b6357', 1500);
        });
        delRow.appendChild(delBtn);
        detail.appendChild(delRow);
        c.appendChild(detail);
        reviewsList.appendChild(c);
      });
      if (all.length > 3) {
        reviewsList.appendChild(h('div', {style:{textAlign:'center',padding:'8px 0'}}, [
          btn(allOpen?'Show less':'Show more', () => { allOpen = !allOpen; renderReviewsList(); }, 'ghost', true),
        ]));
      }
      // Bulk delete affordance
      if (all.length >= 3) {
        reviewsList.appendChild(h('div', {style:{textAlign:'center',padding:'4px 0 12px'}}, [
          h('button', {class:'btn btn-sm', style:{fontSize:'11px',color:'#ef4444',background:'none',border:'1px dashed #fecaca',padding:'4px 12px'},
            onClick: () => {
              modal('Delete all past reviews?', (m, close) => {
                m.appendChild(h('div', {style:{fontSize:'14px',color:C.sub,lineHeight:'1.7',marginBottom:'18px'}}, [
                  `This will permanently delete all ${all.length} reviews. Export them first if you want a backup.`
                ]));
                m.appendChild(h('div', {style:{display:'flex',gap:'10px'}}, [
                  btn('Cancel', () => close(), 'ghost', false, false, {flex:'1'}),
                  btn('Delete all', () => {
                    S.weeklyLog = [];
                    saveState();
                    render();
                    close();
                    showToast('All reviews deleted', '#6b6357', 2000);
                  }, 'primary', false, false, {flex:'1',background:'#ef4444',color:'#fff'}),
                ]));
              });
            }
          }, ['Delete all past reviews']),
        ]));
      }
    }
    renderReviewsList();
    container.appendChild(reviewsList);
  }
}

function renderProgress(container) {
  // Bar chart — last 7 days completions
  const bars = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i*86400000);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const td = (S.completionLog||[]).filter(e => e.date===k).length;
    const hd = S.habits.filter(hb => (S.habitLog[k]||{})[hb.id]).length;
    bars.push({label:d.toLocaleDateString('en-US',{weekday:'short'}), tasks:td, habits:hd, total:td+hd});
  }
  const maxBar = Math.max(...bars.map(b => b.total), 1);

  const bc = h('div', {class:'card', style:{marginBottom:'12px'}});
  bc.appendChild(h('span', {class:'slabel'}, ['Daily Completions — Last 7 Days']));
  const barCt = h('div', {style:{display:'flex',alignItems:'flex-end',gap:'6px',height:'80px',marginBottom:'8px'}});
  bars.forEach(b => {
    const col = h('div', {style:{flex:'1',display:'flex',flexDirection:'column',alignItems:'center',gap:'3px'}});
    const stack = h('div', {style:{width:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'70px',gap:'2px'}});
    if (b.habits>0) stack.appendChild(h('div', {style:{width:'100%',height:((b.habits/maxBar)*60)+'px',background:'linear-gradient(135deg,#10b981,#6ee7b7)',borderRadius:'4px 4px 0 0',minHeight:'4px'}}));
    if (b.tasks>0) stack.appendChild(h('div', {style:{width:'100%',height:((b.tasks/maxBar)*60)+'px',background:'linear-gradient(135deg,#6366f1,#a5b4fc)',borderRadius:'4px 4px 0 0',minHeight:'4px'}}));
    col.appendChild(stack);
    col.appendChild(h('div', {style:{fontSize:'10px',color:C.muted,fontWeight:'600'}}, [b.label]));
    if (b.total>0) col.appendChild(h('div', {style:{fontSize:'10px',color:C.sub,fontWeight:'700'}}, [String(b.total)]));
    barCt.appendChild(col);
  });
  bc.appendChild(barCt);
  bc.appendChild(h('div', {style:{display:'flex',gap:'12px'}}, [
    h('div', {style:{display:'flex',alignItems:'center',gap:'5px'}}, [h('div', {style:{width:'10px',height:'10px',borderRadius:'2px',background:'#6366f1'}}), h('span', {style:{fontSize:'11px',color:C.muted}}, ['Tasks'])]),
    h('div', {style:{display:'flex',alignItems:'center',gap:'5px'}}, [h('div', {style:{width:'10px',height:'10px',borderRadius:'2px',background:'#10b981'}}), h('span', {style:{fontSize:'11px',color:C.muted}}, ['Habits'])]),
  ]));
  container.appendChild(bc);

  // Habit streaks
  const hc = h('div', {class:'card', style:{marginBottom:'12px'}});
  hc.appendChild(h('span', {class:'slabel'}, ['Habit Streaks']));
  S.habits.forEach(hb => {
    const streak = calcStreak(S.habitLog||{}, hb.id);
    const row = h('div', {style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'9px'}});
    row.appendChild(h('span', {style:{fontSize:'18px'}}, [hb.icon]));
    const info = h('div', {style:{flex:'1'}});
    info.appendChild(h('div', {style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}, [
      h('span', {style:{fontSize:'13px',fontWeight:'600',color:C.text}}, [hb.label]),
      h('span', {style:{fontSize:'12px',fontWeight:'700',color:streak>0?hb.color:C.muted}}, [streak>0?'🔥 '+streak+' days':'—']),
    ]));
    info.appendChild(h('div', {class:'progress-bar'}, [h('div', {class:'progress-fill', style:{width:Math.min(streak/30,1)*100+'%', background:hb.color}})]));
    row.appendChild(info);
    hc.appendChild(row);
  });
  container.appendChild(hc);

  // Goals by area
  const gc = h('div', {class:'card'});
  gc.appendChild(h('span', {class:'slabel'}, ['Goal Progress']));
  getAreas().forEach(a => {
    const area = a.id;
    const tasks = S.goalTasks[area] || [];
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pct = total ? (done/total)*100 : 0;
    const row = h('div', {style:{marginBottom:'10px'}});
    row.appendChild(h('div', {style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}, [
      h('span', {style:{fontSize:'13px',fontWeight:'600',color:C.text}}, [a.icon+' '+a.label]),
      h('span', {style:{fontSize:'12px',fontWeight:'700',color:a.color}}, [done+'/'+total]),
    ]));
    row.appendChild(h('div', {class:'progress-bar'}, [h('div', {class:'progress-fill', style:{width:pct+'%', background:a.color}})]));
    gc.appendChild(row);
  });
  container.appendChild(gc);
}

function renderSettings() {
  const els = [];

  // Pause card
  const pauseCard = h('div', {class:'card', style:{border:'1px solid #fde68a',background:'#fffbeb'}});
  pauseCard.appendChild(h('span', {class:'slabel', style:{color:'#92400e'}}, ['🌿 Take a break']));
  pauseCard.appendChild(h('div', {style:{fontSize:'13px',color:'#78350f',lineHeight:'1.6',marginBottom:'12px'}}, [

  ]));
  if (isPaused()) {
    pauseCard.appendChild(h('div', {style:{fontSize:'13px',color:'#92400e',marginBottom:'10px'}}, [`Currently paused until ${S.pausedUntil}.`]));
    pauseCard.appendChild(btn('Resume now', () => { setState({pausedUntil:null}); showToast('Welcome back.', '#10b981'); }, 'primary', false, false, {background:'#92400e',width:'100%'}));
  } else {
    const opts = [
      {label:'Pause for 3 days', days:3},

      {label:'Pause for 2 weeks', days:14},

    const r = h('div', {style:{display:'flex',flexDirection:'column',gap:'8px'}});

      r.appendChild(btn(o.label, () => {

        const until = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        setState({pausedUntil:until});
        showToast('🌿 Paused. Take care of yourself.', '#92400e', 3000);
      }, 'ghost', false, false, {borderColor:'#fcd34d',color:'#92400e',width:'100%'}));
    });
    pauseCard.appendChild(r);
  }
  els.push(pauseCard);

  // Export for coaching — focused, ready-to-paste
  const coachCard = h('div', {class:'card', style:{border:'1px solid #5eead4',background:'linear-gradient(135deg,#f0fdfa,#ccfbf1)'}});
  coachCard.appendChild(h('span', {class:'slabel', style:{color:'#0f766e'}}, ['🤖 Export for Claude Coaching']));
  coachCard.appendChild(h('div', {style:{fontSize:'13px',color:'#115e59',lineHeight:'1.6',marginBottom:'10px'}}, [
    "Generates a focused summary (recent reviews + goals + patterns) plus a coaching prompt. Paste into Claude for deeper coaching."
  ]));

  let coachOpen = U.settings.showCoachExport || false;
  let coachText = '';

  function renderCoachInner() {
    const inner = coachCard.querySelector('.coach-inner');
    if (inner) inner.remove();
    const w = h('div', {class:'coach-inner'});
    if (!coachOpen) {
      w.appendChild(btn('Generate coaching package →', () => {
        // Build it
        const recent = (S.weeklyLog||[]).slice(-4).map(l => {
          const a = l.answers || {};
          return `Week of ${l.date}:
• What happened: ${a.q1||'(skipped)'}
• What avoided: ${a.q2||'(skipped)'}
• Joy: ${a.q3||'(skipped)'}
• Felt like self: ${a.q4||'(skipped)'}
• ONE priority: ${a.q5||'(skipped)'}${l.coaching ? '\n• Previous coaching: ' + l.coaching : ''}`;
        }).join('\n\n---\n\n');

        const habitData = S.habits.map(hb => {
          const s = calcStreak(S.habitLog||{}, hb.id);
          return `${hb.label}: ${s}-day streak`;
        }).join(', ');

        const moods = Object.entries(S.dailyIntentions||{})
          .sort((a,b) => a[0] < b[0] ? 1 : -1).slice(0,14)
          .map(([d,v]) => v.mood ? `${d}: ${v.mood}${v.connection?'/'+v.connection:''}` : null)
          .filter(Boolean).join(', ');

        coachText = `# Life Compass — Coaching Package

## My identity goals
${getAreas().map(a => `- ${a.label}: ${S.northStar[a.id] || a.identity || '(not set)'}`).join('\n')}

## Last 4 weekly reviews
${recent || '(no reviews yet)'}

## Habits
${habitData || '(none tracked)'}

## Recent moods
${moods || '(none logged)'}

---

## Prompt for you, Claude:

You are my life coach, and we're having a real conversation. You know me through the data above.

Read it carefully. Look for patterns I might not see myself — especially:
- What I keep avoiding, and what that might mean
- Where my actions and identity goals are out of alignment with each other
- Cross-area conflicts: where success in one area is quietly costing me in another
- What's working that I should protect
- What I might do less of (not more)

Start by sharing the most important pattern you notice — the thing that, if I really sat with it, might shift something. 4-6 sentences, warm but honest. No bullet lists. No "you should do X, Y, and Z."

Then ask me ONE follow-up question that goes deeper than what I wrote — the kind only a coach who knows me would ask. Something that opens a real conversation, not a yes/no.

After my reply, keep the conversation going. Push back gently when needed. Reflect what you hear. Don't rush to solutions. Don't suggest more activity unless I ask. Sometimes the right move is rest, presence, or letting go — be willing to say that.

Above all: be the thinking partner I can't get from inside my own head.`;

        coachOpen = true;
        U.settings.showCoachExport = true;
        renderCoachInner();
      }, 'primary', false, false, {background:'linear-gradient(135deg,#14b8a6,#2dd4bf)',color:'#fff',width:'100%',boxShadow:'0 2px 8px rgba(20,184,166,.25)'}));
    } else {
      const ta = h('textarea', {class:'inp', style:{minHeight:'180px',fontSize:'12px',fontFamily:'monospace',lineHeight:'1.5'}});
      ta.value = coachText;
      ta.readOnly = true;
      w.appendChild(ta);
      w.appendChild(h('div', {style:{display:'flex',gap:'8px',marginTop:'10px'}}, [
        btn('📋 Copy', async () => {
          try { await navigator.clipboard.writeText(coachText); showToast('✓ Copied! Paste into Claude.', '#10b981', 2500); }
          catch(e) { ta.select(); document.execCommand('copy'); showToast('✓ Copied', '#10b981'); }
        }, 'primary', false, false, {background:'linear-gradient(135deg,#14b8a6,#2dd4bf)',color:'#fff',flex:'1',boxShadow:'0 2px 8px rgba(20,184,166,.25)'}),
        btn('Close', () => { coachOpen = false; U.settings.showCoachExport = false; renderCoachInner(); }, 'ghost'),
      ]));
    }
    coachCard.appendChild(w);
  }
  renderCoachInner();
  els.push(coachCard);

  // North Star editing — iterates user areas, with remove button per area
  const nsCard = h('div', {class:'card', style:{border:'1px solid #fcd34d', background:'linear-gradient(135deg,#fffbeb,#fef3c7)'}});
  nsCard.appendChild(h('span', {class:'slabel', style:{color:'#92400e'}}, ['🧭 Your Life Areas']));
  nsCard.appendChild(h('div', {style:{fontSize:'12px',color:C.sub,marginBottom:'12px',lineHeight:'1.5'}}, ['These shape your coaching. Edit identity statements, or remove an area entirely.']));

  let pendingRemoveId = null;
  function refreshAreas() {
    const list = nsCard.querySelector('.areas-list');
    if (list) list.remove();
    const newList = h('div', {class:'areas-list'});

    getAreas().forEach(a => {
      const row = h('div', {style:{marginBottom:'14px',padding:'10px 12px',background:'#fff',borderRadius:'12px',border:`1px solid ${a.color}33`}});
      row.appendChild(h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}}, [
        h('div', {style:{fontSize:'12px',fontWeight:'700',color:a.color,display:'flex',alignItems:'center',gap:'6px'}}, [
          h('span', {style:{fontSize:'15px'}}, [a.icon]),
          h('span', {}, [a.label]),
        ]),
        pendingRemoveId === a.id
          ? h('div', {style:{display:'flex',gap:'4px'}}, [
              h('button', {class:'btn btn-sm', style:{fontSize:'11px',color:'#fff',background:'#ef4444',padding:'4px 10px'},
                onClick: () => {
                  if (getAreas().length <= 1) { showToast('Keep at least one area', '#ef4444'); pendingRemoveId = null; refreshAreas(); return; }
                  const newAreas = getAreas().filter(x => x.id !== a.id);
                  const newGT = {...(S.goalTasks||{})}; delete newGT[a.id];
                  const newCS = {...(S.currentStage||{})}; delete newCS[a.id];
                  const newLT = {...(S.lastTouched||{})}; delete newLT[a.id];
                  const newNS = {...(S.northStar||{})}; delete newNS[a.id];
                  S = {...S, areas:newAreas, goalTasks:newGT, currentStage:newCS, lastTouched:newLT, northStar:newNS};
                  pendingRemoveId = null;
                  saveState();
                  refreshAreas();
                  showToast('Removed', '#6b6357', 1500);
                }}, ['Remove']),
              h('button', {class:'btn btn-sm btn-ghost', style:{fontSize:'11px',padding:'4px 10px'},
                onClick: () => { pendingRemoveId = null; refreshAreas(); }}, ['Cancel']),
            ])
          : h('button', {style:{background:'none',border:'none',color:C.muted,fontSize:'14px',cursor:'pointer'}, onClick: () => { pendingRemoveId = a.id; refreshAreas(); }}, ['×']),
      ]));
      const ta = h('textarea', {class:'inp', rows:'2', placeholder:`I am someone who...`, style:{resize:'none',minHeight:'56px',background:'#fff'}});
      ta.value = S.northStar[a.id] || a.identity || '';
      ta.addEventListener('blur', e => {
        const val = e.target.value.trim();
        if (val !== (S.northStar[a.id] || '')) {
          const newAreas = getAreas().map(x => x.id === a.id ? {...x, identity: val} : x);
          S = {...S, northStar:{...S.northStar, [a.id]:val}, areas:newAreas};
          saveState();
          showToast('✓ '+a.label+' updated', a.color, 1500);
        }
      });
      row.appendChild(ta);
      newList.appendChild(row);
    });

    // Add area button
    if (!U.settings._addingArea) {
      newList.appendChild(h('button', {class:'btn btn-ghost', style:{width:'100%',padding:'10px',borderStyle:'dashed',color:C.sub,fontSize:'13px',marginTop:'4px'},
        onClick: () => { U.settings._addingArea = {label:'',icon:'⭐',identity:''}; refreshAreas(); }
      }, ['+ Add a new area']));
    } else {
      const draft = U.settings._addingArea;
      const c = h('div', {style:{padding:'12px',background:'#faf5ff',border:'1.5px dashed #a855f7',borderRadius:'12px',marginTop:'4px'}});
      c.appendChild(h('div', {style:{fontSize:'11px',color:C.primary,fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}}, ['NEW LIFE AREA']));
      const iconI = h('input', {class:'inp', style:{width:'52px',textAlign:'center',padding:'8px 4px',fontSize:'18px',flexShrink:'0',background:'#fff'}, value:draft.icon});
      iconI.addEventListener('input', e => { draft.icon = e.target.value.trim() || '⭐'; });
      const labelI = h('input', {class:'inp', style:{flex:'1',background:'#fff'}, placeholder:'e.g. Music', maxlength:'30', value:draft.label});
      labelI.addEventListener('input', e => { draft.label = e.target.value; });
      c.appendChild(h('div', {style:{display:'flex',gap:'8px',marginBottom:'8px'}}, [iconI, labelI]));
      const idTa = h('textarea', {class:'inp', rows:'2', placeholder:'I am someone who...', style:{resize:'none',minHeight:'48px',background:'#fff'}});
      idTa.value = draft.identity;
      idTa.addEventListener('input', e => { draft.identity = e.target.value; });
      c.appendChild(idTa);
      c.appendChild(h('div', {style:{display:'flex',gap:'8px',marginTop:'10px'}}, [
        btn('Cancel', () => { delete U.settings._addingArea; refreshAreas(); }, 'ghost', true),
        btn('Add area', () => {
          if (!draft.label.trim()) { showToast('Give it a name', '#a855f7'); return; }
          const COLORS = ['#a855f7','#10b981','#6366f1','#ec4899','#a855f7','#14b8a6','#f59e0b','#0ea5e9','#84cc16','#f472b6'];
          const existing = getAreas();
          const newArea = { id: 'a_' + uid(), label: draft.label.trim(), icon: draft.icon, color: COLORS[existing.length % COLORS.length], identity: draft.identity.trim(), why: '' };
          S = {
            ...S,
            areas: [...existing, newArea],
            goalTasks: {...(S.goalTasks||{}), [newArea.id]: []},
            currentStage: {...(S.currentStage||{}), [newArea.id]: 1},
            lastTouched: {...(S.lastTouched||{}), [newArea.id]: null},
            northStar: {...(S.northStar||{}), [newArea.id]: draft.identity.trim()},
          };
          delete U.settings._addingArea;
          saveState();
          refreshAreas();
          showToast('✓ Added '+newArea.label, newArea.color);
        }, 'primary', true, false, {flex:'1'}),
      ]));
      newList.appendChild(c);
    }

    nsCard.appendChild(newList);
  }
  refreshAreas();
  els.push(nsCard);

  // Habits editing
  const habitCard = h('div', {class:'card', style:{border:'1px solid #e9d5ff'}});
  habitCard.appendChild(h('span', {class:'slabel', style:{color:'#7c3aed'}}, ['🔁 Daily Habits']));
  habitCard.appendChild(h('div', {style:{fontSize:'12px',color:C.sub,marginBottom:'12px',lineHeight:'1.5'}}, ['Edit, add, or remove. Streak history is preserved on rename.']));

  let pendingDelId = null;
  function refreshHabits() {
    const list = habitCard.querySelector('.habits-list');
    if (list) list.remove();
    const newList = h('div', {class:'habits-list'});

    S.habits.forEach((hb, idx) => {
      const row = h('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',padding:'10px 12px',background:hb.color+'0f',border:`1px solid ${hb.color}33`,borderRadius:'12px'}});
      const emojiInp = h('input', {class:'inp', style:{width:'46px',textAlign:'center',padding:'6px 2px',fontSize:'18px',background:'#fff',flexShrink:'0'}, value:hb.icon});
      emojiInp.addEventListener('blur', e => {
        const ni = e.target.value.trim() || hb.icon;
        if (ni !== hb.icon) {
          S = {...S, habits:S.habits.map((x,i) => i===idx ? {...x, icon:ni} : x)};
          saveState();
        }
      });
      row.appendChild(emojiInp);

      const nameInp = h('input', {class:'inp', style:{flex:'1',background:'#fff'}, value:hb.label});
      nameInp.addEventListener('blur', e => {
        const nl = e.target.value.trim() || hb.label;
        if (nl !== hb.label) {
          S = {...S, habits:S.habits.map((x,i) => i===idx ? {...x, label:nl} : x)};
          saveState();
        }
      });
      row.appendChild(nameInp);

      if (pendingDelId === hb.id) {
        const cr = h('div', {style:{display:'flex',gap:'6px',flexShrink:'0'}});
        cr.appendChild(btn('Delete', () => {
          if (S.habits.length <= 1) { showToast('Keep at least one', '#ef4444'); pendingDelId = null; refreshHabits(); return; }
          S = {...S, habits:S.habits.filter(x => x.id !== hb.id)};
          pendingDelId = null;
          saveState();
          refreshHabits();
        }, 'ghost', true, false, {color:'#ef4444',borderColor:'#fecaca',fontSize:'12px'}));
        cr.appendChild(btn('Cancel', () => { pendingDelId = null; refreshHabits(); }, 'ghost', true));
        row.appendChild(cr);
      } else {
        const x = h('button', {style:{background:'none',border:'none',color:'#cbd5e1',fontSize:'18px',cursor:'pointer',padding:'4px',flexShrink:'0'}}, ['×']);
        x.addEventListener('click', () => { pendingDelId = hb.id; refreshHabits(); });
        row.appendChild(x);
      }
      newList.appendChild(row);
    });

    // Add new
    const addSec = h('div', {style:{marginTop:'12px',paddingTop:'12px',borderTop:'1px solid #e9d5ff'}});

    // Suggestions not yet added
    const remaining = SUGGESTED_HABITS.filter(s => !S.habits.find(h => h.label === s.label));
    if (remaining.length > 0) {
      addSec.appendChild(h('div', {style:{fontSize:'11px',color:'#7c3aed',fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}}, ['SUGGESTIONS — TAP TO ADD']));
      const suggW = h('div', {style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'12px'}});
      remaining.forEach(s => {
        suggW.appendChild(h('div', {style:{display:'flex',alignItems:'center',gap:'5px',padding:'5px 11px',background:'#fff',border:`1.5px dashed ${s.color}55`,borderRadius:'24px',fontSize:'12px',fontWeight:'600',color:C.sub,cursor:'pointer'},
          onClick: () => {
            S = {...S, habits:[...S.habits, {id:`h_${uid()}`, label:s.label, icon:s.icon, color:s.color, desc:s.desc}]};
            saveState();
            refreshHabits();
          }
        }, [
          h('span', {style:{fontSize:'13px'}}, [s.icon]),
          h('span', {}, [s.label]),
          h('span', {style:{color:s.color,fontWeight:'800'}}, ['+']),
        ]));
      });
      addSec.appendChild(suggW);
    }

    addSec.appendChild(h('div', {style:{fontSize:'11px',color:'#7c3aed',fontWeight:'700',letterSpacing:'1px',marginBottom:'8px'}}, ['OR WRITE YOUR OWN']));
    let nIcon = '⭐', nLabel = '';
    const nE = h('input', {class:'inp', style:{width:'46px',textAlign:'center',padding:'6px 2px',fontSize:'18px',background:'#fff',flexShrink:'0'}, value:nIcon});
    nE.addEventListener('input', e => { nIcon = e.target.value.trim() || '⭐'; });
    const nN = h('input', {class:'inp', style:{flex:'1',background:'#fff'}, placeholder:'Habit name...'});
    nN.addEventListener('input', e => { nLabel = e.target.value; });
    const aB = btn('Add', () => {
      const lbl = nLabel.trim();
      if (!lbl) { showToast('Enter a name', '#ef4444', 1500); return; }
      const colors = ['#8b5cf6','#0ea5e9','#10b981','#f59e0b','#6366f1','#a855f7','#ec4899','#14b8a6'];
      const color = colors[S.habits.length % colors.length];
      S = {...S, habits:[...S.habits, {id:`h_${uid()}`, label:lbl, icon:nE.value.trim()||'⭐', color, desc:''}]};
      saveState();
      nN.value = ''; nLabel = ''; nE.value = '⭐'; nIcon = '⭐';
      refreshHabits();
    }, 'primary', true, false, {background:'#7c3aed',color:'#fff',whiteSpace:'nowrap'});
    nN.addEventListener('keydown', e => { if (e.key === 'Enter') aB.click(); });
    addSec.appendChild(h('div', {style:{display:'flex',gap:'8px',alignItems:'center'}}, [nE, nN, aB]));
    newList.appendChild(addSec);
    habitCard.appendChild(newList);
  }
  refreshHabits();
  els.push(habitCard);

  // Backup / Restore
  const backupCard = h('div', {class:'card'});
  backupCard.appendChild(h('span', {class:'slabel'}, ['💾 Backup & Restore']));
  backupCard.appendChild(h('div', {style:{fontSize:'12px',color:C.sub,marginBottom:'10px',lineHeight:'1.5'}}, ['Your data is encrypted on this device only. Export gives you a plaintext copy you can save elsewhere.']));
  backupCard.appendChild(h('div', {style:{display:'flex',gap:'8px',flexWrap:'wrap'}}, [
    btn('Export JSON', () => {
      const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `life-compass-${todayKey()}.json`; a.click();
      URL.revokeObjectURL(url);
      showToast('✓ Exported', '#10b981');
    }, 'ghost'),
    btn('Import JSON', () => {
      const inputEl = document.createElement('input');
      inputEl.type = 'file'; inputEl.accept = '.json,application/json';
      inputEl.onchange = e => {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            const migrated = migrate(data);
            S = migrated;
            saveState();
            render();
            showToast('✓ Restored', '#10b981', 2500);
          } catch (err) {
            showToast('⚠ Invalid file', '#ef4444', 3000);
          }
        };
        r.readAsText(f);
      };
      inputEl.click();
    }, 'ghost'),
  ]));
  els.push(backupCard);

  // "Use this on your phone" — practical guide
  const phoneCard = h('div', {class:'card', style:{background:'linear-gradient(135deg,#faf5ff,#f3e8ff)',border:'1px solid #e9d5ff'}});
  phoneCard.appendChild(h('span', {class:'slabel', style:{color:'#7e22ce'}}, ['📱 Use this on your phone']));
  phoneCard.appendChild(h('div', {style:{fontSize:'13px',color:'#581c87',lineHeight:'1.7',marginBottom:'10px'}}, [
    "All your data lives on the device you set it up on. To use Life Compass on your phone, you have two options:",
  ]));

  let phoneOpen = U.settings._phoneOpen || false;
  function renderPhoneInner() {
    const inner = phoneCard.querySelector('.phone-inner');
    if (inner) inner.remove();
    const w = h('div', {class:'phone-inner'});
    if (!phoneOpen) {
      w.appendChild(btn('Show me how →', () => { phoneOpen = true; U.settings._phoneOpen = true; renderPhoneInner(); }, 'primary', false, false, {background:'linear-gradient(135deg,#a855f7,#c084fc)',color:'#fff',width:'100%'}));
    } else {
      w.appendChild(h('div', {style:{fontSize:'13px',color:C.text,lineHeight:'1.7',marginBottom:'12px'}}, [
        h('div', {style:{fontWeight:'700',marginBottom:'4px'}}, ['Option A — quick & simple:']),
        h('div', {style:{marginBottom:'10px'}}, [
          "Email yourself this app.html file. On your phone, save it to Files, tap to open it in Safari/Chrome, then ",
          h('strong', {}, ['Add to Home Screen']),
          ". It runs like an app, fully offline. ",
          h('strong', {style:{color:'#dc2626'}}, ['Risk:']),
          " if you clear your browser data, your journal is gone. Export a backup occasionally.",
        ]),
        h('div', {style:{fontWeight:'700',marginBottom:'4px',marginTop:'14px'}}, ['Option B — best for daily use:']),
        h('div', {}, [
          "Drop this file on a free host (Netlify Drop, Vercel, GitHub Pages — drag-and-drop in 30 seconds). Bookmark the URL on your phone, ",
          h('strong', {}, ['Add to Home Screen']),
          ". Same private/local data, but the app file lives at a stable URL so you won't lose access to it.",
        ]),
      ]));
      w.appendChild(h('div', {style:{fontSize:'12px',color:'#7e22ce',lineHeight:'1.6',background:'#fff',padding:'10px 12px',borderRadius:'10px',border:'1px solid #e9d5ff',marginBottom:'10px'}}, [
        h('strong', {}, ['Important: ']),
        "your data lives on each device separately. Your phone version and laptop version won't sync. That's by design — nothing leaves your device. To move data: use Export JSON below, then Import on the other device.",
      ]));
      w.appendChild(h('div', {style:{fontSize:'12px',color:C.sub,lineHeight:'1.6'}}, [
        h('strong', {}, ['Note on coaching: ']),
        "the in-app weekly coaching only works inside Claude Artifacts (where this was built). Once deployed elsewhere, use ",
        h('strong', {}, ['Export for Claude Coaching']),
        " above and paste into Claude directly — that's the better experience anyway since you can have a real conversation.",
      ]));
      w.appendChild(btn('Hide', () => { phoneOpen = false; U.settings._phoneOpen = false; renderPhoneInner(); }, 'ghost', true, false, {marginTop:'10px'}));
    }
    phoneCard.appendChild(w);
  }
  renderPhoneInner();
  els.push(phoneCard);

  // Reset
  const resetCard = h('div', {class:'card', style:{border:'1px solid #fecaca'}});
  resetCard.appendChild(h('span', {class:'slabel', style:{color:'#ef4444'}}, ['⚠ Danger zone']));
  if (!U.settings.showReset) {
    resetCard.appendChild(btn('Reset all data', () => { U.settings.showReset = true; render(); }, 'ghost', true, false, {color:'#ef4444',borderColor:'#fecaca'}));
  } else {
    resetCard.appendChild(h('div', {style:{fontSize:'13px',color:'#991b1b',marginBottom:'10px',lineHeight:'1.5'}}, ['This permanently deletes everything and restarts setup. Export first if you want a backup.']));
    resetCard.appendChild(h('div', {style:{display:'flex',gap:'8px'}}, [
      btn('Cancel', () => { U.settings.showReset = false; render(); }, 'ghost', true),
      btn('Yes, reset everything', () => { S = defaultState(); U.settings.showReset = false; saveState(); render(); }, 'primary', true, false, {background:'#ef4444'}),
    ]));
  }
  els.push(resetCard);

  return els;
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════════
const NAV_ITEMS = [
  {id:'today',    label:'Today',     icon:'☀️'},
  {id:'now',      label:'Right Now', icon:'⚡'},
  {id:'goals',    label:'Goals',     icon:'🎯'},
  {id:'tasks',    label:'Admin',     icon:'📋'},
  {id:'weekly',   label:'Weekly',    icon:'📅'},
  {id:'settings', label:'Settings',  icon:'⚙️'},
];

function render() {
  const root = document.getElementById('root');
  try {
    if (!S.setupDone) { renderSetup(); return; }

    root.innerHTML = '';

    const today = todayKey();
    const habitsDone = S.habits.filter(hb => (S.habitLog[today]||{})[hb.id]).length;
    const overdue = (S.adminTasks||[]).filter(t => !t.done && t.deadline && t.deadline <= today).length;
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

    // Header
    root.appendChild(h('div', {id:'header'}, [
      h('div', {}, [
        h('div', {style:{fontSize:'16px',fontWeight:'900',color:'#fff'}}, ['🧭 Life Compass']),
        h('div', {style:{fontSize:'11px',color:'#faf2ff'}}, [new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})]),
      ]),
      h('div', {style:{display:'flex',gap:'8px',alignItems:'center'}}, [
        h('span', {style:{background:'rgba(255,255,255,.2)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',borderRadius:'20px',padding:'3px 10px',fontSize:'11px',fontWeight:'700'}}, [habitsDone+'/'+S.habits.length]),
        overdue>0 ? h('span', {style:{background:'rgba(239,68,68,.2)',color:'#fca5a5',border:'1px solid rgba(239,68,68,.3)',borderRadius:'20px',padding:'3px 10px',fontSize:'11px',fontWeight:'700'}}, ['⚠ '+overdue]) : null,
      ]),
    ]));

    // Page title with save indicator
    const tabLabel = NAV_ITEMS.find(n => n.id === U.currentTab);
    root.appendChild(h('div', {id:'pagetitle'}, [
      h('div', {}, [
        h('div', {style:{fontSize:'18px',fontWeight:'900',color:C.text}}, [
          U.currentTab==='today'?greeting+'.':
          U.currentTab==='now'?'⚡ Right now':
          U.currentTab==='settings'?'⚙️ Settings':
          (tabLabel?.icon||'')+' '+(tabLabel?.label||'')
        ]),
        h('div', {style:{fontSize:'12px',color:C.sub,marginTop:'1px',display:'flex',alignItems:'center',gap:'8px'}}, [
          U.currentTab==='today'?"Let's make today count.":
          U.currentTab==='now'?'Tasks matched to your time.':
          U.currentTab==='goals'?'Stage by stage.':
          U.currentTab==='tasks'?'Parking lot for life stuff that just needs to get done.':
          U.currentTab==='weekly'?'Reflection and progress.':
          U.currentTab==='settings'?'Backup, pause, customize.':'',
          h('span', {id:'saveIndicator', style:{fontSize:'11px'}}, ['']),
        ]),
      ]),
    ]));

    // Content
    const content = h('div', {id:'app', class:'fade-in'});
    let tabEls = [];
    if (U.currentTab === 'today')         tabEls = renderToday();
    else if (U.currentTab === 'now')      tabEls = renderRightNow();
    else if (U.currentTab === 'goals')    tabEls = renderGoals();
    else if (U.currentTab === 'tasks')    tabEls = renderTasks();
    else if (U.currentTab === 'weekly')   tabEls = renderWeekly();
    else if (U.currentTab === 'settings') tabEls = renderSettings();
    tabEls.forEach(el => { if (el) content.appendChild(el); });
    root.appendChild(content);

    // Nav
    const nav = h('div', {id:'nav'});
    NAV_ITEMS.forEach(item => {
      const nb = h('button', {class:'nav-btn'+(U.currentTab===item.id?' active':''),
        onClick: () => { U.currentTab = item.id; render(); }
      }, [
        h('span', {class:'nav-icon'}, [item.icon]),
        h('span', {class:'nav-label'}, [item.label.toUpperCase()]),
      ]);
      if (U.currentTab === item.id) nb.appendChild(h('div', {class:'nav-dot'}));
      nav.appendChild(nb);
    });
    root.appendChild(nav);

    updateSaveIndicator();
  } catch (err) {
    console.error('Render error:', err);
    root.innerHTML = '';
    root.appendChild(h('div', {style:{padding:'20px',color:'#ef4444',background:'#fff',margin:'20px',borderRadius:'12px',border:'1px solid #fecaca'}}, ['⚠ App error: '+err.message+'. Try Settings → Export to back up, then reload.']));
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════════

// ── Boot: load state from localStorage, then render ───────────────────────────
(function boot() {
  const saved = loadState();
  if (saved) S = saved;

  // Sunday reset prompt — gentle, opt-in
  const today = todayKey();
  const isSunday = new Date().getDay() === 0;
  if (S.setupDone && isSunday && S.lastSundayClear !== today && !isPaused()) {
    const doneAdmin = (S.adminTasks||[]).filter(t => t.done).length;
    const doneGoals = Object.values(S.goalTasks||{}).flat().filter(t => t.done).length;
    if (doneAdmin > 0 || doneGoals > 0) {
      setTimeout(() => {
        modal('🌿 New week, fresh start?', (m, close) => {
          m.appendChild(h('div', {style:{fontSize:'14px',color:C.sub,lineHeight:'1.7',marginBottom:'18px'}}, [
            `It's Sunday. You completed ${doneAdmin+doneGoals} task${doneAdmin+doneGoals===1?'':'s'} this week. Clear them to start fresh, or keep them visible.`
          ]));
          m.appendChild(h('div', {style:{display:'flex',gap:'10px',flexDirection:'column'}}, [
            btn('Clear completed tasks', () => {
              S.adminTasks = (S.adminTasks||[]).filter(t => !t.done);
              const newGT = {};
              Object.entries(S.goalTasks||{}).forEach(([a, ts]) => { newGT[a] = (ts||[]).filter(t => !t.done); });
              S.goalTasks = newGT;
              S.lastSundayClear = today;
              saveState();
              render();
              close();
              showToast('✓ Cleared — new week!', '#10b981', 2500);
            }, 'primary', false, false, {background:'linear-gradient(135deg,#10b981,#34d399)',color:'#fff'}),
            btn('Keep them for now', () => { S.lastSundayClear = today; saveState(); close(); }, 'ghost'),
          ]));
        });
      }, 800);
    } else {
      S.lastSundayClear = today;
      saveState(true);
    }
  }

  render();

  // Save on backgrounding
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveState(true); });
  window.addEventListener('beforeunload', () => saveState(true));
})();
</script>
