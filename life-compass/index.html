<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Compass</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(196,98,45,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(44,62,107,0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 36px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.6s ease both;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #fff;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
      margin-bottom: 36px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    input[type="password"] {
      width: 100%;
      padding: 16px 48px 16px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 16px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: rgba(196,98,45,0.6);
    }

    input[type="password"]::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .toggle-pw:hover { opacity: 1; }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #c4622d, #d4843d);
      color: white;
      font-size: 15px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .error {
      margin-top: 14px;
      font-size: 13px;
      color: #ff6b6b;
      opacity: 0;
      transition: opacity 0.3s;
      min-height: 18px;
    }

    .error.show { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <span class="icon">🧭</span>
    <h1>Life Compass</h1>
    <p class="subtitle">Private — enter your password to continue</p>

    <div class="input-wrap">
      <input type="password" id="pw" placeholder="Password" autocomplete="current-password"/>
      <button class="toggle-pw" onclick="togglePw()" title="Show/hide">👁</button>
    </div>

    <button class="btn" onclick="checkPassword()">Unlock →</button>
    <div class="error" id="err">Incorrect password. Try again.</div>
  </div>

  <script>
    // SHA-256 hash of the password (never store plaintext).
    // To change your password: run  crypto.subtle.digest('SHA-256', new TextEncoder().encode('YourNewPassword'))
    // then convert the ArrayBuffer to hex and paste it here.
    const CORRECT_HASH = "b1c4f0e3a8a2d4c5f6e7b8a9d0c1f2e3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9"; // placeholder — replaced on first run

    // Check if already unlocked this session
    if (sessionStorage.getItem('lc_unlocked') === 'yes') {
      window.location.href = './app.html';
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    async function hashPassword(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function checkPassword() {
      const val = document.getElementById('pw').value;
      const hash = await hashPassword(val);

      // On very first use (placeholder hash), accept any non-empty password and store its hash
      const storedHash = localStorage.getItem('lc_pw_hash') || CORRECT_HASH;
      const isFirstRun = !localStorage.getItem('lc_pw_hash') && CORRECT_HASH.startsWith('b1c4f0');

      if (isFirstRun && val.trim()) {
        // First-run: register whatever they type as the password
        localStorage.setItem('lc_pw_hash', hash);
        sessionStorage.setItem('lc_unlocked', 'yes');
        window.location.href = './app.html';
        return;
      }

      if (hash === storedHash) {
        sessionStorage.setItem('lc_unlocked', 'yes');
        window.location.href = './app.html';
      } else {
        const card = document.getElementById('card');
        const err = document.getElementById('err');
        err.classList.add('show');
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
        document.getElementById('pw').value = '';
      }
    }

    function togglePw() {
      const input = document.getElementById('pw');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
