<script>

const CATEGORY_OPTIONS=["health","finances","home","work","family","personal","other"];
const AREA_META={

  ],

    {stage:1,text:"Consolidate all accounts into one view",  time:"30min",why:"Visibility reduces anxiety and reveals patterns."},

const MORNING_QS=["What would make today feel full — not just productive?","If today were great, what would have happened?","What is one thing you could do today just because it matters to you?","Who do you most want to show up for today?","What would future-you thank you for doing today?"];
const EVENING_QS=["What was the best moment today?","When did you feel most like yourself today?","What are you proud of today, even if it is small?","Who made you smile today?","What surprised you today in a good way?"];
const NUDGES=[
  {text:"When life hijacks your day, what is the ONE thing you can still protect?",type:"focus"},
  {text:"Are you being too hard on yourself right now? What would you say to a friend in your position?",type:"compassion"},
  {text:"Your career goal — have you done anything this week that moves you closer?",type:"goal"},
  {text:"When did you last do something purely for fun? When is the next time?",type:"joy"},
  {text:"Your kids: when did you last have real one-on-one time with each of them?",type:"relationships"},
  {text:"What are you proud of this week, even if it is small?",type:"compassion"},
  {text:"What is the one thing you keep moving to tomorrow? What is really in the way?",type:"focus"},
  {text:"If next week looked exactly like this week, would you be okay with that?",type:"reflection"},
  {text:"You are building a life, not just a schedule. Does today reflect what you actually value?",type:"meaning"},
];

// ── Storage ────────────────────────────────────────────────────────────────────
const STORE_KEY="lc-v7";
const todayKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};

function saveState(s){
  const j=JSON.stringify(s);
  // Storage size guard — warn at 3MB, hard-cap weekly/completion logs to prevent silent overflow
  const sizeKB = j.length / 1024;
  if (sizeKB > 3000) {
    // Trim oldest weekly logs and completion log to stay under limit
    if (s.weeklyLog && s.weeklyLog.length > 52) s = {...s, weeklyLog: s.weeklyLog.slice(-52)};
    if (s.completionLog && s.completionLog.length > 365) s = {...s, completionLog: s.completionLog.slice(-365)};
    showToast("⚠ Data trimmed to stay under storage limit — export a backup soon","#f59e0b",4000);
  } else if (sizeKB > 2000) {
    showToast("💾 Data is getting large ("+Math.round(sizeKB)+"kb) — consider exporting a backup","#f59e0b",3500);
  }
  try{localStorage.setItem(STORE_KEY,j);}catch(e){
    showToast("⚠ Local storage full — export your data now!","#ef4444",5000);
  }
  if(window.storage){window.storage.set(STORE_KEY,j).catch(()=>{});}
  showToast("✓ Saved","#10b981",1200);
}
async function loadState(){
  try{const r=await window.storage?.get(STORE_KEY);if(r?.value)return JSON.parse(r.value);}catch(e){}
  try{const r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r);}catch(e){}
  return null;
}
function defaultState(){
  return{
    setupDone:false,
    northStar:{health:"Be consistently energetic, strong, and on top of my health",career:"Find a job that is a genuinely better fit for who I am",finance:"Have clear financial organization and peace of mind",relationships:"Be deeply present for my kids and partner, and maintain real friendships"},
    habitLog:{},completionLog:[],
    goalTasks:{
      health:   GOAL_LIBRARY.health.filter(t=>t.stage===1).map((t,i)=>({...t,id:`h${i}`,done:false,doneAt:null})),
      career:   GOAL_LIBRARY.career.filter(t=>t.stage===1).map((t,i)=>({...t,id:`c${i}`,done:false,doneAt:null})),
      finance:  GOAL_LIBRARY.finance.filter(t=>t.stage===1).map((t,i)=>({...t,id:`f${i}`,done:false,doneAt:null})),
      relationships:GOAL_LIBRARY.relationships.filter(t=>t.stage===1).map((t,i)=>({...t,id:`r${i}`,done:false,doneAt:null})),
    },
    habits:[...DEFAULT_HABITS],adminTasks:[],events:[],todayFocus:[],lastAdminClear:null,
    dailyIntentions:{},weeklyLog:[],nudgeIndex:0,
    currentStage:{health:1,career:1,finance:1,relationships:1},
    lastTouched:{health:null,career:null,finance:null,relationships:null},
  };
}

// ── App State ──────────────────────────────────────────────────────────────────
let S=defaultState();
let currentTab="today";

function setState(newS){S={...S,...newS};render();saveState(S);}

// ── Helpers ────────────────────────────────────────────────────────────────────
function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="class"){el.className=v;}
    else if(k==="html"){el.innerHTML=v;}
    else{el.setAttribute(k,v);}
  }
  for(const c of children){
    if(c===null||c===undefined)continue;
    if(typeof c==="string"||typeof c==="number"){el.appendChild(document.createTextNode(String(c)));}
    else if(c instanceof Node){el.appendChild(c);}
    else if(Array.isArray(c)){c.forEach(cc=>{if(cc instanceof Node)el.appendChild(cc);else if(cc!=null)el.appendChild(document.createTextNode(String(cc)))});}
  }
  return el;
}

function showToast(msg,color="#10b981",dur=2000){
  const t=document.getElementById("toast");
  if(!t)return;
  t.textContent=msg;t.style.background=color;t.style.display="block";t.style.opacity="1";
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>{t.style.opacity="0";setTimeout(()=>{t.style.display="none";},300);},dur);
}

function calcStreak(log,hid){
  let s=0;const d=new Date();
  while(true){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const dl=log[k]||{};
    if(!dl[hid]&&!dl[`skip_${hid}`])break;
    if(dl[hid])s++;
    d.setDate(d.getDate()-1);
  }
  return s;
}

function formatTime(t){
  if(!t)return"";
  const[h,m]=t.split(":").map(Number);
  return`${h%12||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`;
}

function getCountdown(ts){
  const now=new Date();
  const[h,m]=ts.split(":").map(Number);
  const diff=(h*60+m)-(now.getHours()*60+now.getMinutes());
  if(diff<0)return"past";if(diff===0)return"NOW!";
  if(diff<60)return`in ${diff}m`;
  return`in ${Math.floor(diff/60)}h${diff%60?` ${diff%60}m`:""}`;
}

function daysSince(dateStr){
  if(!dateStr)return null;
  return Math.floor((Date.now()-new Date(dateStr+"T12:00:00").getTime())/86400000);
}

function isHardWeek(){
  let empty=0;
  for(let i=1;i<=3;i++){
    const d=new Date(Date.now()-i*86400000);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const hd=getHabits().filter(hb=>(S.habitLog[k]||{})[hb.id]).length;
    const gd=Object.values(S.goalTasks||{}).flat().filter(t=>t.doneAt===k).length;
    if(hd===0&&gd===0)empty++;
  }
  return empty>=2;
}

function getAdaptiveNudge(){
  const today=todayKey();
  const energy=((S.dailyIntentions||{})[today]||{}).energy;
  if(energy==="low"){
    const c=NUDGES.filter(n=>n.type==="compassion"||n.type==="joy");
    if(c.length)return c[S.nudgeIndex%c.length];
  }
  return NUDGES[S.nudgeIndex%NUDGES.length];
}

function timeBadge(time,large){
  const tc=TC[time]||{bg:"#f1f5f9",text:"#64748b",border:"#e2e8f6",label:time};
  return h("span",{class:"timebadge",style:{background:tc.bg,color:tc.text,borderColor:tc.border,fontSize:large?"13px":"11px",padding:large?"5px 14px":"3px 10px"}},[ tc.label||time ]);
}

function btn(label,onClick,variant="primary",small=false,disabled=false,extraStyle={}){
  const styles={primary:{background:"#6366f1",color:"#fff"},ghost:{background:"transparent",color:"#4a5568",border:"1px solid #e2e8f6"},green:{background:"#10b981",color:"#fff"}};
  const b=h("button",{class:`btn btn-${variant}${small?" btn-sm":""}`,onClick,style:{...styles[variant],...extraStyle,opacity:disabled?.4:1,cursor:disabled?"not-allowed":"pointer"}},[label]);
  if(disabled)b.disabled=true;
  return b;
}

function inp(placeholder,value,onChange,type="text",extraStyle={}){
  const el=h("input",{class:"inp",type,placeholder,value:value||"",style:extraStyle});
  el.addEventListener("input",e=>onChange(e.target.value));
  return el;
}

function textarea(placeholder,value,onChange,rows=3){
  const el=h("textarea",{class:"inp",placeholder,rows,style:{resize:"none",height:rows*28+"px"}});
  el.value=value||"";
  el.addEventListener("input",e=>onChange(e.target.value));
  return el;
}

function modal(title,content,onClose){
  const overlay=h("div",{class:"modal-overlay",onClick:e=>{if(e.target===overlay)onClose();}});
  const m=h("div",{class:"modal"},[
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}},[
      h("div",{style:{fontSize:"17px",fontWeight:"800",color:C.text}},[title]),
      h("button",{style:{fontSize:"24px",color:C.muted,background:"none",border:"none",cursor:"pointer",lineHeight:"1"},onClick:onClose},["×"]),
    ]),
    ...content,
  ]);
  overlay.appendChild(m);
  document.body.appendChild(overlay);
  return overlay;
}

function callClaude(prompt,maxTokens=1000){
  if(!navigator.onLine){
    return Promise.reject(new Error("You appear to be offline. Connect to the internet and try again."));
  }
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),30000); // 30s timeout
  return fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    signal:controller.signal,
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]}),
  }).then(r=>{clearTimeout(timeout);if(!r.ok)throw new Error("API error: "+r.status);return r.json();})
  .then(d=>d.content?.map(b=>b.text||"").join("")||"")
  .catch(e=>{clearTimeout(timeout);throw e;});
}

  // "Enough" signal when Top 3 all done

       {val:"okay", label:"Okay", emoji:"😐",bg:"#fefce8",color:"#ca8a04",border:"#fde047"},
       {val:"good", label:"Good", emoji:"😊",bg:"#f0fdf4",color:"#16a34a",border:"#86efac"},

          onClick:()=>{const nd={...((S.dailyIntentions)||{}),[today]:{...((S.dailyIntentions||{})[today]||{}),mood:opt.val}};S.dailyIntentions=nd;saveState(S);render();}
        },[h("div",{style:{fontSize:"24px",marginBottom:"4px"}},[opt.emoji]),h("div",{style:{fontSize:"12px",fontWeight:"800",color:opt.color}},[opt.label])]));
      });

// ── RIGHT NOW TAB ──────────────────────────────────────────────────────────────
function renderRightNow(){
  const today=todayKey();
  const energy=((S.dailyIntentions||{})[today]||{}).energy;
  const energyCap=energy==="low"?"15min":null;
  const order={"15min":0,"30min":1,"1hr":2,"2hr+":3};

  let activeTime=null;
  const container=h("div",{});

  const timeBlocks=[
    {time:"15min",emoji:"⚡",label:"15 minutes",desc:"Quick wins"},
    {time:"30min",emoji:"🕐",label:"30 minutes",desc:"Solid progress"},
    {time:"1hr",emoji:"🎯",label:"1 hour",desc:"Real momentum"},
    {time:"2hr+",emoji:"🚀",label:"2+ hours",desc:"Deep work"},
  ];

  container.appendChild(h("div",{style:{fontSize:"15px",fontWeight:"700",color:C.text,marginBottom:"4px"}},["How much time do you have?"]));
  container.appendChild(h("div",{style:{fontSize:"13px",color:C.sub,marginBottom:"16px",lineHeight:"1.5"}},["Tap a block to see tasks matched to your available time — ready to check off right here."]));

  if(energy==="low"){
    container.appendChild(h("div",{style:{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:"12px",padding:"10px 14px",marginBottom:"16px",fontSize:"13px",color:"#dc2626"}},["😔 Low energy today — showing 15-min tasks only. One small thing is enough."]));
  }

  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"20px"}});
  const resultsContainer=h("div",{});

  function buildPool(){
    const pool=[];
    Object.entries(S.goalTasks).forEach(([area,tasks])=>{
      tasks.filter(t=>!t.done&&TIME_OPTIONS.includes(t.time)).forEach(t=>{
        pool.push({...t,_id:`g_${t.id}`,area,sourceLabel:AREA_META[area].label,sourceColor:AREA_META[area].color,sourceIcon:AREA_META[area].icon,isGoal:true});
      });
    });
    (S.adminTasks||[]).filter(t=>!t.done&&TIME_OPTIONS.includes(t.time)).forEach(t=>{
      pool.push({...t,_id:`a_${t.id}`,sourceLabel:"Life Admin",sourceColor:C.muted,sourceIcon:"📋",isAdmin:true});
    });
    return pool;
  }

  function renderResults(){
    resultsContainer.innerHTML="";
    if(!activeTime)return;
    const pool=buildPool();
    const maxIdx=order[activeTime]||0;
    const fits=pool.filter(t=>(order[t.time]||0)<=maxIdx);
    const grouped={};
    TIME_OPTIONS.slice(0,maxIdx+1).reverse().forEach(t=>{
      const items=fits.filter(i=>i.time===t);
      if(items.length)grouped[t]=items;
    });
    if(Object.keys(grouped).length===0){
      resultsContainer.appendChild(h("div",{class:"card"},[h("div",{style:{color:C.muted,fontSize:"13px",textAlign:"center",padding:"16px 0"}},["No open tasks fit this window. Add some in Goals or Tasks."])]));
      return;
    }
    Object.entries(grouped).forEach(([time,tasks])=>{
      const tc=TC[time]||{};
      resultsContainer.appendChild(h("div",{style:{marginBottom:"16px"}},[
        h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}},[

          h("div",{style:{flex:"1",height:"1px",background:C.border}}),
        ]),
        ...tasks.map(task=>{
          const isDone=task.isGoal?S.goalTasks[task.area]?.find(t=>t.id===task.id)?.done:S.adminTasks?.find(t=>t.id===task._id.replace("a_",""))?.done;
          const row=h("div",{style:{background:"#fff",borderRadius:"14px",marginBottom:"10px",border:`1.5px solid ${tc.border||C.border}`,overflow:"hidden",display:"flex",alignItems:"stretch",opacity:isDone?"0.5":"1"}},[
            h("div",{style:{flex:"1",padding:"14px 16px"}},[
              h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}},[
                h("span",{style:{fontSize:"14px"}},[task.sourceIcon]),
                h("span",{style:{fontSize:"10px",fontWeight:"700",color:task.sourceColor,textTransform:"uppercase",letterSpacing:"1px"}},[task.sourceLabel]),
              ]),
              h("div",{style:{fontSize:"15px",fontWeight:"700",color:isDone?C.muted:C.text,textDecoration:isDone?"line-through":"none",lineHeight:"1.3"}},[task.text]),
              task.why&&!isDone?h("div",{style:{fontSize:"12px",color:C.sub,marginTop:"5px",fontStyle:"italic",lineHeight:"1.5"}},["💡 "+task.why]):null,
            ]),
            h("div",{style:{background:isDone?"#10b98122":tc.bg||"#f1f5f9",borderLeft:`1.5px solid ${isDone?"#10b981":tc.border||C.border}`,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 14px",flexShrink:"0",cursor:isDone?"default":"pointer"},
              onClick:()=>{
                if(isDone)return;
                if(task.isGoal){
                  const realId=task.id;
                  const area=task.area;
                  const tasks2=S.goalTasks[area].map(t=>t.id===realId?{...t,done:true,doneAt:todayKey()}:t);
                  const cl=[...(S.completionLog||[]),{date:todayKey(),type:"goal",label:task.text,area}].slice(-1000);
                  showToast(AREA_META[area].icon+" Moved your "+AREA_META[area].label+" goal forward",AREA_META[area].color);
                  const lt={...S.lastTouched,[area]:todayKey()};
                  setState({goalTasks:{...S.goalTasks,[area]:tasks2},completionLog:cl,lastTouched:lt});
                } else {
                  const realId=task._id.replace("a_","");
                  setState({adminTasks:(S.adminTasks||[]).map(t=>t.id===realId?{...t,done:true}:t)});
                }
                renderResults();
              }
            },[h("span",{style:{fontSize:"20px",color:isDone?"#10b981":tc.text||C.sub}},[isDone?"✓":"→"])]),
          ]);
          return row;
        }),
      ]));
    });
    resultsContainer.appendChild(h("div",{style:{textAlign:"center",marginTop:"8px"}},[
      btn("← Pick different time",()=>{activeTime=null;renderResults();updateGrid();},"ghost",true),
    ]));
  }

  function updateGrid(){
    grid.innerHTML="";
    timeBlocks.forEach(({time,emoji,label,desc})=>{
      const tc=TC[time];
      const active=activeTime===time;
      const capped=energyCap&&order[time]>order[energyCap];
      const tb=h("div",{style:{background:active?tc.bg:capped?"#f8fafc":"#fff",border:`2px solid ${active?tc.border:C.border}`,borderRadius:"16px",padding:"16px 14px",cursor:capped?"not-allowed":"pointer",opacity:capped?"0.4":"1",boxShadow:active?`0 4px 16px ${tc.border}66`:"none"},
        onClick:()=>{if(capped)return;activeTime=active?null:time;updateGrid();renderResults();}
      },[
        h("div",{style:{fontSize:"28px",marginBottom:"6px"}},[emoji]),
        h("div",{style:{fontSize:"13px",fontWeight:"800",color:active?tc.text:C.text}},[label]),
        h("div",{style:{fontSize:"11px",color:active?tc.text:C.muted,marginTop:"3px"}},[capped?"Low energy day":desc]),
      ]);
      grid.appendChild(tb);
    });
  }

  updateGrid();
  container.appendChild(grid);
  container.appendChild(resultsContainer);
  return [container];
}

// ── GOALS TAB ──────────────────────────────────────────────────────────────────
function renderGoals(){
  const els=[];
  let editingNS=false;
  const nsWrapper=h("div",{});

  function renderNSSection(){
    nsWrapper.innerHTML="";
    if(editingNS){
      const nsForm={...S.northStar};
      const c=h("div",{class:"card",style:{border:"1px solid #fcd34d88",marginBottom:"14px"}});
      c.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},[
        h("span",{class:"slabel",style:{color:"#f59e0b",margin:"0"}},["Edit Your North Star Goals"]),
        btn("Cancel",()=>{editingNS=false;renderNSSection();},"ghost",true),
      ]));
      Object.entries(AREA_META).forEach(([key,meta])=>{
        const ta=textarea(`Your ${meta.label} goal...`,nsForm[key],v=>{nsForm[key]=v;},2);
        ta.style.marginBottom="10px";
        c.appendChild(h("div",{style:{marginBottom:"12px"}},[
          h("div",{style:{fontSize:"12px",fontWeight:"800",color:meta.color,marginBottom:"4px"}},[meta.icon+" "+meta.label]),
          ta,
        ]));
      });
      c.appendChild(btn("Save changes",()=>{setState({northStar:{...nsForm}});editingNS=false;renderNSSection();},"primary",false,false,{background:"#f59e0b"}));
      nsWrapper.appendChild(c);
    } else {
      nsWrapper.appendChild(h("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:"10px"}},[
        btn("✏️ Edit North Star goals",()=>{editingNS=true;renderNSSection();},"ghost",true),
      ]));
    }
  }
  renderNSSection();
  els.push(nsWrapper);

  // Flat list per area
  Object.entries(AREA_META).forEach(([area,meta])=>{
    const tasks=S.goalTasks[area]||[];
    const currentStage=S.currentStage[area];
    const stageTasks=tasks.filter(t=>t.stage===currentStage);
    const doneCurrent=stageTasks.filter(t=>t.done).length;
    const pastTasks=tasks.filter(t=>t.stage<currentStage);
    const ds=daysSince(S.lastTouched[area]);
    const stale=ds!==null&&ds>=5;

    const areaEl=h("div",{style:{marginBottom:"20px"}});

    // Area header
    areaEl.appendChild(h("div",{class:"section-header",style:{background:"#fff",borderLeft:`4px solid ${meta.color}`,borderColor:meta.color+"33",paddingLeft:"12px"}},[
      h("span",{style:{fontSize:"22px"}},[meta.icon]),
      h("div",{style:{flex:"1"}},[
        h("div",{style:{fontSize:"14px",fontWeight:"800",color:C.text}},[meta.label]),
        h("div",{style:{fontSize:"11px",color:C.sub,fontStyle:"italic",marginTop:"1px"}},["\""+S.northStar[area]+"\""]),
      ]),
      h("div",{style:{textAlign:"right"}},[
        h("div",{style:{fontSize:"10px",fontWeight:"700",color:meta.color,background:meta.color+"1a",border:`1px solid ${meta.color}33`,borderRadius:"20px",padding:"2px 9px"}},["Stage "+currentStage+" · "+doneCurrent+"/"+stageTasks.length]),
        stale?h("div",{style:{fontSize:"9px",color:"#ef4444",fontWeight:"700",marginTop:"3px"}},["⚠ "+ds+"d ago"]):null,
      ]),
    ]));

    // Progress bar
    areaEl.appendChild(h("div",{class:"progress-bar",style:{marginBottom:"10px",marginLeft:"4px",marginRight:"4px"}},[
      h("div",{class:"progress-fill",style:{width:(stageTasks.length?(doneCurrent/stageTasks.length)*100:0)+"%",background:meta.color}}),
    ]));

    // Stage tasks
    const tasksList=h("div",{});

    function renderTasksList(){
      tasksList.innerHTML="";
      const currentTasks=S.goalTasks[area]||[];
      const st=currentTasks.filter(t=>t.stage===S.currentStage[area]);
      st.forEach(t=>tasksList.appendChild(buildGoalTaskRow(t,area,meta,renderTasksList)));
      // Add custom task
      tasksList.appendChild(buildAddGoalTask(area,meta,renderTasksList));
      // Clear completed in this area
      const completedT=currentTasks.filter(t=>t.done);
      if(completedT.length>0){
        tasksList.appendChild(h("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:"4px",marginBottom:"8px"}},[
          h("button",{class:"btn btn-ghost btn-sm",style:{fontSize:"11px",color:"#ef4444",borderColor:"#fecaca"},
            onClick:()=>{
              S.goalTasks[area]=(S.goalTasks[area]||[]).filter(t=>!t.done);
              saveState(S);
              showToast("✓ Cleared completed "+AREA_META[area].label+" tasks","#10b981",1500);
              render();
            }},["Clear "+completedT.length+" completed"]),
        ]));
      }
      // Past tasks toggle
      const pastT=currentTasks.filter(t=>t.stage<S.currentStage[area]);
      if(pastT.length){
        let pastOpen=false;
        const pastWrapper=h("div",{});
        const toggle=h("div",{style:{fontSize:"11px",color:C.muted,cursor:"pointer",fontWeight:"600",padding:"4px 0"},
          onClick:()=>{pastOpen=!pastOpen;toggle.textContent=(pastOpen?"▲ Hide":"▼ Show")+" "+pastT.length+" completed stage task"+(pastT.length>1?"s":"");pastList.style.display=pastOpen?"block":"none";}
        },["▼ Show "+pastT.length+" completed stage task"+(pastT.length>1?"s":"")]);
        const pastList=h("div",{style:{display:"none",opacity:"0.45",marginTop:"6px"}});
        pastT.forEach(t=>pastList.appendChild(buildGoalTaskRow(t,area,meta,()=>{})));
        pastWrapper.appendChild(toggle);
        pastWrapper.appendChild(pastList);
        tasksList.appendChild(pastWrapper);
      }
    }

    renderTasksList();
    areaEl.appendChild(tasksList);
    els.push(areaEl);
  });

  return els;
}

function buildGoalTaskRow(t,area,meta,onUpdate){
  const tc=TC[t.time]||{bg:"#f1f5f9",text:C.sub,border:C.border,label:t.time};
  const wrapper=h("div",{});
  let mode="view";

  function render2(){
    wrapper.innerHTML="";
    if(mode==="edit"){
      let et=t.text,etm=t.time;
      const c=h("div",{style:{background:"#f8fafc",borderRadius:"12px",padding:"12px 14px",marginBottom:"10px",border:`1.5px solid ${meta.color}55`}});
      c.appendChild(h("div",{style:{fontSize:"11px",color:meta.color,fontWeight:"700",marginBottom:"8px",letterSpacing:"1px"}},["EDITING TASK"]));
      const ta=textarea("Task name...",t.text,v=>{et=v;},2);
      ta.style.marginBottom="10px";c.appendChild(ta);
      c.appendChild(h("div",{style:{fontSize:"11px",color:C.muted,marginBottom:"6px",fontWeight:"700"}},["TIME ESTIMATE"]));
      const timeRow=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"12px"}});
      [...TIME_OPTIONS,"varies"].forEach(tm=>{
        const stc=TC[tm]||{bg:"#f1f5f9",text:C.sub,border:C.border};
        const tb2=h("div",{style:{background:etm===tm?stc.bg:"#fff",color:etm===tm?stc.text:C.muted,border:`2px solid ${etm===tm?stc.border:C.border}`,borderRadius:"8px",padding:"4px 10px",fontSize:"11px",fontWeight:"800",cursor:"pointer"},
          onClick:()=>{etm=tm;timeRow.querySelectorAll("div").forEach((d,i)=>{const ltm=[...TIME_OPTIONS,"varies"][i];const lstc=TC[ltm]||{bg:"#f1f5f9",text:C.sub,border:C.border};d.style.background=etm===ltm?lstc.bg:"#fff";d.style.color=etm===ltm?lstc.text:C.muted;d.style.borderColor=etm===ltm?lstc.border:C.border;});}
        },[stc.label||tm]);
        timeRow.appendChild(tb2);
      });
      c.appendChild(timeRow);
      c.appendChild(h("div",{style:{display:"flex",gap:"8px"}},[
        btn("Cancel",()=>{mode="view";render2();},"ghost",true),
        btn("Save",()=>{
          const tasks=(S.goalTasks[area]||[]).map(x=>x.id===t.id?{...x,text:et.trim()||x.text,time:etm}:x);
          setState({goalTasks:{...S.goalTasks,[area]:tasks}});
          t={...t,text:et.trim()||t.text,time:etm};mode="view";render2();onUpdate();
        },"primary",true,false,{background:meta.color}),
        btn("Delete",()=>{
          const tasks=(S.goalTasks[area]||[]).filter(x=>x.id!==t.id);
          setState({goalTasks:{...S.goalTasks,[area]:tasks}});
          wrapper.remove();onUpdate();
        },"ghost",true,false,{color:"#ef4444",borderColor:"#fecaca",marginLeft:"auto"}),
      ]));
      wrapper.appendChild(c);
    } else if(mode==="split"){
      let splits=["",""];
      const c=h("div",{style:{background:"#f8fafc",borderRadius:"12px",padding:"12px 14px",marginBottom:"10px",border:`1.5px solid ${meta.color}55`}});
      c.appendChild(h("div",{style:{fontSize:"11px",color:meta.color,fontWeight:"700",marginBottom:"4px",letterSpacing:"1px"}},["BREAK INTO SMALLER STEPS"]));
      c.appendChild(h("div",{style:{fontSize:"12px",color:C.muted,marginBottom:"10px"}},["\""+t.text+"\" will be replaced by these steps:"]));
      const splitsContainer=h("div",{});
      function renderSplits(){
        splitsContainer.innerHTML="";
        splits.forEach((s,i)=>{
          const si=inp(`Step ${i+1}...`,s,v=>{splits[i]=v;});
          si.style.marginBottom="8px";
          splitsContainer.appendChild(si);
        });
        splitsContainer.appendChild(btn("+ Add step",()=>{splits.push("");renderSplits();},"ghost",true,false,{marginBottom:"12px"}));
      }
      renderSplits();
      c.appendChild(splitsContainer);
      c.appendChild(h("div",{style:{display:"flex",gap:"8px"}},[
        btn("Cancel",()=>{mode="view";render2();},"ghost",true),
        btn("Split task",()=>{
          const valid=splits.filter(s=>s.trim());
          if(!valid.length)return;
          const newTasks=valid.map((s,i)=>({id:`${t.id}_s${i}_${Date.now()}`,text:s.trim(),time:t.time,stage:t.stage,done:false,doneAt:null,why:t.why,custom:true}));
          const existing=(S.goalTasks[area]||[]).filter(x=>x.id!==t.id);
          const idx=(S.goalTasks[area]||[]).findIndex(x=>x.id===t.id);
          existing.splice(idx,0,...newTasks);
          setState({goalTasks:{...S.goalTasks,[area]:existing}});
          mode="view";onUpdate();
        },"primary",true,false,{background:meta.color}),
      ]));
      wrapper.appendChild(c);
    } else {
      const row=h("div",{class:"task-row",style:{borderColor:t.done?meta.color+"44":C.border,opacity:t.done?"0.6":"1"}},[
        h("div",{class:"task-content"},[
          h("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px"}},[
            h("div",{class:"checkbox",style:{background:t.done?meta.color:"transparent",borderColor:t.done?meta.color:C.border,marginTop:"1px",cursor:"pointer"},
              onClick:()=>{
                const tasks=(S.goalTasks[area]||[]).map(x=>x.id===t.id?{...x,done:!x.done,doneAt:x.done?null:todayKey()}:x);
                const cl=[...(S.completionLog||[])];
                if(!t.done){cl.push({date:todayKey(),type:"goal",label:t.text,area});showToast(meta.icon+" Moved your "+meta.label+" goal forward",meta.color);}
                const lt={...S.lastTouched,[area]:todayKey()};
                // Check stage auto-unlock
                const cs=S.currentStage[area];
                const stDone=tasks.filter(x=>x.stage===cs).every(x=>x.done);
                let newGoalTasks={...S.goalTasks,[area]:tasks};
                let newStage={...S.currentStage};
                const ns=cs+1;
                if(stDone&&GOAL_LIBRARY[area].some(x=>x.stage===ns)){
                  const newT=GOAL_LIBRARY[area].filter(x=>x.stage===ns).map((x,i)=>({...x,id:`${area[0]}${ns}${i}`,done:false,doneAt:null}));
                  newGoalTasks={...newGoalTasks,[area]:[...tasks,...newT]};
                  newStage={...newStage,[area]:ns};
                  showToast("🎉 Stage "+ns+" unlocked in "+meta.label+"!","#10b981",3000);
                }
                t={...t,done:!t.done};
                setState({goalTasks:newGoalTasks,currentStage:newStage,lastTouched:lt,completionLog:cl});
                render2();onUpdate();
              }
            },[t.done?"✓":""]),
            h("div",{style:{flex:"1"}},[
              h("div",{style:{fontSize:"14px",fontWeight:"600",color:t.done?C.muted:C.text,textDecoration:t.done?"line-through":"none",lineHeight:"1.4"}},[t.text]),
              t.why&&!t.done?h("div",{style:{fontSize:"11px",color:C.sub,marginTop:"4px",fontStyle:"italic",lineHeight:"1.5"}},["💡 "+t.why]):null,
              !t.done?h("div",{style:{display:"flex",gap:"10px",marginTop:"8px"}},[
                h("span",{style:{fontSize:"11px",color:meta.color,fontWeight:"700",cursor:"pointer"},onClick:()=>{mode="edit";render2();}},["✏️ Edit"]),
                h("span",{style:{fontSize:"11px",color:meta.color,fontWeight:"700",cursor:"pointer"},onClick:()=>{mode="split";render2();}},["✂️ Split"]),
              ]):null,
            ]),
          ]),
        ]),
        h("div",{class:"task-time-block",style:{background:t.done?meta.color+"22":tc.bg,borderColor:t.done?meta.color+"44":tc.border}},[
          h("span",{style:{color:t.done?meta.color:tc.text,fontSize:"11px",fontWeight:"800",whiteSpace:"nowrap"}},[tc.label||t.time]),
        ]),
      ]);
      wrapper.appendChild(row);
    }
  }
  render2();
  return wrapper;
}

      mainRow.appendChild(content);mainRow.appendChild(tb);

      if(isExp){

        taskEl.appendChild(expDiv);

      wrapper.appendChild(taskEl);

    if(done.length>0){

          },[
            h("div",{style:{flex:"1",padding:"12px 14px",display:"flex",alignItems:"center",gap:"10px"}},[
              h("div",{style:{width:"22px",height:"22px",borderRadius:"6px",background:"#10b981",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:"12px",flexShrink:"0"}},["✓"]),

              ]),
            ]),

          ]));
        });

        // Clear button lives at the bottom of the expanded list
        wrapper.appendChild(h("div",{style:{display:"flex",justifyContent:"flex-end",marginTop:"6px",marginBottom:"10px"}},[
          h("button",{class:"btn btn-ghost btn-sm",style:{fontSize:"11px",color:"#ef4444",borderColor:"#fecaca"},
            onClick:()=>{
              if(!confirm("Clear all "+done.length+" completed task"+(done.length===1?"":"s")+"? This can't be undone."))return;
              S.adminTasks=(S.adminTasks||[]).filter(t=>!t.done);
              saveState(S);
              showToast("✓ Completed tasks cleared","#10b981",1500);
              expandedId=null;
              refresh();
            }},["Clear all completed"]),
        ]));
      }
    }

    // Events section
    wrapper.appendChild(buildEventsSection());

    els[0]=wrapper;
  }

  refresh();
  els.push(wrapper);
  return els;
}

function buildEventsSection(){
  const wrapper=h("div",{style:{marginTop:"24px"}});
  let showForm=false;
  let editId=null;
  let form={title:"",date:"",time:"",note:""};
  const today=todayKey();

  function refresh(){
    wrapper.innerHTML="";
    wrapper.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}},[
      h("div",{style:{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:"#0284c7",fontWeight:"700"}},["📆 Events"]),
      h("div",{style:{flex:"1",height:"1px",background:"#e0f2fe"}}),
      !showForm?btn("+ Add event",()=>{showForm=true;editId=null;form={title:"",date:"",time:"",note:""};refresh();},"primary",true,false,{background:"#0ea5e9"}):null,
    ]));

    if(showForm){
      const fc=h("div",{class:"card",style:{background:"linear-gradient(135deg,#f0f9ff,#e0f2fe)",border:"1px solid #7dd3fc",marginBottom:"14px"}});
      fc.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},[
        h("span",{class:"slabel",style:{color:"#0284c7",margin:"0"}},[editId?"Edit Event":"New Event"]),
        btn("Cancel",()=>{showForm=false;editId=null;refresh();},"ghost",true),
      ]));
      const ti=inp("e.g. Dentist appointment",form.title,v=>{form.title=v;});
      ti.style.marginBottom="10px";fc.appendChild(ti);
      fc.appendChild(h("div",{class:"two-col",style:{marginBottom:"10px"}},[
        h("div",{},[h("div",{style:{fontSize:"11px",color:C.muted,marginBottom:"4px",fontWeight:"700"}},["DATE"]),(() => {const i=inp("","",v=>{form.date=v;},"date");i.value=form.date;return i;})()]),
        h("div",{},[h("div",{style:{fontSize:"11px",color:C.muted,marginBottom:"4px",fontWeight:"700"}},["TIME"]),(() => {const i=inp("","",v=>{form.time=v;},"time");i.value=form.time;return i;})()]),
      ]));
      const ni=inp("Note — e.g. bring insurance card",form.note,v=>{form.note=v;});
      ni.style.marginBottom="12px";fc.appendChild(ni);
      fc.appendChild(btn(editId?"Save changes":"Add event",()=>{
        if(!form.title.trim()||!form.date||!form.time)return;
        let events=[...(S.events||[])];
        if(editId){events=events.map(e=>e.id===editId?{...e,...form}:e);}
        else{events=[...events,{...form,id:Date.now()+"_"+Math.random().toString(36).slice(2,5),attended:false}];}
        // prune old
        events=events.filter(e=>(Date.now()-new Date(e.date+"T12:00:00").getTime())<30*86400000);
        setState({events});showForm=false;editId=null;form={title:"",date:"",time:"",note:""};refresh();
      },"primary",false,false,{background:"#0ea5e9",width:"100%"}));
      wrapper.appendChild(fc);
    }

    const upcoming=(S.events||[]).filter(e=>e.date>=today).sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
    const past=(S.events||[]).filter(e=>e.date<today).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

    if(upcoming.length===0&&!showForm){
      wrapper.appendChild(h("div",{style:{fontSize:"13px",color:C.muted,textAlign:"center",padding:"12px 0"}},["No upcoming events. Add one-off appointments or occasions and they appear on Today automatically."]));
    }

    upcoming.forEach(ev=>{
      const isToday2=ev.date===today;
      wrapper.appendChild(h("div",{style:{background:"#fff",borderRadius:"14px",marginBottom:"10px",border:`1.5px solid ${isToday2?"#0ea5e9":"#e0f2fe"}`,boxShadow:isToday2?"0 2px 12px rgba(14,165,233,.13)":"none",overflow:"hidden"}},[
        h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px"}},[
          h("div",{class:"event-time-block",style:{background:isToday2?"#0ea5e9":"#e0f2fe"}},[
            h("div",{style:{fontSize:"10px",fontWeight:"800",color:isToday2?"#fff":"#0369a1"}},[isToday2?"TODAY":new Date(ev.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})]),
            h("div",{style:{fontSize:"13px",fontWeight:"900",color:isToday2?"#fff":"#0284c7",marginTop:"1px"}},[formatTime(ev.time)]),
          ]),
          h("div",{style:{flex:"1"}},[
            h("div",{style:{fontSize:"14px",fontWeight:"700",color:C.text}},[ev.title]),
            ev.note?h("div",{style:{fontSize:"12px",color:C.sub,marginTop:"2px"}},[ev.note]):null,
          ]),
          h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},[
            h("span",{style:{fontSize:"12px",color:"#0284c7",cursor:"pointer",fontWeight:"600"},onClick:()=>{editId=ev.id;form={title:ev.title,date:ev.date,time:ev.time,note:ev.note||""};showForm=true;refresh();}},["✏️"]),
            h("span",{style:{color:C.muted,cursor:"pointer",fontSize:"20px",lineHeight:"1"},onClick:()=>{setState({events:(S.events||[]).filter(e=>e.id!==ev.id)});refresh();}},["×"]),
          ]),
        ]),
      ]));
    });

    if(past.length>0){
      wrapper.appendChild(h("div",{style:{marginTop:"12px",opacity:".5"}},[
        h("div",{style:{fontSize:"10px",color:C.muted,letterSpacing:"2px",fontWeight:"700",marginBottom:"8px"}},["PAST EVENTS"]),
        ...past.map(ev=>h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"8px 12px",marginBottom:"6px",background:"#fff",borderRadius:"10px",border:`1px solid ${C.border}`}},[
          h("div",{style:{fontSize:"11px",color:C.muted,fontWeight:"700",minWidth:"80px"}},[new Date(ev.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})+" · "+formatTime(ev.time)]),
          h("div",{style:{flex:"1",fontSize:"13px",color:C.muted,textDecoration:"line-through"}},[ev.title]),
          h("span",{style:{color:C.muted,cursor:"pointer",fontSize:"16px"},onClick:()=>{setState({events:(S.events||[]).filter(e=>e.id!==ev.id)});refresh();}},["×"]),
        ])),
      ]));
    }
  }

  refresh();
  return wrapper;
}

function renderWeekly(){

  const log=S.habitLog||{};
  const cl=S.completionLog||[];

  function refresh(){
    wrapper.innerHTML="";

      toggle.appendChild(h("div",{style:{flex:"1",textAlign:"center",padding:"8px 0",borderRadius:"10px",background:view===v.id?"linear-gradient(135deg,#0ea5e9,#2563eb)":"transparent",color:view===v.id?"#fff":C.sub,fontWeight:"700",fontSize:"13px",cursor:"pointer",transition:"all .2s"},onClick:()=>{view=v.id;refresh();}},[v.label]));
    });
    wrapper.appendChild(toggle);

    if(view==="review") renderReview();
    else renderProgress();

  function renderReview(){
    const reviewContainer=h("div",{});
    wrapper.appendChild(reviewContainer);

    reviewContainer.appendChild(h("div",{style:{background:"linear-gradient(135deg,#eff6ff,#eef2ff)",border:"1px solid #c7d2fe",borderRadius:"14px",padding:"14px 16px",marginBottom:"16px"}},[

      h("div",{style:{fontSize:"13px",color:"#4338ca",lineHeight:"1.6"}},["5 questions. 15 minutes. The highest-leverage habit in this system."]),
    ]));

    const qs=[
      {key:"q1",label:"What actually happened this week — wins, misses, surprises?"},
      {key:"q2",label:"What did you avoid or deprioritize — and honestly, why?"},
      {key:"q3",label:"What brought you genuine joy this week?"},
      {key:"q4",label:"When did you feel most like yourself?"},
      {key:"q5",label:"What is the ONE thing next week that connects to your most important goal?"},
    ];
    const answers={q1:"",q2:"",q3:"",q4:"",q5:""};

    qs.forEach(q=>{
      const pastAnswers=(S.weeklyLog||[]).slice(-4).reverse().map(l=>({date:l.date,text:l.answers?.[q.key]})).filter(l=>l.text);
      const c=h("div",{class:"card",style:{marginBottom:"12px"}});
      c.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"700",color:C.text,marginBottom:"10px",lineHeight:"1.5"}},[q.label]));
      const ta=textarea("Be honest with yourself...",answers[q.key],v=>{answers[q.key]=v;},3);
      c.appendChild(ta);
      if(pastAnswers.length>0){
        let pastOpen=false;
        const pastToggle=h("div",{style:{fontSize:"11px",color:"#6366f1",fontWeight:"700",cursor:"pointer",marginTop:"8px"},
          onClick:()=>{pastOpen=!pastOpen;pastToggle.textContent=pastOpen?"▲ Hide past answers":"▼ See what you wrote before";pastList.style.display=pastOpen?"flex":"none";}
        },["▼ See what you wrote before"]);
        const pastList=h("div",{style:{display:"none",flexDirection:"column",gap:"8px",marginTop:"8px"}});
        pastAnswers.forEach(p=>{
          pastList.appendChild(h("div",{style:{background:"#f8fafc",borderRadius:"8px",padding:"10px 12px",border:`1px solid ${C.border}`}},[
            h("div",{style:{fontSize:"10px",color:C.muted,fontWeight:"700",marginBottom:"4px"}},[p.date]),
            h("div",{style:{fontSize:"13px",color:C.sub,lineHeight:"1.6",fontStyle:"italic"}},['"'+p.text+'"']),
          ]));
        });
        c.appendChild(pastToggle);c.appendChild(pastList);
      }
      reviewContainer.appendChild(c);
    });

    let loading=false;
    const submitBtn=btn("Submit review →",async()=>{
      if(loading)return;
      if(!qs.slice(0,3).every(q=>answers[q.key].trim())){showToast("Please answer the first 3 questions","#ef4444");return;}
      loading=true;submitBtn.textContent="Getting your coaching...";submitBtn.disabled=true;
      try{
        const hs=getHabits().map(hb=>hb.label+": "+calcStreak(log,hb.id)+"-day streak").join(", ");

        const moodLog=Object.entries(S.dailyIntentions||{}).filter(([d])=>d>=wCutoffStr).map(([d,v])=>(v&&v.mood)||null).filter(Boolean);
        const moodSummary=moodLog.length>0?"Mood this week: "+moodLog.join(", "):"No mood logged this week";

          "What brought joy: "+trunc(answers.q3)+"\nFelt like self when: "+trunc(answers.q4)+"\n"+
          "ONE priority next week: "+trunc(answers.q5)+"\n\n"+
          "4-5 sentences. Honest and warm. Acknowledge wins AND gaps. Notice the joy. End with one concrete recommendation. No fluff.";

      }catch(e){showToast("Something went wrong — sit with your answers","#ef4444");}

    },"primary",false,false,{width:"100%",padding:"13px",fontSize:"15px",background:"linear-gradient(135deg,#0ea5e9,#2563eb)"});

        pSection.appendChild(c);

      reviewContainer.appendChild(pSection);

      // Rec card
      const lastRec=(S.weeklyLog||[]).reduce((acc,l)=>l.recommendation?l.date:acc,null);
      const dsr=lastRec?Math.floor((Date.now()-new Date(lastRec+"T12:00:00").getTime())/86400000):999;
      if(dsr>=30) renderRecCard(reviewContainer);

  }

  function renderRecCard(container){

      h("div",{style:{flex:"1",height:"1px",background:"#ede9fe"}}),
    ]));

    function renderRec(){
      const inner=recWrapper.querySelector(".rec-inner");
      if(inner)inner.remove();
      const ri=h("div",{class:"rec-inner"});
      if(!rec){
        ri.appendChild(h("div",{style:{background:"linear-gradient(135deg,#faf5ff,#ede9fe)",border:"1px solid #ddd6fe",borderRadius:"16px",padding:"18px 20px"}},[
          h("div",{style:{fontSize:"15px",fontWeight:"700",color:"#4c1d95",marginBottom:"6px"}},["Your resource recommendation 📚"]),
          h("div",{style:{fontSize:"13px",color:"#6d28d9",lineHeight:"1.6",marginBottom:"14px"}},["Based on your goals and recent reviews, I'll recommend one book, Masterclass, or podcast worth your time this month."]),
          btn(loading?"Finding the right resource...":"Get my recommendation →",async()=>{
            if(loading)return;loading=true;renderRec();

              const rls=(S.weeklyLog||[]).slice(-4).map(l=>`Week of ${l.date}: avoided "${l.answers?.q2||""}"; joy from "${l.answers?.q3||""}"`).join("\n");
              const prompt=`You are a thoughtful life coach recommending ONE resource this month.\nGoals: Health(${S.northStar.health}), Career(${S.northStar.career}), Finance(${S.northStar.finance}), Relationships(${S.northStar.relationships})\nRecent patterns:\n${rls}\nThey consume: books, Masterclasses, podcasts.\nReturn ONLY valid JSON: {"type":"Book or Masterclass or Podcast","title":"exact title","author":"author or host","why":"2-3 sentences why this fits them right now"}`;
              const text=await callClaude(prompt,400);
              try{rec=JSON.parse(text.replace(/```json|```/g,"").trim());}catch(pe){rec={type:"Book",title:"Four Thousand Weeks",author:"Oliver Burkeman",why:"Based on your patterns — the tension between doing more and being present — this book is the right conversation for right now."};} 
              const logs=[...(S.weeklyLog||[])];
              if(logs.length>0)logs[logs.length-1]={...logs[logs.length-1],recommendation:true};
              setState({weeklyLog:logs});
            }catch(e){rec={type:"Book",title:"Four Thousand Weeks",author:"Oliver Burkeman",why:"Based on your patterns — the tension between doing more and being present — this book directly challenges the productivity mindset. It is about making peace with your limits and choosing what actually matters. Right now, that is exactly the conversation worth having."};}
            loading=false;renderRec();
          },"primary",false,loading,{background:"linear-gradient(135deg,#7c3aed,#6d28d9)",opacity:loading?.6:1}),
        ]));
      } else {
        ri.appendChild(h("div",{style:{background:"linear-gradient(135deg,#faf5ff,#ede9fe)",border:"1px solid #ddd6fe",borderRadius:"16px",padding:"18px 20px"}},[
          h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}},[
            h("span",{style:{background:"#7c3aed1a",color:"#7c3aed",border:"1px solid #ddd6fe",borderRadius:"20px",padding:"3px 10px",fontSize:"11px",fontWeight:"800"}},[rec.type]),
            h("span",{style:{fontSize:"10px",color:"#a78bfa",fontWeight:"600"}},["THIS MONTH'S PICK"]),
          ]),
          h("div",{style:{fontSize:"18px",fontWeight:"800",color:"#3b0764",marginBottom:"4px",lineHeight:"1.3"}},[rec.title]),
          h("div",{style:{fontSize:"13px",color:"#6d28d9",marginBottom:"12px"}},["by "+rec.author]),
          h("div",{style:{fontSize:"13px",color:"#4c1d95",lineHeight:"1.7",background:"#fff",padding:"12px 14px",borderRadius:"10px",borderLeft:"3px solid #7c3aed"}},[rec.why]),
          h("div",{style:{fontSize:"11px",color:"#a78bfa",marginTop:"12px",cursor:"pointer",fontWeight:"600"},onClick:()=>{rec=null;renderRec();}},["Get a different recommendation →"]),
        ]));

    container.appendChild(recWrapper);

  function renderProgress(){
    const windowDays=timeWindow==="7d"?7:timeWindow==="30d"?30:timeWindow==="6m"?180:3650;
    const cutoffD=new Date(Date.now()-windowDays*86400000);
    const cutoff=`${cutoffD.getFullYear()}-${String(cutoffD.getMonth()+1).padStart(2,"0")}-${String(cutoffD.getDate()).padStart(2,"0")}`;
    const filtered=cl.filter(e=>e.date>=cutoff);
    const byArea={health:0,career:0,finance:0,relationships:0};
    filtered.filter(e=>e.type==="goal"&&e.area).forEach(e=>{byArea[e.area]=(byArea[e.area]||0)+1;});

    // Window selector
    const ws=h("div",{style:{display:"flex",gap:"6px",marginBottom:"16px",flexWrap:"wrap"}});
    [{id:"7d",label:"Last 7 days"},{id:"30d",label:"Last 30 days"},{id:"6m",label:"Last 6 months"},{id:"all",label:"All time"}].forEach(w=>{
      ws.appendChild(h("div",{style:{background:timeWindow===w.id?"#6366f1":"#fff",color:timeWindow===w.id?"#fff":C.sub,border:`1px solid ${timeWindow===w.id?"#6366f1":C.border}`,borderRadius:"20px",padding:"5px 14px",fontSize:"12px",fontWeight:"700",cursor:"pointer"},
        onClick:()=>{timeWindow=w.id;refresh();}},[w.label]));
    });
    wrapper.appendChild(ws);

    // Bar chart
    const bars=[];
    for(let i=6;i>=0;i--){
      const d=new Date(Date.now()-i*86400000);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const td=cl.filter(e=>e.date===k).length;
      const hd=getHabits().filter(hb=>(log[k]||{})[hb.id]).length;
      bars.push({label:d.toLocaleDateString("en-US",{weekday:"short"}),tasks:td,habits:hd,total:td+hd});
    }
    const maxBar=Math.max(...bars.map(b=>b.total),1);

    const bc=h("div",{class:"card",style:{marginBottom:"14px"}});
    bc.appendChild(h("span",{class:"slabel"},["Daily Completions — Last 7 Days"]));
    const barContainer=h("div",{style:{display:"flex",alignItems:"flex-end",gap:"6px",height:"80px",marginBottom:"8px"}});
    bars.forEach(b=>{
      const col=h("div",{style:{flex:"1",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}});
      const barStack=h("div",{style:{width:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"70px",gap:"2px"}});
      if(b.habits>0)barStack.appendChild(h("div",{style:{width:"100%",height:((b.habits/maxBar)*60)+"px",background:"linear-gradient(135deg,#10b981,#6ee7b7)",borderRadius:"4px 4px 0 0",minHeight:"4px"}}));
      if(b.tasks>0)barStack.appendChild(h("div",{style:{width:"100%",height:((b.tasks/maxBar)*60)+"px",background:"linear-gradient(135deg,#6366f1,#a5b4fc)",borderRadius:"4px 4px 0 0",minHeight:"4px"}}));
      col.appendChild(barStack);
      col.appendChild(h("div",{style:{fontSize:"10px",color:C.muted,fontWeight:"600"}},[b.label]));
      if(b.total>0)col.appendChild(h("div",{style:{fontSize:"10px",color:C.sub,fontWeight:"700"}},[String(b.total)]));
      barContainer.appendChild(col);
    });
    bc.appendChild(barContainer);
    bc.appendChild(h("div",{style:{display:"flex",gap:"12px"}},[
      h("div",{style:{display:"flex",alignItems:"center",gap:"5px"}},[h("div",{style:{width:"10px",height:"10px",borderRadius:"2px",background:"#6366f1"}}),h("span",{style:{fontSize:"11px",color:C.muted}},["Tasks"])]),
      h("div",{style:{display:"flex",alignItems:"center",gap:"5px"}},[h("div",{style:{width:"10px",height:"10px",borderRadius:"2px",background:"#10b981"}}),h("span",{style:{fontSize:"11px",color:C.muted}},["Habits"])]),
    ]));
    wrapper.appendChild(bc);

    // Habit streaks
    const hc=h("div",{class:"card",style:{marginBottom:"14px"}});
    hc.appendChild(h("span",{class:"slabel"},["Habit Streaks"]));
    getHabits().forEach(hb=>{
      const streak=calcStreak(log,hb.id);
      const row=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}});
      row.appendChild(h("span",{style:{fontSize:"18px"}},[hb.icon]));
      const info=h("div",{style:{flex:"1"}});
      info.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},[
        h("span",{style:{fontSize:"13px",fontWeight:"600",color:C.text}},[hb.label]),
        h("span",{style:{fontSize:"12px",fontWeight:"700",color:streak>0?hb.color:C.muted}},[streak>0?"🔥 "+streak+" days":"—"]),
      ]));
      info.appendChild(h("div",{class:"progress-bar"},[h("div",{class:"progress-fill",style:{width:Math.min(streak/30,1)*100+"%",background:hb.color}})]));
      row.appendChild(info);
      hc.appendChild(row);
    });
    wrapper.appendChild(hc);

    // Goals by area
    const gc=h("div",{class:"card",style:{marginBottom:"14px"}});
    gc.appendChild(h("span",{class:"slabel"},["Goal Tasks Completed"]));
    Object.entries(AREA_META).forEach(([area,meta])=>{
      const row=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}});
      row.appendChild(h("span",{style:{fontSize:"18px"}},[meta.icon]));
      const info=h("div",{style:{flex:"1"}});
      info.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},[
        h("span",{style:{fontSize:"13px",fontWeight:"600",color:C.text}},[meta.label]),
        h("span",{style:{fontSize:"12px",fontWeight:"700",color:meta.color}},[String(byArea[area]||0)+" completed · Stage "+S.currentStage[area]]),
      ]));
      info.appendChild(h("div",{class:"progress-bar"},[h("div",{class:"progress-fill",style:{width:Math.min((byArea[area]||0)/5,1)*100+"%",background:meta.color}})]));
      row.appendChild(info);
      gc.appendChild(row);
    });
    wrapper.appendChild(gc);
  }

  refresh();
  return [wrapper];
}

          const fi=h("input",{type:"file",accept:".json",style:{display:"none"}});

          });
          lbl.appendChild(fi);return lbl;
        })(),
      ]));
      importWrapper.appendChild(h("div",{style:{display:"flex",gap:"8px"}},[

            ['health','career','finance','relationships'].forEach(area=>{

          const updated=getHabits().map((x,i)=>i===idx?{...x,label:newLabel}:x);
          S={...S,habits:updated};saveState(S);
          showToast("✓ Habit renamed","#8b5cf6",1500);
        }
      });
      nameInp.addEventListener("keydown",e=>{if(e.key==="Enter")nameInp.blur();});
      row.appendChild(nameInp);

      // Delete button — first tap shows confirm, second tap deletes
      if(pendingDeleteId===hb.id){
        // Confirm state
        const confirmRow=h("div",{style:{display:"flex",gap:"6px",flexShrink:"0"}});
        confirmRow.appendChild(btn("Delete",()=>{
          if(habits.length<=1){showToast("Keep at least one habit","#ef4444",2000);pendingDeleteId=null;refreshHabits();return;}
          const updated=getHabits().filter(x=>x.id!==hb.id);
          S={...S,habits:updated};saveState(S);
          pendingDeleteId=null;refreshHabits();
          showToast("✓ Habit removed","#8b5cf6",1500);
        },"ghost",true,false,{color:"#ef4444",borderColor:"#fecaca",fontSize:"12px"}));
        confirmRow.appendChild(btn("Cancel",()=>{pendingDeleteId=null;refreshHabits();},"ghost",true,false,{fontSize:"12px"}));
        row.appendChild(confirmRow);
      } else {
        const delBtn=h("button",{style:{background:"none",border:"none",color:"#cbd5e1",fontSize:"18px",cursor:"pointer",padding:"4px",flexShrink:"0",lineHeight:"1"},title:"Remove habit"},["×"]);
        delBtn.addEventListener("click",()=>{pendingDeleteId=hb.id;refreshHabits();});
        row.appendChild(delBtn);
      }

      habitsList.appendChild(row);
    });

    // Add new habit form
    const addSection=h("div",{style:{marginTop:"14px",paddingTop:"14px",borderTop:"1px solid #e9d5ff"}});
    addSection.appendChild(h("div",{style:{fontSize:"11px",color:"#7c3aed",fontWeight:"700",letterSpacing:"1px",marginBottom:"10px"}},["ADD A NEW HABIT"]));
    let newIcon="⭐";let newLabel="";
    const addRow=h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}});
    const newEmojiInp=h("input",{class:"inp",style:{width:"46px",textAlign:"center",padding:"6px 2px",fontSize:"18px",background:"#fff",flexShrink:"0"},value:newIcon,placeholder:"⭐"});
    newEmojiInp.addEventListener("input",e=>{newIcon=e.target.value.trim()||"⭐";});
    const newNameInp=h("input",{class:"inp",style:{flex:"1",background:"#fff"},placeholder:"Habit name..."});
    newNameInp.addEventListener("input",e=>{newLabel=e.target.value;});
    const addBtn=btn("Add",()=>{
      const label=newLabel.trim();
      if(!label){showToast("Enter a habit name","#ef4444",1500);return;}
      const icon=newEmojiInp.value.trim()||"⭐";
      const colors=["#8b5cf6","#0ea5e9","#10b981","#f59e0b","#6366f1","#f97316","#ec4899","#14b8a6"];
      const color=colors[getHabits().length%colors.length];
      const newHabit={id:Date.now(),label,icon,color,desc:""};
      S={...S,habits:[...getHabits(),newHabit]};
      saveState(S);
      newNameInp.value="";newLabel="";newEmojiInp.value="⭐";newIcon="⭐";
      refreshHabits();
      showToast("✓ "+icon+" "+label+" added","#8b5cf6",1800);
    },"primary",true,false,{background:"#7c3aed",whiteSpace:"nowrap"});
    newNameInp.addEventListener("keydown",e=>{if(e.key==="Enter")addBtn.click();});
    addRow.appendChild(newEmojiInp);
    addRow.appendChild(newNameInp);
    addRow.appendChild(addBtn);
    addSection.appendChild(addRow);
    habitsList.appendChild(addSection);

    habitsList.appendChild(h("div",{style:{fontSize:"11px",color:C.muted,marginTop:"10px",lineHeight:"1.6"}},["💡 Renaming preserves streak history. Deleting a habit removes it from today's checklist."]));
  }
  refreshHabits();
  habitCard.appendChild(habitsList);
  els.push(habitCard);

  // Migration guide
  els.push(h("div",{style:{background:"linear-gradient(135deg,#fffbeb,#fef3c7)",border:"1px solid #fcd34d",borderRadius:"14px",padding:"14px 16px",marginBottom:"14px"}},[
    h("span",{class:"slabel",style:{color:"#92400e"}},["🚀 Moving to Netlify?"]),
    h("div",{style:{fontSize:"13px",color:"#78350f",lineHeight:"1.9"}},[
      "Step 1: Export your data here\n",
      "Step 2: Give the .json + this .html file to a developer\n",
      "Step 3: They deploy to Netlify (~1 hour)\n",
      "Step 4: Import your data into the new version\n",
      "Step 5: Add to iPhone home screen as a PWA",
    ]),
  ]));

  // Reset
  let showReset=false;
  const resetWrapper=h("div",{class:"card",style:{border:"1px solid #fecaca"}});
  resetWrapper.appendChild(h("span",{class:"slabel",style:{color:"#ef4444"}},["⚠ Danger Zone"]));
  const resetInner=h("div",{});
  function renderReset(){
    resetInner.innerHTML="";
    if(!showReset){
      resetInner.appendChild(btn("Reset all data",()=>{showReset=true;renderReset();},"ghost",true,false,{color:"#ef4444",borderColor:"#fecaca"}));
    } else {
      resetInner.appendChild(h("div",{style:{fontSize:"13px",color:"#991b1b",marginBottom:"12px",lineHeight:"1.6"}},["This will permanently delete all your data and restart setup. Export first if you want a backup."]));
      resetInner.appendChild(h("div",{style:{display:"flex",gap:"8px"}},[
        btn("Cancel",()=>{showReset=false;renderReset();},"ghost",true),
        btn("Yes, reset everything",()=>{S=defaultState();saveState(S);render();},"primary",true,false,{background:"#ef4444"}),
      ]));
    }
  }
  renderReset();
  resetWrapper.appendChild(resetInner);
  els.push(resetWrapper);

  return els;
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
const getHabits=()=>(typeof S!=="undefined"?S.habits:null)||DEFAULT_HABITS;

const NAV_ITEMS=[
  {id:"today",label:"Today",icon:"☀️"},
  {id:"now",label:"Right Now",icon:"⚡"},
  {id:"goals",label:"Goals",icon:"🎯"},
  {id:"tasks",label:"Tasks",icon:"📋"},
  {id:"weekly",label:"Weekly",icon:"📅"},
  {id:"settings",label:"Settings",icon:"⚙️"},
];

function render(){
  const root=document.getElementById("root");
  try {
  if(!S.setupDone){renderSetup();return;}

  root.innerHTML="";

  const today=todayKey();
  const habitsDone=getHabits().filter(hb=>(S.habitLog[today]||{})[hb.id]).length;
  const overdue=(S.adminTasks||[]).filter(t=>!t.done&&t.deadline&&t.deadline<=today).length;
  const hour=new Date().getHours();
  const greeting=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";

  // Header
  const header=h("div",{id:"header"},[
    h("div",{},[
      h("div",{style:{fontSize:"17px",fontWeight:"900",color:"#fff"}},["🧭 Life Compass"]),
      h("div",{style:{fontSize:"11px",color:"#bae6fd"}},[new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})]),
    ]),
    h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},[
      h("span",{style:{background:"rgba(255,255,255,.2)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:"20px",padding:"3px 10px",fontSize:"11px",fontWeight:"700"}},[habitsDone+"/"+getHabits().length+" habits"]),
      overdue>0?h("span",{style:{background:"rgba(239,68,68,.2)",color:"#fca5a5",border:"1px solid rgba(239,68,68,.3)",borderRadius:"20px",padding:"3px 10px",fontSize:"11px",fontWeight:"700"}},["⚠ "+overdue+" due"]):null,
    ]),
  ]);
  root.appendChild(header);

  // Page title with save button
  const tabLabel=NAV_ITEMS.find(n=>n.id===currentTab);
  const pageTitle=h("div",{id:"pagetitle"},[
    h("div",{},[
      h("div",{style:{fontSize:"20px",fontWeight:"900",color:C.text}},[
        currentTab==="today"?greeting+".":
        currentTab==="now"?"⚡ What can I do right now?":
        currentTab==="settings"?"⚙️ Settings & Data":
        (tabLabel?.icon||"")+" "+(tabLabel?.label||"")
      ]),
      h("div",{style:{fontSize:"13px",color:C.sub,marginTop:"1px"}},[
        currentTab==="today"?"Let's make today count.":
        currentTab==="now"?"Tasks matched to your available time.":
        currentTab==="settings"?"Export, import, and manage your data.":"",
      ]),
    ]),
    // Save button
    h("div",{class:"save-btn",onClick:async()=>{
      try{await navigator.clipboard.writeText(JSON.stringify(S,null,2));showToast("✓ Copied! Paste into Notes to save","#10b981");}
      catch(e){try{const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`life-compass-backup-${todayKey()}.json`;a.click();URL.revokeObjectURL(url);showToast("✓ Downloaded","#10b981");}catch(e2){showToast("Use ⚙️ Settings to export","#ef4444");}}
    }},[
      h("span",{style:{fontSize:"18px"}},["💾"]),
      h("span",{style:{fontSize:"9px",fontWeight:"800",color:"#166534",letterSpacing:".3px"}},["SAVE"]),
    ]),
  ]);
  root.appendChild(pageTitle);

  // Content
  const content=h("div",{id:"app",class:"fade-in"});
  let tabEls=[];
  if(currentTab==="today")tabEls=renderToday();
  else if(currentTab==="now")tabEls=renderRightNow();
  else if(currentTab==="goals")tabEls=renderGoals();
  else if(currentTab==="tasks")tabEls=renderTasks();
  else if(currentTab==="weekly")tabEls=renderWeekly();
  else if(currentTab==="settings")tabEls=renderSettings();
  tabEls.forEach(el=>{if(el)content.appendChild(el);});
  root.appendChild(content);

  // Nav
  const nav=h("div",{id:"nav"});
  NAV_ITEMS.forEach(item=>{
    const nb=h("button",{class:"nav-btn"+(currentTab===item.id?" active":""),onClick:()=>{saveState(S);currentTab=item.id;render();}},[
      h("span",{class:"nav-icon"},[item.icon]),
      h("span",{class:"nav-label"},[item.label.toUpperCase()]),
    ]);
    if(currentTab===item.id)nb.appendChild(h("div",{class:"nav-dot"}));
    nav.appendChild(nb);
  });
  root.appendChild(nav);
  } catch(err) {
    console.error("Render error:", err);
    root.innerHTML = "";
    root.appendChild(h("div",{style:{padding:"20px",color:"#ef4444",background:"#fff",margin:"20px",borderRadius:"12px",border:"1px solid #fecaca"}},["⚠ App error: "+err.message+". Please tap 💾 if you have data, then reload."]));
  }
}

// ── BOOT ────────────────────────────────────────────────────────────────────────
(async()=>{
  const saved=await loadState();
  if(saved){
    const defaults=defaultState();
    // Safe merge: don't let null/undefined from old saves override array defaults
    S={...defaults,...saved};
    // Ensure all array fields are actually arrays (old saves may have null)
    const arrayFields=['adminTasks','events','todayFocus','weeklyLog','completionLog','habits'];
    arrayFields.forEach(f=>{if(!Array.isArray(S[f]))S[f]=defaults[f]||[];});
    // Ensure object fields are objects
    const objFields=['habitLog','dailyIntentions','goalTasks','currentStage','lastTouched','northStar'];
    objFields.forEach(f=>{if(!S[f]||typeof S[f]!=='object'||Array.isArray(S[f]))S[f]=defaults[f]||{};});
    // Ensure goalTasks areas are arrays
    ['health','career','finance','relationships'].forEach(area=>{
      if(!Array.isArray(S.goalTasks[area]))S.goalTasks[area]=defaults.goalTasks[area]||[];
    });
  }

  // Sunday reset prompt (was silent — now asks the user)
  const today=todayKey();
  const isSunday=new Date().getDay()===0;
  const lastClear=S.lastAdminClear||null;
  if(isSunday && lastClear!==today){
    // Show a gentle prompt rather than silently deleting
    const doneAdmin=(S.adminTasks||[]).filter(t=>t.done).length;
    const doneGoals=Object.values(S.goalTasks||{}).flat().filter(t=>t.done).length;
    if(doneAdmin>0||doneGoals>0){
      // Defer the prompt until after first render so the app is visible
      setTimeout(()=>{
        const overlay=h("div",{class:"modal-overlay"});
        const m=h("div",{class:"modal",style:{borderRadius:"20px 20px 0 0"}});
        m.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"800",color:C.text,marginBottom:"8px"}},["🌿 New week, fresh start?"]));
        m.appendChild(h("div",{style:{fontSize:"14px",color:C.sub,lineHeight:"1.7",marginBottom:"18px"}},
          [`It's Sunday. You completed ${doneAdmin+doneGoals} task${doneAdmin+doneGoals===1?"":"s"} this week. Clear them to start fresh, or keep them visible.`]));
        m.appendChild(h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap"}},[
          btn("Clear completed tasks",()=>{
            S.adminTasks=(S.adminTasks||[]).filter(t=>!t.done);
            const newGT={};
            Object.entries(S.goalTasks||{}).forEach(([area,tasks])=>{newGT[area]=(tasks||[]).filter(t=>!t.done);});
            S.goalTasks=newGT;
            S.lastAdminClear=today;
            saveState(S);render();
            document.body.removeChild(overlay);
            showToast("✓ Completed tasks cleared — new week!","#10b981",2500);
          },"primary",false,false,{background:"#10b981"}),
          btn("Keep them for now",()=>{
            S.lastAdminClear=today; // Don't ask again today
            saveState(S);
            document.body.removeChild(overlay);
          },"ghost"),
        ]));
        overlay.appendChild(m);
        document.body.appendChild(overlay);
      },600);
    } else {
      S.lastAdminClear=today;
      saveState(S);
    }
  }

  render();

  // Auto-save when user switches away from the app (tab hidden, phone locks, etc.)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') saveState(S);
  });
  // Also save before the page unloads (desktop browser tab close)
  window.addEventListener('beforeunload', () => saveState(S));
})();
</script>
</body>
</html>
