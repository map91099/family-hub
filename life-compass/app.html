// ── WEEKLY TAB ────────────────────────────────────────────────────────────────
function WeeklyTab({ state, setState }) {
  const [view,setView]=useState("review");
  const [timeWindow,setTimeWindow]=useState("7d"); // FIX: renamed from 'window' to avoid shadowing global
  const [answers,setAnswers]=useState({q1:"",q2:"",q3:"",q4:"",q5:""});
  const [aiResp,setAiResp]=useState(""); const [loading,setLoad]=useState(false); const [submitted,setSubmitted]=useState(false);
  const [rec,setRec]=useState(null); const [recLoading,setRecLoad]=useState(false);

  const lastRecDate=(state.weeklyLog||[]).reduce((acc,l)=>l.recommendation?l.date:acc,null);
  const daysSinceRec=lastRecDate?Math.floor((Date.now()-new Date(lastRecDate).getTime())/86400000):999;
  const showRecCard=(state.weeklyLog||[]).length>=1;

  const getRecommendation=async()=>{
    setRecLoad(true);
    try {
      const recentLogs=(state.weeklyLog||[]).slice(-4);
      const reviewSummary=recentLogs.map(l=>`Week of ${l.date}: avoided "${l.answers?.q2||""}"; joy from "${l.answers?.q3||""}"; felt like self when "${l.answers?.q4||""}"`).join("\n");
      const prompt=`You are a thoughtful life coach recommending ONE resource this month for someone working on living a full and meaningful life.\n\nTheir context:\n- Goals: Health(${state.northStar.health}), Career(${state.northStar.career}), Finance(${state.northStar.finance}), Relationships(${state.northStar.relationships})\n- Recent weekly review patterns:\n${reviewSummary||"No reviews yet — recommend based on their goals alone."}\n- They consume: books, Masterclasses, and podcasts\n\nRecommend ONE specific, real, well-known resource that fits where they are right now.\n\nReturn ONLY a JSON object, no markdown:\n{"type":"Book or Masterclass or Podcast","title":"exact title","author":"author or host","why":"2-3 sentences on why this fits them right now."}`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const raw=data.content?.map(b=>b.text||"").join("")||"{}";
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setRec(parsed);
      const logs=[...(state.weeklyLog||[])];
      if(logs.length>0){ logs[logs.length-1]={...logs[logs.length-1],recommendation:true}; }
      const n={...state,weeklyLog:logs}; setState(n); persist(n);
    } catch {
      setRec({type:"Book",title:"Four Thousand Weeks",author:"Oliver Burkeman",why:"Based on your patterns — the tension between doing more and being present — this book directly challenges the productivity mindset. It's about making peace with your limits and choosing what actually matters."});
    }
    setRecLoad(false);
  };

  const cl=state.completionLog||[];
  const log=state.habitLog||{};
  const windowDays=timeWindow==="7d"?7:timeWindow==="30d"?30:timeWindow==="6m"?180:3650;
  const cutoffD=new Date(Date.now()-windowDays*86400000);
  const cutoff=`${cutoffD.getFullYear()}-${String(cutoffD.getMonth()+1).padStart(2,"0")}-${String(cutoffD.getDate()).padStart(2,"0")}`;
  const filtered=cl.filter(e=>e.date>=cutoff);

  const getWeekBars=()=>{
    const bars=[];
    for(let i=6;i>=0;i--){
      const d=new Date(Date.now()-i*86400000);
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      const tasksDone=cl.filter(e=>e.date===k).length;
      const habitsDone=HABITS.filter(h=>log[k]?.[h.id]).length;
      bars.push({ label:d.toLocaleDateString("en-US",{weekday:"short"}), tasks:tasksDone, habits:habitsDone, total:tasksDone+habitsDone });
    }
    return bars;
  };
  const bars=getWeekBars();
  const maxBar=Math.max(...bars.map(b=>b.total),1);

  const byArea={health:0,career:0,finance:0,relationships:0};
  filtered.filter(e=>e.type==="goal"&&e.area).forEach(e=>{ byArea[e.area]=(byArea[e.area]||0)+1; });

  const qs=[
    {key:"q1",label:"What actually happened this week — wins, misses, surprises?"},
    {key:"q2",label:"What did you avoid or deprioritize — and honestly, why?"},
    {key:"q3",label:"What brought you genuine joy this week?"},
    {key:"q4",label:"When did you feel most like yourself?"},
    {key:"q5",label:"What is the ONE thing next week that connects to your most important goal?"},
  ];

  const submit=async()=>{
    setLoad(true);
    try {
      const hs=HABITS.map(h=>`${h.label}: ${calcStreak(log,h.id)}-day streak`).join(", ");
      const gs=Object.entries(AREA_META).map(([a,m])=>{ const t=state.goalTasks[a]||[]; return `${m.label}: ${t.filter(x=>x.done).length}/${t.length} stage ${state.currentStage[a]} tasks`; }).join(", ");
      const prompt=`You are a warm, direct life coach doing a weekly review. This person is working on living a full and meaningful life — not just being productive.\n\nTheir goals: Health(${state.northStar.health}), Career(${state.northStar.career}), Finance(${state.northStar.finance}), Relationships(${state.northStar.relationships})\nHabit streaks: ${hs}\nGoal progress: ${gs}\n\nTheir review:\nWhat happened: ${answers.q1}\nWhat they avoided: ${answers.q2}\nWhat brought joy: ${answers.q3}\nWhen they felt like themselves: ${answers.q4}\nONE priority next week: ${answers.q5}\n\nWrite 4-5 sentences. Be honest and warm — not just a coach but someone who genuinely cares. Acknowledge what's working AND what needs attention. End with one grounded, specific recommendation. No fluff. No empty praise.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json(); const text=data.content?.map(b=>b.text||"").join("")||"Keep going.";
      setAiResp(text);
      const n={...state,weeklyLog:[...(state.weeklyLog||[]),{date:todayKey(),answers,coaching:text}]};
      setState(n); persist(n); setSubmitted(true);
    } catch { setAiResp("Something went wrong — but sit with your answers, they matter."); setSubmitted(true); }
    setLoad(false);
  };

  return (
    <div>
      <div style={{ display:"flex",gap:8,marginBottom:16,background:C.surface,padding:4,borderRadius:12,border:`1px solid ${C.border}` }}>
        {[{id:"review",label:"📅 Weekly Review"},{id:"progress",label:"📊 Progress"}].map(v=>(
          <div key={v.id} onClick={()=>setView(v.id)} style={{ flex:1,textAlign:"center",padding:"8px 0",borderRadius:10,background:view===v.id?"linear-gradient(135deg,#0ea5e9,#2563eb)":"transparent",color:view===v.id?"#fff":C.sub,fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .2s" }}>{v.label}</div>
        ))}
      </div>

      {view==="review"&&(
        <>
          <div style={{ background:"linear-gradient(135deg,#eff6ff,#eef2ff)",border:"1px solid #c7d2fe",borderRadius:14,padding:"14px 16px",marginBottom:16 }}>
            <div style={{ fontSize:13,fontWeight:700,color:"#3730a3",marginBottom:4 }}>📅 The Sunday Reset</div>
            <div style={{ fontSize:13,color:"#4338ca",lineHeight:1.6 }}>5 questions. 15 minutes. The highest-leverage habit in this system — and the one most likely to make you feel like yourself again.</div>
          </div>
          {!submitted?<>
            {qs.map(q=>(
              <ReviewQuestion key={q.key} q={q} answers={answers} setAnswers={setAnswers} weeklyLog={state.weeklyLog} />
            ))}
            <Btn onClick={submit} disabled={loading||!qs.slice(0,3).every(q=>answers[q.key].trim())} full style={{ padding:"13px",fontSize:15,background:"linear-gradient(135deg,#0ea5e9,#2563eb)",border:"none" }}>
              {loading?"Getting your coaching...":"Submit review →"}
            </Btn>
          </>:<>
            <Card color="#6366f1" style={{ marginBottom:14,background:"linear-gradient(135deg,#eef2ff,#f5f3ff)" }}>
              <SLabel color="#6366f1">Your Coaching Response</SLabel>
              <div style={{ fontSize:14,color:C.text,lineHeight:1.9 }}>{aiResp}</div>
            </Card>
            <Btn variant="ghost" onClick={()=>{setSubmitted(false);setAnswers({q1:"",q2:"",q3:"",q4:"",q5:""});setAiResp("");}}>Start a new review</Btn>
          </>}
          {(state.weeklyLog||[]).length>0&&(
            <div style={{ marginTop:20 }}>
              <SLabel>Past Reviews ({(state.weeklyLog||[]).length} total)</SLabel>
              {[...state.weeklyLog].reverse().slice(0,5).map((l,i)=>(
                <PastReviewEntry key={i} log={l} />
              ))}
            </div>
          )}
          {showRecCard&&(
            <div style={{ marginTop:24 }}>
              <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:12 }}>
                <div style={{ fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#7c3aed",fontWeight:700 }}>📚 Monthly Resource</div>
                <div style={{ flex:1,height:1,background:"#ede9fe" }} />
              </div>
              {!rec?(
                <div style={{ background:"linear-gradient(135deg,#faf5ff,#ede9fe)",border:"1px solid #ddd6fe",borderRadius:16,padding:"18px 20px" }}>
                  <div style={{ fontSize:15,fontWeight:700,color:"#4c1d95",marginBottom:6 }}>Your resource recommendation 📚</div>
                  <div style={{ fontSize:13,color:"#6d28d9",lineHeight:1.6,marginBottom:14 }}>Based on your goals and where you are right now, I'll recommend one book, Masterclass, or podcast worth your time this month.</div>
                  <Btn onClick={getRecommendation} disabled={recLoading} style={{ background:"linear-gradient(135deg,#7c3aed,#6d28d9)",border:"none",color:"#fff" }}>
                    {recLoading?"Finding the right resource...":"Get my recommendation →"}
                  </Btn>
                </div>
              ):(
                <div style={{ background:"linear-gradient(135deg,#faf5ff,#ede9fe)",border:"1px solid #ddd6fe",borderRadius:16,padding:"18px 20px" }}>
                  <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:12 }}>
                    <span style={{ background:"#7c3aed1a",color:"#7c3aed",border:"1px solid #ddd6fe",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:800 }}>{rec.type}</span>
                    <span style={{ fontSize:10,color:"#a78bfa",fontWeight:600 }}>THIS MONTH'S PICK</span>
                  </div>
                  <div style={{ fontSize:18,fontWeight:800,color:"#3b0764",marginBottom:4,lineHeight:1.3 }}>{rec.title}</div>
                  <div style={{ fontSize:13,color:"#6d28d9",marginBottom:12 }}>by {rec.author}</div>
                  <div style={{ fontSize:13,color:"#4c1d95",lineHeight:1.7,background:"#fff",padding:"12px 14px",borderRadius:10,borderLeft:"3px solid #7c3aed" }}>{rec.why}</div>
                  <div onClick={()=>setRec(null)} style={{ fontSize:11,color:"#a78bfa",marginTop:12,cursor:"pointer",fontWeight:600 }}>Get a different recommendation →</div>
                </div>
              )}
            </div>
          )}
        </>
      )}

      {view==="progress"&&(
        <>
          <div style={{ display:"flex",gap:6,marginBottom:16,flexWrap:"wrap" }}>
            {[{id:"7d",label:"Last 7 days"},{id:"30d",label:"Last 30 days"},{id:"6m",label:"Last 6 months"},{id:"all",label:"All time"}].map(w=>(
              <div key={w.id} onClick={()=>setTimeWindow(w.id)} style={{ background:timeWindow===w.id?"#6366f1":"#fff",color:timeWindow===w.id?"#fff":C.sub,border:`1px solid ${timeWindow===w.id?"#6366f1":C.border}`,borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all .2s" }}>{w.label}</div>
            ))}
          </div>
          <Card style={{ marginBottom:14 }}>
            <SLabel>Daily Completions — Last 7 Days</SLabel>
            <div style={{ display:"flex",alignItems:"flex-end",gap:6,height:80,marginBottom:8 }}>
              {bars.map((b,i)=>(
                <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}>
                  <div style={{ width:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:70,gap:2 }}>
                    {b.habits>0&&<div style={{ width:"100%",height:`${(b.habits/maxBar)*60}px`,background:"linear-gradient(135deg,#10b981,#6ee7b7)",borderRadius:"4px 4px 0 0",minHeight:4,transition:"height .5s" }} />}
                    {b.tasks>0&&<div style={{ width:"100%",height:`${(b.tasks/maxBar)*60}px`,background:"linear-gradient(135deg,#6366f1,#a5b4fc)",borderRadius:"4px 4px 0 0",minHeight:4,transition:"height .5s" }} />}
                  </div>
                  <div style={{ fontSize:10,color:C.muted,fontWeight:600 }}>{b.label}</div>
                  {b.total>0&&<div style={{ fontSize:10,color:C.sub,fontWeight:700 }}>{b.total}</div>}
                </div>
              ))}
            </div>
            <div style={{ display:"flex",gap:12 }}>
              <div style={{ display:"flex",alignItems:"center",gap:5 }}><div style={{ width:10,height:10,borderRadius:2,background:"#6366f1" }}/><span style={{ fontSize:11,color:C.muted }}>Tasks</span></div>
              <div style={{ display:"flex",alignItems:"center",gap:5 }}><div style={{ width:10,height:10,borderRadius:2,background:"#10b981" }}/><span style={{ fontSize:11,color:C.muted }}>Habits</span></div>
            </div>
          </Card>
          <Card style={{ marginBottom:14 }}>
            <SLabel>Habit Streaks</SLabel>
            {HABITS.map(h=>{ const streak=calcStreak(log,h.id); return (
              <div key={h.id} style={{ display:"flex",alignItems:"center",gap:10,marginBottom:10 }}>
                <span style={{ fontSize:18 }}>{h.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                    <span style={{ fontSize:13,fontWeight:600,color:C.text }}>{h.label}</span>
                    <span style={{ fontSize:12,fontWeight:700,color:streak>0?h.color:C.muted }}>{streak>0?`🔥 ${streak} days`:"—"}</span>
                  </div>
                  <div style={{ height:4,background:`${h.color}22`,borderRadius:4,overflow:"hidden" }}>
                    <div style={{ height:"100%",width:`${Math.min(streak/30,1)*100}%`,background:h.color,borderRadius:4,transition:"width .5s" }} />
                  </div>
                </div>
              </div>
            );})}
          </Card>
          <Card style={{ marginBottom:14 }}>
            <SLabel>Goal Tasks Completed ({timeWindow==="7d"?"7 days":timeWindow==="30d"?"30 days":timeWindow==="6m"?"6 months":"all time"})</SLabel>
            {Object.entries(AREA_META).map(([area,meta])=>(
              <div key={area} style={{ display:"flex",alignItems:"center",gap:10,marginBottom:10 }}>
                <span style={{ fontSize:18 }}>{meta.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                    <span style={{ fontSize:13,fontWeight:600,color:C.text }}>{meta.label}</span>
                    <span style={{ fontSize:12,fontWeight:700,color:meta.color }}>{byArea[area]||0} completed · Stage {state.currentStage[area]}</span>
                  </div>
                  <div style={{ height:4,background:`${meta.color}22`,borderRadius:4,overflow:"hidden" }}>
                    <div style={{ height:"100%",width:`${Math.min((byArea[area]||0)/5,1)*100}%`,background:meta.color,borderRadius:4,transition:"width .5s" }} />
                  </div>
                </div>
              </div>
            ))}
          </Card>
        </>
      )}
    </div>
  );
}

// ── SETTINGS TAB ──────────────────────────────────────────────────────────────
function SettingsTab({ state, setState }) {
  const [importText,setImportText]=useState("");
  const [importStatus,setImportStatus]=useState(null);
  const [showImport,setShowImport]=useState(false);
  const [showReset,setShowReset]=useState(false);
  const [exportDone,setExportDone]=useState(false);

  const exportDownload=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=`life-compass-backup-${todayKey()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const exportClipboard=async()=>{
    try {
      await navigator.clipboard.writeText(JSON.stringify(state,null,2));
      setExportDone(true); setTimeout(()=>setExportDone(false),2000);
    } catch(e) {
      // Fallback for browsers that block clipboard
      exportDownload();
    }
  };

  const importData=()=>{
    try {
      const parsed=JSON.parse(importText.trim());
      if(!parsed.northStar||!parsed.goalTasks) throw new Error("Invalid format");
      const n={...defaultState(),...parsed};
      setState(n); persist(n);
      setImportStatus("success"); setImportText("");
      setTimeout(()=>setImportStatus(null),3000);
    } catch(e) {
      setImportStatus("error");
      setTimeout(()=>setImportStatus(null),3000);
    }
  };

  const handleFileImport=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ setImportText(ev.target.result); };
    reader.readAsText(file);
  };

  const resetApp=()=>{
    const fresh=defaultState();
    setState(fresh); persist(fresh); setShowReset(false);
  };

  const dataSize=JSON.stringify(state).length;
  const reviewCount=(state.weeklyLog||[]).length;
  const tasksDone=(state.adminTasks||[]).filter(t=>t.done).length;
  const goalsDone=Object.values(state.goalTasks||{}).flat().filter(t=>t.done).length;
  const habitDays=Object.keys(state.habitLog||{}).length;

  return (
    <div>
      <Card style={{ marginBottom:14 }}>
        <SLabel>Your Data</SLabel>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
          {[
            {label:"Weekly reviews",value:reviewCount,icon:"📅"},
            {label:"Goal tasks done",value:goalsDone,icon:"🎯"},
            {label:"Admin tasks done",value:tasksDone,icon:"📋"},
            {label:"Days tracked",value:habitDays,icon:"📆"},
          ].map(item=>(
            <div key={item.label} style={{ background:C.bg,borderRadius:12,padding:"12px 14px",border:`1px solid ${C.border}` }}>
              <div style={{ fontSize:22,marginBottom:4 }}>{item.icon}</div>
              <div style={{ fontSize:22,fontWeight:900,color:C.text }}>{item.value}</div>
              <div style={{ fontSize:11,color:C.muted,fontWeight:600 }}>{item.label}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize:11,color:C.muted,marginTop:12 }}>Data size: {(dataSize/1024).toFixed(1)}kb · Stored in browser localStorage</div>
      </Card>

      <Card color="#10b981" style={{ marginBottom:14,background:"linear-gradient(135deg,#f0fdf4,#dcfce7)" }}>
        <SLabel color="#10b981">📤 Save Your Data</SLabel>
        <div style={{ fontSize:13,color:"#166534",lineHeight:1.6,marginBottom:14 }}>
          Your data is auto-saved to this browser's localStorage. Use these options for backup or to move to another device/browser.
        </div>
        <div style={{ display:"flex",gap:10,flexWrap:"wrap" }}>
          <Btn onClick={exportClipboard} style={{ background:exportDone?"#10b981":"#059669",border:"none",color:"#fff" }}>
            {exportDone?"✓ Copied!":"📋 Copy to clipboard"}
          </Btn>
          <Btn onClick={exportDownload} variant="ghost">⬇️ Download .json file</Btn>
        </div>
        <div style={{ fontSize:11,color:"#166534",marginTop:10,lineHeight:1.6 }}>
          💡 <strong>Tip:</strong> Download the .json file periodically as a backup. Use "Restore Data" below to load it on any device.
        </div>
      </Card>

      <Card color="#6366f1" style={{ marginBottom:14 }}>
        <SLabel color="#6366f1">📥 Restore Data</SLabel>
        <div style={{ fontSize:13,color:C.sub,lineHeight:1.6,marginBottom:12 }}>
          <strong>From clipboard:</strong> paste your backup JSON below.<br/>
          <strong>From a file:</strong> upload the .json file directly.
        </div>
        {!showImport?(
          <Btn variant="ghost" onClick={()=>setShowImport(true)}>Show restore options</Btn>
        ):(
          <>
            <div style={{ fontSize:11,color:C.muted,marginBottom:6,fontWeight:700 }}>PASTE YOUR BACKUP DATA</div>
            <textarea style={{ ...iStyle(),height:100,resize:"none",marginBottom:10,fontSize:11,fontFamily:"monospace" }}
              placeholder='Paste your backup here...'
              value={importText} onChange={e=>setImportText(e.target.value)} />
            <div style={{ marginBottom:12 }}>
              <label style={{ display:"inline-block",background:"#f8fafc",color:C.sub,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer" }}>
                📁 Or upload .json file
                <input type="file" accept=".json" style={{ display:"none" }} onChange={handleFileImport} />
              </label>
            </div>
            {importStatus==="success"&&<div style={{ fontSize:13,color:"#10b981",fontWeight:700,marginBottom:8 }}>✓ Data restored successfully!</div>}
            {importStatus==="error"&&<div style={{ fontSize:13,color:"#ef4444",fontWeight:700,marginBottom:8 }}>⚠ Invalid backup. Make sure you copied the full text.</div>}
            <div style={{ display:"flex",gap:8 }}>
              <Btn variant="ghost" small onClick={()=>{setShowImport(false);setImportText("");}}>Cancel</Btn>
              <Btn small disabled={!importText.trim()} onClick={importData} style={{ background:"#6366f1",border:"none",color:"#fff" }}>Restore data</Btn>
            </div>
          </>
        )}
      </Card>

      <Card style={{ marginBottom:14,background:"linear-gradient(135deg,#fffbeb,#fef3c7)",border:"1px solid #fcd34d" }}>
        <SLabel color="#92400e">🚀 Moving to a hosted app?</SLabel>
        <div style={{ fontSize:13,color:"#78350f",lineHeight:1.8 }}>
          <strong>Step 1:</strong> Download your data (above)<br/>
          <strong>Step 2:</strong> Give the .json + this app's code to a developer<br/>
          <strong>Step 3:</strong> They deploy to Netlify/Vercel (~1 hour of work)<br/>
          <strong>Step 4:</strong> Use Import to load your data into the new version<br/>
          <strong>Step 5:</strong> Add to iPhone home screen as a PWA
        </div>
      </Card>

      <Card style={{ border:"1px solid #fecaca" }}>
        <SLabel color="#ef4444">⚠ Danger Zone</SLabel>
        {!showReset?(
          <Btn variant="ghost" small onClick={()=>setShowReset(true)} style={{ color:"#ef4444",borderColor:"#fecaca" }}>Reset all data</Btn>
        ):(
          <>
            <div style={{ fontSize:13,color:"#991b1b",marginBottom:12,lineHeight:1.6 }}>
              This will permanently delete all your data and restart setup. Export first if you want a backup.
            </div>
            <div style={{ display:"flex",gap:8 }}>
              <Btn variant="ghost" small onClick={()=>setShowReset(false)}>Cancel</Btn>
              <Btn small onClick={resetApp} style={{ background:"#ef4444",border:"none",color:"#fff" }}>Yes, reset everything</Btn>
            </div>
          </>
        )}
      </Card>
    </div>
  );
}

// ── NAV & ROOT ────────────────────────────────────────────────────────────────
const NAV=[
  {id:"today",    label:"Today",    icon:"☀️"},
  {id:"now",      label:"Right Now",icon:"⚡"},
  {id:"goals",    label:"Goals",    icon:"🎯"},
  {id:"tasks",    label:"Tasks",    icon:"📋"},
  {id:"weekly",   label:"Weekly",   icon:"📅"},
  {id:"settings", label:"Settings", icon:"⚙️"},
];

function App() {
  const [state,setState]=useState(null);
  const [tab,setTab]=useState("today");
  const [boot,setBoot]=useState(true);
  const [saveStatus,setSaveStatus]=useState(null);
  const toast = useToast();

  // FIX: synchronous load (localStorage is sync) — no async needed, no flash
  useEffect(()=>{
    const d = loadData();
    setState(d || defaultState());
    setBoot(false);
  },[]);

  // FIX: proper cleanup on unmount to prevent listener accumulation
  useEffect(()=>{
    const cleanup = onSaveStatus((ok)=>{
      setSaveStatus(ok?"saved":"error");
      setTimeout(()=>setSaveStatus(null),2000);
    });
    return cleanup;
  },[]);

  // FIX: Save button using proper state (no showToast scope issue)
  const handleManualSave = useCallback(async ()=>{
    if(!state) return;
    const dataStr = JSON.stringify(state, null, 2);
    try {
      await navigator.clipboard.writeText(dataStr);
      showToast("✓ Copied to clipboard — paste into Notes to backup","#10b981");
    } catch(e) {
      // Fallback: download
      try {
        const blob=new Blob([dataStr],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");
        a.href=url; a.download=`life-compass-backup-${todayKey()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("✓ Backup downloaded","#10b981");
      } catch(e2) {
        showToast("⚠ Manual save failed — use ⚙️ Settings","#ef4444");
      }
    }
  },[state]);

  if(boot) return (
    <div style={{ minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",color:C.muted }}>
      Loading your compass...
    </div>
  );
  if(!state.setupDone) return <Setup initial={state} onDone={s=>{setState(s);persist(s);}}/>;

  const today=todayKey();
  const habitsDone=HABITS.filter(h=>state.habitLog?.[today]?.[h.id]).length;
  const overdue=(state.adminTasks||[]).filter(t=>!t.done&&t.deadline&&t.deadline<=today).length;
  const hour=new Date().getHours();
  const greeting=hour<12?"Good morning":hour<17?"Good afternoon":"Good evening";

  return (
    <div style={{ minHeight:"100vh",background:C.bg,fontFamily:"Georgia,Georgia,serif",color:C.text }}>
      {/* Toast */}
      {toast&&(
        <div style={{ position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",zIndex:200,background:toast.color,color:"#fff",borderRadius:20,padding:"10px 20px",fontSize:13,fontWeight:700,boxShadow:"0 4px 20px #00000033",whiteSpace:"nowrap",pointerEvents:"none" }}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#0ea5e9,#2563eb)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 16px #0ea5e944" }}>
        <div>
          <div style={{ fontSize:17,fontWeight:900,color:"#fff" }}>🧭 Life Compass</div>
          <div style={{ fontSize:11,color:"#bae6fd" }}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
        </div>
        <div style={{ display:"flex",gap:8,alignItems:"center" }}>
          {saveStatus&&(
            <span style={{ background:saveStatus==="saved"?"#10b98133":"#ef444433",color:saveStatus==="saved"?"#10b981":"#ef4444",border:`1px solid ${saveStatus==="saved"?"#10b98166":"#ef444466"}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700 }}>
              {saveStatus==="saved"?"✓ Saved":"⚠ Save error"}
            </span>
          )}
          <span style={{ background:"#ffffff22",color:"#fff",border:"1px solid #ffffff33",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700 }}>{habitsDone}/{HABITS.length} habits</span>
          {overdue>0&&<span style={{ background:"#ef444422",color:"#fca5a5",border:"1px solid #ef444444",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700 }}>⚠ {overdue} due</span>}
        </div>
      </div>

      {/* Page title + save button */}
      <div style={{ background:"#fff",borderBottom:`1px solid ${C.border}`,padding:"12px 20px 10px" }}>
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize:20,fontWeight:900,color:C.text }}>
              {tab==="today"?`${greeting}.`:tab==="now"?"⚡ What can I do right now?":tab==="settings"?"⚙️ Settings & Data":NAV.find(n=>n.id===tab)?.icon+" "+NAV.find(n=>n.id===tab)?.label}
            </div>
            {tab==="today"&&<div style={{ fontSize:13,color:C.sub,marginTop:1 }}>Let's make today count.</div>}
            {tab==="now"&&<div style={{ fontSize:13,color:C.sub,marginTop:1 }}>Tasks matched to your available time.</div>}
            {tab==="settings"&&<div style={{ fontSize:13,color:C.sub,marginTop:1 }}>Export, import, and manage your data.</div>}
          </div>
          {/* FIX: button now calls handleManualSave which is properly scoped */}
          <button onClick={handleManualSave} style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 10px",background:"linear-gradient(135deg,#f0fdf4,#dcfce7)",border:"1px solid #86efac",borderRadius:12,cursor:"pointer",flexShrink:0 }}>
            <span style={{ fontSize:18 }}>💾</span>
            <span style={{ fontSize:9,fontWeight:800,color:"#166534",letterSpacing:0.3 }}>SAVE</span>
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{ maxWidth:600,margin:"0 auto",padding:"18px 16px 100px" }}>
        {tab==="today"   &&<TodayTab    state={state} setState={setState}/>}
        {tab==="now"     &&<RightNowTab state={state} setState={setState}/>}
        {tab==="goals"   &&<GoalsTab    state={state} setState={setState}/>}
        {tab==="tasks"   &&<TasksTab    state={state} setState={setState}/>}
        {tab==="weekly"  &&<WeeklyTab   state={state} setState={setState}/>}
        {tab==="settings"&&<SettingsTab state={state} setState={setState}/>}
      </div>

      {/* Bottom nav */}
      <div style={{ position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-around",padding:"8px 0 14px",boxShadow:"0 -2px 16px #0000000f",overflowX:"auto" }}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{ background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"0 8px",fontFamily:"inherit",flexShrink:0 }}>
            <div style={{ fontSize:20 }}>{n.icon}</div>
            <div style={{ fontSize:9,fontWeight:800,letterSpacing:0.3,color:tab===n.id?"#6366f1":C.muted,transition:"color .15s",whiteSpace:"nowrap" }}>{n.label.toUpperCase()}</div>
            {tab===n.id&&<div style={{ width:4,height:4,borderRadius:"50%",background:"#6366f1" }}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
