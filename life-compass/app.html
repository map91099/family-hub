// ── Storage ───────────────────────────────────────────────────────────────────
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const STORE_KEY = "lc-v7";

// FIX: Use a single global event emitter with proper cleanup
const saveStatusEmitter = { listeners: new Set() };
const onSaveStatus = (fn) => {
  saveStatusEmitter.listeners.add(fn);
  return () => saveStatusEmitter.listeners.delete(fn); // returns cleanup fn
};
const fireSaveStatus = (ok) => saveStatusEmitter.listeners.forEach(fn => fn(ok));

// FIX: Reliable persist — localStorage only (window.storage is Claude-artifacts-only, not available in standalone HTML)
const persist = (d) => {
  const json = JSON.stringify(d);
  let ok = false;
  try {
    localStorage.setItem(STORE_KEY, json);
    ok = true;
  } catch(e) {
    console.warn("localStorage save failed:", e);
    // Fallback: try sessionStorage
    try { sessionStorage.setItem(STORE_KEY, json); ok = true; } catch {}
  }
  fireSaveStatus(ok);
  return ok;
};

const loadData = () => {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) { console.warn("localStorage load failed:", e); }
  try {
    const raw = sessionStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const calcStreak = (log, hid) => {
  let s=0, d=new Date();
  while(true){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const dayLog=log[k]||{};
    if(!dayLog[hid] && !dayLog[`skip_${hid}`]) break;
    if(dayLog[hid]) s++;
    d.setDate(d.getDate()-1);
  }
  return s;
};
const daysSince = (dateStr) => {
  if(!dateStr) return null;
  return Math.floor((Date.now()-new Date(dateStr).getTime())/(1000*60*60*24));
};

// ── Primitives ────────────────────────────────────────────────────────────────
const iStyle = (x={}) => ({
  width:"100%", background:"#f8fafc", border:`1px solid ${C.border}`,
  borderRadius:8, padding:"9px 12px", color:C.text, fontFamily:"inherit",
  fontSize:14, outline:"none", boxSizing:"border-box", ...x
});
const Btn = ({ children, onClick, variant="primary", small, disabled, full, style={} }) => {

  return (
    <button onClick={onClick} disabled={disabled} style={{
      ...v[variant], borderRadius:8, cursor:disabled?"not-allowed":"pointer",
      fontFamily:"inherit", fontWeight:700,
      padding:small?"5px 12px":"9px 20px", fontSize:small?12:13,
      opacity:disabled?0.4:1, width:full?"100%":"auto", ...style
    }}>{children}</button>
  );
};

  }}>{children}</div>
);
const SLabel = ({children, color}) => (

// ── Toast (global pub/sub — FIXED: proper Set-based listeners with cleanup) ───
const toastEmitter = { listeners: new Set() };
const showToast = (msg, color="#10b981") => toastEmitter.listeners.forEach(fn=>fn({msg,color}));
function useToast() {
  const [toast,setToast] = useState(null);
  useEffect(()=>{
    const fn = (t) => { setToast(t); setTimeout(()=>setToast(null),2200); };
    toastEmitter.listeners.add(fn);
    return ()=>toastEmitter.listeners.delete(fn); // FIX: proper cleanup
  },[]);
  return toast;
}

// ── TaskRow ───────────────────────────────────────────────────────────────────
function TaskRow({ task, onToggle, color, showArea }) {
  const tc = TC[task.time]||{bg:"#f1f5f9",text:C.sub,border:C.border,label:task.time};
  const overdue = task.deadline && !task.done && task.deadline < todayKey();
  return (
    <div style={{ display:"flex",alignItems:"stretch",background:C.surface,borderRadius:14,marginBottom:10,overflow:"hidden",border:`1.5px solid ${overdue?"#ef444488":color?color+"33":C.border}`,boxShadow:"0 1px 6px #0000000a",opacity:task.done?0.5:1,transition:"opacity .3s" }}>
      <div style={{ flex:1,padding:"14px 16px",display:"flex",alignItems:"center",gap:12 }}>
        <div onClick={()=>onToggle(task.id)} style={{ width:24,height:24,borderRadius:7,flexShrink:0,cursor:"pointer",background:task.done?(color||"#10b981"):"transparent",border:`2px solid ${task.done?(color||"#10b981"):C.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,transition:"all .2s" }}>{task.done?"✓":""}</div>
        <div style={{ flex:1 }}>
          {showArea && task.area && <div style={{ fontSize:10,fontWeight:700,color:AREA_META[task.area]?.color||C.muted,letterSpacing:1,textTransform:"uppercase",marginBottom:3 }}>{AREA_META[task.area]?.icon} {AREA_META[task.area]?.label}</div>}
          <div style={{ fontSize:15,fontWeight:600,color:task.done?C.muted:C.text,textDecoration:task.done?"line-through":"none",lineHeight:1.3 }}>{task.text}</div>
          {task.why && !task.done && <div style={{ fontSize:12,color:C.sub,marginTop:4,fontStyle:"italic",lineHeight:1.5 }}>💡 {task.why}</div>}
          {overdue && <div style={{ fontSize:11,color:"#ef4444",fontWeight:700,marginTop:3 }}>⚠ Overdue · due {task.deadline}</div>}
          {task.deadline && !overdue && !task.done && <div style={{ fontSize:11,color:C.muted,marginTop:3 }}>📅 Due {task.deadline}</div>}
        </div>
      </div>
      {task.time && task.time!=="varies" && (
        <div style={{ background:tc.bg,borderLeft:`1.5px solid ${tc.border}`,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 14px",flexShrink:0 }}>
          <span style={{ color:tc.text,fontSize:12,fontWeight:800,whiteSpace:"nowrap" }}>{tc.label}</span>
        </div>
      )}
    </div>
  );
}

// ── AdminTaskRow ──────────────────────────────────────────────────────────────
function AdminTaskRow({ t, onToggle, onRemove, onSave, expandedId, setExpandedId, editingId, setEditingId }) {
  const [editDeadline,setEDL] = useState(t.deadline||"");
  const [editNotes,setEN]     = useState(t.notes||"");
  const tc     = TC[t.time]||{bg:"#f1f5f9",text:C.sub,border:C.border,label:t.time};
  const overdue= t.deadline&&!t.done&&t.deadline<todayKey();
  const isExp  = expandedId===t.id;
  const isEdit = editingId===t.id;
  return (
    <div style={{ background:C.surface,borderRadius:14,marginBottom:10,overflow:"hidden",border:`1.5px solid ${overdue?"#ef444466":tc.border}`,boxShadow:"0 1px 6px #0000000a",opacity:t.done?0.5:1 }}>
      <div style={{ display:"flex",alignItems:"stretch" }}>
        <div style={{ flex:1,padding:"14px 16px",display:"flex",alignItems:"center",gap:12 }}>
          <div onClick={()=>onToggle(t.id)} style={{ width:24,height:24,borderRadius:7,flexShrink:0,cursor:"pointer",background:t.done?"#10b981":"transparent",border:`2px solid ${t.done?"#10b981":C.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,transition:"all .2s" }}>{t.done?"✓":""}</div>
          <div style={{ flex:1,cursor:"pointer" }} onClick={()=>!isEdit&&setExpandedId(isExp?null:t.id)}>
            <div style={{ fontSize:15,fontWeight:600,color:t.done?C.muted:C.text,textDecoration:t.done?"line-through":"none",lineHeight:1.3 }}>{t.text}</div>
            <div style={{ display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center" }}>
              <span style={{ fontSize:11,color:C.muted,background:"#f1f5f9",borderRadius:20,padding:"2px 8px" }}>{t.category}</span>
              {t.deadline&&<span style={{ fontSize:11,color:overdue?"#ef4444":C.muted }}>📅 {t.deadline}</span>}
              {t.notes&&<span style={{ fontSize:11,color:C.muted }}>📝 note</span>}
              {overdue&&<span style={{ fontSize:11,color:"#ef4444",fontWeight:700 }}>⚠ OVERDUE</span>}
              <span style={{ fontSize:11,color:"#6366f1",marginLeft:"auto" }}>{isExp?"▲ hide":"▼ details"}</span>
            </div>
          </div>
        </div>
        <div style={{ background:tc.bg,borderLeft:`1.5px solid ${tc.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 14px",flexShrink:0,gap:8 }}>
          <span style={{ color:tc.text,fontSize:12,fontWeight:800,whiteSpace:"nowrap" }}>{tc.label}</span>
          <span onClick={()=>onRemove(t.id)} style={{ color:tc.text,cursor:"pointer",fontSize:16,lineHeight:1,opacity:.6 }}>×</span>
        </div>
      </div>
      {isExp&&(
        <div style={{ padding:"0 16px 16px",borderTop:`1px solid ${C.border}` }}>
          {!isEdit?(
            <>
              {t.deadline&&<div style={{ fontSize:13,color:C.sub,marginTop:12 }}>📅 Due: <strong>{t.deadline}</strong></div>}
              {t.notes&&<div style={{ fontSize:13,color:C.sub,marginTop:8,lineHeight:1.6 }}>📝 {t.notes}</div>}
              {!t.deadline&&!t.notes&&<div style={{ fontSize:13,color:C.muted,marginTop:12 }}>No deadline or notes yet.</div>}
              <Btn variant="ghost" small style={{ marginTop:12 }} onClick={()=>setEditingId(t.id)}>Edit deadline &amp; notes</Btn>
            </>
          ):(
            <div style={{ marginTop:12 }}>
              <div style={{ fontSize:11,color:C.muted,marginBottom:4,fontWeight:700 }}>DUE DATE</div>
              <input type="date" style={{ ...iStyle(),marginBottom:10 }} value={editDeadline} onChange={e=>setEDL(e.target.value)} />
              <div style={{ fontSize:11,color:C.muted,marginBottom:4,fontWeight:700 }}>NOTES</div>
              <textarea style={{ ...iStyle(),height:70,resize:"none",marginBottom:12 }} value={editNotes} onChange={e=>setEN(e.target.value)} placeholder="Context, reminders, links..." />
              <div style={{ display:"flex",gap:8 }}>
                <Btn variant="ghost" small onClick={()=>setEditingId(null)}>Cancel</Btn>
                <Btn small onClick={()=>onSave(t.id,{deadline:editDeadline,notes:editNotes})}>Save</Btn>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

    <div style={{ minHeight:"100vh",background:"linear-gradient(135deg,#0ea5e9,#2563eb)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"Georgia,serif" }}>
      <div style={{ maxWidth:520,width:"100%" }}>
        <div style={{ textAlign:"center",marginBottom:32 }}>
          <div style={{ fontSize:48 }}>🧭</div>
          <div style={{ fontSize:28,fontWeight:900,color:"#fff",marginTop:8 }}>Life Compass</div>
          <div style={{ fontSize:14,color:"#c4b5fd",marginTop:6 }}>Not just a productivity app. A tool for living well.</div>
        </div>
        <div style={{ background:"#fff",borderRadius:20,padding:"28px 24px",boxShadow:"0 20px 60px #0000003a" }}>
          <div style={{ fontSize:11,color:"#6366f1",fontWeight:800,letterSpacing:2,textTransform:"uppercase",marginBottom:6 }}>Step {step+1} of 2</div>
          {step===0&&<>
            <div style={{ fontSize:22,fontWeight:800,color:C.text,marginBottom:6 }}>Who are you becoming? 🌟</div>
            <div style={{ fontSize:13,color:C.sub,marginBottom:20,lineHeight:1.6 }}>These aren't just goals — they're identity statements. Edit them to sound like you.</div>
            {Object.entries(AREA_META).map(([key,meta])=>(
              <div key={key} style={{ marginBottom:14 }}>
                <div style={{ fontSize:12,fontWeight:800,color:meta.color,marginBottom:4 }}>{meta.icon} {meta.label}</div>
                <div style={{ fontSize:11,color:C.muted,fontStyle:"italic",marginBottom:6 }}>"{meta.identity}"</div>
                <textarea style={{ ...iStyle(),height:56,resize:"none" }} value={ns[key]} onChange={e=>setNs({...ns,[key]:e.target.value})} />
              </div>
            ))}
          </>}
          {step===1&&<>
            <div style={{ fontSize:22,fontWeight:800,color:C.text,marginBottom:6 }}>Your Daily Anchors 🔁</div>
            <div style={{ fontSize:13,color:C.sub,marginBottom:20,lineHeight:1.6 }}>Six habits grounded in science and calibrated to your life. Small daily actions compound into the person you want to be.</div>
            {HABITS.map(h=>(
              <div key={h.id} style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:`${h.color}0f`,border:`1px solid ${h.color}33`,borderRadius:12,marginBottom:10 }}>
                <span style={{ fontSize:22 }}>{h.icon}</span>
                <div><div style={{ fontSize:14,fontWeight:700,color:C.text }}>{h.label}</div><div style={{ fontSize:12,color:C.sub }}>{h.desc}</div></div>
              </div>
            ))}
          </>}
          <div style={{ display:"flex",justifyContent:"space-between",marginTop:22 }}>
            <Btn variant="ghost" onClick={()=>setStep(s=>s-1)} disabled={step===0}>← Back</Btn>
            {step<1?<Btn onClick={()=>setStep(s=>s+1)}>Continue →</Btn>:<Btn onClick={finish} style={{ background:"linear-gradient(135deg,#0ea5e9,#2563eb)",border:"none" }}>Begin 🚀</Btn>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Energy-adaptive nudge & hard week ────────────────────────────────────────
const getAdaptiveNudge = (nudges, nudgeIndex, energy) => {
  if(energy==="low"){
    const compassion=nudges.filter(n=>n.type==="compassion"||n.type==="joy");
    if(compassion.length) return compassion[nudgeIndex%compassion.length];
  }
  return nudges[nudgeIndex%nudges.length];
};
const isHardWeek = (state) => {
  let emptyDays = 0;
  for(let i=1; i<=3; i++){
    const d = new Date(Date.now()-i*86400000);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const habitsLog = state.habitLog?.[k]||{};
    const habitsDone = HABITS.filter(h=>habitsLog[h.id]).length;
    const goalsDone = Object.values(state.goalTasks||{}).flat().filter(t=>t.doneAt===k).length;
    if(habitsDone===0 && goalsDone===0) emptyDays++;
  }
  return emptyDays>=2;
};

// ── TODAY TAB ─────────────────────────────────────────────────────────────────
function TodayTab({ state, setState }) {
  const [focusInput,setFI]=useState("");
  const today   = todayKey();
  const log     = state.habitLog||{};
  const intents = state.dailyIntentions||{};
  const todayIntents = intents[today]||{};
  const hour    = new Date().getHours();
  const [isEvening,setIsEvening]=useState(hour>=17);
  const mqIdx  = Math.floor(new Date().getDate()%MORNING_QUESTIONS.length);
  const eqIdx  = Math.floor((new Date().getDate()+2)%EVENING_QUESTIONS.length);
  const energy  = todayIntents.energy||null;
  const nudge   = getAdaptiveNudge(NUDGES, state.nudgeIndex, energy);
  const hardWeek = isHardWeek(state);

  // FIX: todayFocus is now per-day
  const allFocus = state.todayFocus||{};
  const items = Array.isArray(allFocus) ? allFocus : (allFocus[today]||[]);

  const setIntention=(key,val)=>{
    const nd={...intents,[today]:{...todayIntents,[key]:val}};
    const n={...state,dailyIntentions:nd}; setState(n); persist(n);
  };
  const addFocus=()=>{
    if(!focusInput.trim()||items.length>=3) return;
    const newItems=[...items,{id:Date.now(),text:focusInput.trim(),done:false}];
    const allFocusObj=Array.isArray(state.todayFocus)?{}:{...state.todayFocus};
    const n={...state,todayFocus:{...allFocusObj,[today]:newItems}};
    setState(n); persist(n); setFI("");
  };
  const toggleFocus=(id)=>{
    const newItems=items.map(i=>i.id===id?{...i,done:!i.done}:i);
    const allFocusObj=Array.isArray(state.todayFocus)?{}:{...state.todayFocus};
    const n={...state,todayFocus:{...allFocusObj,[today]:newItems}};
    setState(n); persist(n);
  };
  const clearFocus=()=>{
    const allFocusObj=Array.isArray(state.todayFocus)?{}:{...state.todayFocus};
    const n={...state,todayFocus:{...allFocusObj,[today]:[]}};
    setState(n); persist(n);
  };
  const toggleHabit=(hid)=>{
    const tl={...(log[today]||{})}; if(tl[hid]) delete tl[hid]; else tl[hid]=true;
    const cl=[...(state.completionLog||[])];
    if(tl[hid]) cl.push({date:today,type:"habit",label:HABITS.find(h=>h.id===hid)?.label,area:null});
    const n={...state,habitLog:{...log,[today]:tl},completionLog:cl}; setState(n); persist(n);
  };
  const skipHabit=(hid,e)=>{
    e.stopPropagation();
    const todayLog={...(log[today]||{})};
    if(todayLog[`skip_${hid}`]){ delete todayLog[`skip_${hid}`]; }
    else { todayLog[`skip_${hid}`]=true; delete todayLog[hid]; }
    const n={...state,habitLog:{...log,[today]:todayLog}}; setState(n); persist(n);
  };
  const dueToday=(state.adminTasks||[]).filter(t=>!t.done&&t.deadline===today);
  const overdueT=(state.adminTasks||[]).filter(t=>!t.done&&t.deadline&&t.deadline<today);
  const dueSoon=[...overdueT,...dueToday];
  const toggleAdminFromToday=(id)=>{ const n={...state,adminTasks:state.adminTasks.map(t=>t.id===id?{...t,done:!t.done}:t)}; setState(n); persist(n); };
  const habitsDone=HABITS.filter(h=>log[today]?.[h.id]).length;
  const habitsSkipped=HABITS.filter(h=>log[today]?.[`skip_${h.id}`]).length;
  const todayEvents=(state.events||[]).filter(e=>e.date===today).sort((a,b)=>a.time.localeCompare(b.time));
  const markAttended=(id)=>{ const n={...state,events:(state.events||[]).map(e=>e.id===id?{...e,attended:!e.attended}:e)}; setState(n); persist(n); };
  const formatTime=(t)=>{ if(!t) return ""; const [h,m]=t.split(":").map(Number); const ampm=h>=12?"PM":"AM"; const hr=h%12||12; return `${hr}:${m.toString().padStart(2,"0")} ${ampm}`; };
  const getCountdown=(timeStr)=>{ const now=new Date(); const [h,m]=timeStr.split(":").map(Number); const eventMins=h*60+m; const nowMins=now.getHours()*60+now.getMinutes(); const diff=eventMins-nowMins; if(diff<0) return "past"; if(diff===0) return "now"; if(diff<60) return `in ${diff}m`; return `in ${Math.floor(diff/60)}h ${diff%60>0?diff%60+"m":""}`.trim(); };

  return (
    <div>
      {hardWeek&&!energy&&(
        <div style={{ background:"linear-gradient(135deg,#fdf4ff,#ede9fe)",border:"1px solid #ddd6fe",borderRadius:14,padding:"16px 18px",marginBottom:14 }}>
          <div style={{ fontSize:15,fontWeight:800,color:"#4c1d95",marginBottom:6 }}>Looks like this week has been tough. 💙</div>
          <div style={{ fontSize:13,color:"#6d28d9",lineHeight:1.7,marginBottom:12 }}>That's okay — hard weeks happen. You don't need to catch up on everything. What's one small thing you could do in the next 10 minutes that would feel good?</div>
          <div style={{ fontSize:12,color:"#7c3aed",fontStyle:"italic" }}>Start with your energy check below, and go from there.</div>
        </div>
      )}

      {!isEvening&&(
        <Card style={{ marginBottom:14 }}>
          <SLabel>How's your energy today?</SLabel>
          {!energy?(
            <div style={{ display:"flex",gap:10 }}>
              {[
                {val:"low",   label:"Low",  emoji:"😔", bg:"#fef2f2", color:"#dc2626", border:"#fca5a5"},
                {val:"medium",label:"Okay", emoji:"😐", bg:"#fefce8", color:"#ca8a04", border:"#fde047"},
                {val:"high",  label:"Good", emoji:"😊", bg:"#f0fdf4", color:"#16a34a", border:"#86efac"},
              ].map(opt=>(
                <div key={opt.val} onClick={()=>setIntention("energy",opt.val)} style={{ flex:1,textAlign:"center",padding:"12px 8px",background:opt.bg,border:`2px solid ${opt.border}`,borderRadius:12,cursor:"pointer",transition:"all .2s" }}>
                  <div style={{ fontSize:24,marginBottom:4 }}>{opt.emoji}</div>
                  <div style={{ fontSize:12,fontWeight:800,color:opt.color }}>{opt.label}</div>
                </div>
              ))}
            </div>
          ):(
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
              <div style={{ fontSize:14,color:C.sub }}>
                {energy==="low"&&"😔 Low energy today — be gentle with yourself"}
                {energy==="medium"&&"😐 Okay energy — steady wins the day"}
                {energy==="high"&&"😊 Good energy — make the most of it"}
              </div>
              <span onClick={()=>setIntention("energy",null)} style={{ fontSize:11,color:C.muted,cursor:"pointer" }}>reset</span>
            </div>
          )}
          {energy==="low"&&(
            <div style={{ marginTop:10,fontSize:12,color:"#dc2626",background:"#fef2f2",padding:"8px 12px",borderRadius:8,lineHeight:1.6 }}>
              💡 Low energy day — the ⚡ Right Now tab is showing 15-min tasks only. One small thing is enough.
            </div>
          )}
        </Card>
      )}

      <div style={{ display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:10,gap:8 }}>
        <span style={{ fontSize:12,color:C.muted }}>Switch to:</span>
        <div onClick={()=>setIsEvening(!isEvening)} style={{ background:isEvening?"linear-gradient(135deg,#1e1b4b,#312e81)":"linear-gradient(135deg,#fef3c7,#fde68a)",border:`1px solid ${isEvening?"#4338ca":"#fcd34d"}`,borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:700,color:isEvening?"#c7d2fe":"#92400e",cursor:"pointer" }}>
          {isEvening?"☀️ Morning":"🌙 Evening"}
        </div>
      </div>

      <Card color="#6366f1" style={{ marginBottom:14,background:isEvening?"linear-gradient(135deg,#1e1b4b0f,#312e810f)":"linear-gradient(135deg,#eef2ff,#f5f3ff)" }}>
        <SLabel color="#6366f1">{isEvening?"🌙 Evening reflection":"🌅 Morning intention"}</SLabel>
        <div style={{ fontSize:15,fontWeight:700,color:"#3730a3",marginBottom:10,lineHeight:1.5 }}>
          {isEvening?EVENING_QUESTIONS[eqIdx]:MORNING_QUESTIONS[mqIdx]}
        </div>
        {(isEvening?todayIntents.evening:todayIntents.morning)
          ? <div style={{ fontSize:14,color:"#4338ca",fontStyle:"italic",background:"#fff",padding:"10px 14px",borderRadius:10 }}>
              "{isEvening?todayIntents.evening:todayIntents.morning}"
              <span onClick={()=>setIntention(isEvening?"evening":"morning","")} style={{ fontSize:11,color:C.muted,marginLeft:8,cursor:"pointer" }}>edit</span>
            </div>
          : <IntentionInput
              placeholder={isEvening?"One honest moment...":"Write something honest..."}
              onSave={(val)=>setIntention(isEvening?"evening":"morning",val)}
            />
        }
      </Card>

      {todayEvents.length>0&&(
        <Card color="#0ea5e9" style={{ marginBottom:14,background:"linear-gradient(135deg,#f0f9ff,#e0f2fe)" }}>
          <SLabel color="#0284c7">📆 Today's Events</SLabel>
          {todayEvents.map(e=>{
            const countdown=getCountdown(e.time);
            const isPast=countdown==="past";
            const isNow=countdown==="now";
            return (
              <div key={e.id} onClick={()=>markAttended(e.id)} style={{ display:"flex",alignItems:"center",gap:12,marginBottom:10,opacity:e.attended?0.5:1,cursor:"pointer",transition:"opacity .2s" }}>
                <div style={{ background:isNow?"#0ea5e9":isPast?"#94a3b8":"#0284c7",borderRadius:10,padding:"6px 10px",textAlign:"center",flexShrink:0,minWidth:54 }}>
                  <div style={{ fontSize:14,fontWeight:900,color:"#fff",lineHeight:1 }}>{formatTime(e.time)}</div>
                  {!e.attended&&<div style={{ fontSize:9,color:"#bae6fd",marginTop:2,fontWeight:600 }}>{isNow?"NOW!":isPast?"past":countdown}</div>}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:15,fontWeight:700,color:e.attended?"#94a3b8":"#0c4a6e",textDecoration:e.attended?"line-through":"none" }}>{e.title}</div>
                  {e.note&&<div style={{ fontSize:12,color:"#0369a1",marginTop:2 }}>{e.note}</div>}
                </div>
                <div style={{ width:24,height:24,borderRadius:7,flexShrink:0,background:e.attended?"#0ea5e9":"transparent",border:`2px solid ${e.attended?"#0ea5e9":"#7dd3fc"}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,transition:"all .2s" }}>{e.attended?"✓":""}</div>

      )}

      <Card style={{ marginBottom:14 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
          <SLabel>Top 3 Priorities</SLabel>

          <div style={{ display:"flex",gap:8,marginBottom:12 }}>
            <input style={{ ...iStyle(),flex:1 }} placeholder={`Priority ${items.length+1} of 3...`} value={focusInput} onChange={e=>setFI(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addFocus()} />
            <Btn onClick={addFocus} disabled={!focusInput.trim()}>Add</Btn>
          </div>
        )}
        {items.length===0&&<div style={{ color:C.muted,fontSize:13 }}>What 3 things would make today feel full?</div>}
        {items.map((item,idx)=>(
          <div key={item.id} onClick={()=>toggleFocus(item.id)} style={{ display:"flex",alignItems:"center",gap:10,marginBottom:9,cursor:"pointer" }}>
            <div style={{ width:28,height:28,borderRadius:"50%",flexShrink:0,background:item.done?"#6366f1":"transparent",border:`2px solid ${item.done?"#6366f1":"#c7d2fe"}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,transition:"all .2s" }}>{item.done?"✓":idx+1}</div>
            <span style={{ fontSize:14,fontWeight:item.done?400:700,color:item.done?C.muted:"#3730a3",textDecoration:item.done?"line-through":"none" }}>{item.text}</span>
          </div>
        ))}
      </Card>

      {dueSoon.length>0&&(
        <Card color="#ef4444" style={{ marginBottom:14,background:"linear-gradient(135deg,#fff5f5,#fee2e2)" }}>
          <SLabel color="#ef4444">📅 Due Today / Overdue</SLabel>
          {dueSoon.map(t=>(
            <div key={t.id} style={{ display:"flex",alignItems:"center",gap:10,marginBottom:8 }}>
              <div onClick={()=>toggleAdminFromToday(t.id)} style={{ width:22,height:22,borderRadius:6,flexShrink:0,cursor:"pointer",background:"transparent",border:"2px solid #fca5a5",display:"flex",alignItems:"center",justifyContent:"center" }} />
              <span style={{ flex:1,fontSize:14,fontWeight:600,color:"#991b1b" }}>{t.text}</span>
              <TimeBadge time={t.time} />
            </div>
          ))}
        </Card>
      )}

      <Card style={{ marginBottom:14 }}>
        <SLabel>Daily Habits — {habitsDone}/{HABITS.length} done{habitsSkipped>0?` · ${habitsSkipped} skipped`:""}</SLabel>
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
          {HABITS.map(h=>{
            const done=!!(log[today]?.[h.id]);
            const skipped=!done&&!!(log[today]?.[`skip_${h.id}`]);
            const streak=calcStreak(log,h.id);
            return (
              <div key={h.id} onClick={()=>!skipped&&toggleHabit(h.id)} style={{ background:done?`${h.color}18`:skipped?"#f8fafc":`${h.color}08`,border:`1.5px solid ${done?h.color:skipped?C.border:h.color+"33"}`,borderRadius:14,padding:"12px 14px",cursor:skipped?"default":"pointer",transition:"all .2s",opacity:skipped?0.5:1 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                  <span style={{ fontSize:22 }}>{h.icon}</span>
                  <div style={{ display:"flex",gap:4,alignItems:"center" }}>
                    {!done&&!skipped&&(
                      <div onClick={(e)=>skipHabit(h.id,e)} style={{ fontSize:10,color:C.muted,background:"#f1f5f9",borderRadius:10,padding:"2px 7px",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap" }}>skip</div>
                    )}
                    <div style={{ width:20,height:20,borderRadius:5,background:done?h.color:skipped?"#e2e8f6":"transparent",border:`2px solid ${done?h.color:skipped?C.border:h.color+"55"}`,display:"flex",alignItems:"center",justifyContent:"center",color:skipped?C.muted:"#fff",fontSize:11 }}>{done?"✓":skipped?"–":""}</div>
                  </div>
                </div>
                <div style={{ fontSize:13,fontWeight:700,color:done?h.color:skipped?C.muted:C.text,marginTop:6,textDecoration:done?"line-through":skipped?"line-through":"none" }}>{h.label}</div>
                {streak>0&&!skipped&&<div style={{ fontSize:10,color:h.color,marginTop:2 }}>🔥 {streak}-day streak</div>}
                {skipped&&<div style={{ fontSize:10,color:C.muted,marginTop:2 }}>Not today</div>}
              </div>
            );
          })}
        </div>
      </Card>

      <div style={{ background:"linear-gradient(135deg,#fffbeb,#fef3c7)",border:"1px solid #fcd34d",borderRadius:14,padding:"14px 16px" }}>
        <div style={{ fontSize:10,color:"#92400e",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6 }}>💬 Today's nudge</div>
        <div style={{ fontSize:13,color:"#78350f",lineHeight:1.7,fontStyle:"italic" }}>"{nudge.text}"</div>
        <div onClick={()=>{ const n={...state,nudgeIndex:state.nudgeIndex+1}; setState(n); persist(n); }} style={{ fontSize:11,color:"#b45309",marginTop:8,cursor:"pointer",fontWeight:600 }}>Next nudge →</div>
      </div>
    </div>
  );
}

// ── RIGHT NOW TAB ─────────────────────────────────────────────────────────────
function RightNowTab({ state, setState }) {
  const [activeTime,setActive]=useState(null);
  const order={"15min":0,"30min":1,"1hr":2,"2hr+":3};
  const today=todayKey();
  const intents=state.dailyIntentions||{};
  const energy=(intents[today]||{}).energy||null;
  const energyCap=energy==="low"?"15min":null;

  const buildPool=()=>{
    const pool=[];
    Object.entries(state.goalTasks).forEach(([area,tasks])=>{
      tasks.filter(t=>!t.done&&TIME_OPTIONS.includes(t.time)).forEach(t=>{
        pool.push({...t,id:`g_${t.id}`,area,sourceLabel:AREA_META[area].label,sourceColor:AREA_META[area].color,sourceIcon:AREA_META[area].icon,isGoal:true});
      });
    });
    (state.adminTasks||[]).filter(t=>!t.done&&TIME_OPTIONS.includes(t.time)).forEach(t=>{
      pool.push({...t,id:`a_${t.id}`,sourceLabel:"Life Admin",sourceColor:C.muted,sourceIcon:"📋",isAdmin:true});
    });
    return pool;
  };

  const toggleTask=(task)=>{
    if(task.isGoal){
      const realId=task.id.replace("g_","");
      const area=task.area;
      const tasks=state.goalTasks[area].map(t=>t.id===realId?{...t,done:!t.done,doneAt:t.done?null:todayKey()}:t);
      const cl=[...(state.completionLog||[])];
      if(tasks.find(t=>t.id===realId)?.done) cl.push({date:todayKey(),type:"goal",label:task.text,area});
      const allDone=tasks.every(t=>t.done);
      let newStage={...state.currentStage}; let newGoalTasks={...state.goalTasks,[area]:tasks};
      const nextStage=state.currentStage[area]+1;
      if(allDone&&GOAL_LIBRARY[area].some(t=>t.stage===nextStage)){
        const newT=GOAL_LIBRARY[area].filter(t=>t.stage===nextStage).map((t,i)=>({...t,id:`${area[0]}${nextStage}${i}`,done:false,doneAt:null}));
        newGoalTasks={...newGoalTasks,[area]:[...tasks,...newT]};
        newStage={...newStage,[area]:nextStage};
      }
      const lt={...state.lastTouched,[area]:todayKey()};
      const n={...state,goalTasks:newGoalTasks,currentStage:newStage,lastTouched:lt,completionLog:cl};
      setState(n); persist(n);
    } else {
      const realId=task.id.replace("a_","");
      const n={...state,adminTasks:state.adminTasks.map(t=>t.id===realId?{...t,done:!t.done}:t)};
      setState(n); persist(n);
    }
  };

  const pool=buildPool();
  const fits=activeTime?pool.filter(t=>(order[t.time]||0)<=(order[activeTime]||0)):[];
  const grouped={};
  if(activeTime) TIME_OPTIONS.slice(0,(order[activeTime]||0)+1).reverse().forEach(t=>{ const items=fits.filter(i=>i.time===t); if(items.length) grouped[t]=items; });

  const timeBlocks=[
    {time:"15min",emoji:"⚡",label:"15 minutes",desc:"Quick wins"},
    {time:"30min",emoji:"🕐",label:"30 minutes",desc:"Solid progress"},
    {time:"1hr",  emoji:"🎯",label:"1 hour",    desc:"Real momentum"},
    {time:"2hr+", emoji:"🚀",label:"2+ hours",  desc:"Deep work"},
  ];

  return (
    <div>
      <div style={{ fontSize:15,fontWeight:700,color:C.text,marginBottom:4 }}>How much time do you have?</div>
      <div style={{ fontSize:13,color:C.sub,marginBottom:16,lineHeight:1.5 }}>Tap a block to see tasks pulled from your goals and life admin — matched to your window, ready to check off.</div>
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20 }}>
        {timeBlocks.map(({time,emoji,label,desc})=>{
          const tc=TC[time]; const active=activeTime===time;
          const capped=energyCap&&order[time]>order[energyCap];
          return (
            <div key={time} onClick={()=>!capped&&setActive(active?null:time)} style={{ background:active?tc.bg:capped?"#f8fafc":"#fff",border:`2px solid ${active?tc.border:C.border}`,borderRadius:16,padding:"16px 14px",cursor:capped?"not-allowed":"pointer",transition:"all .2s",boxShadow:active?`0 4px 16px ${tc.border}66`:"0 1px 4px #0000000a",opacity:capped?0.4:1 }}>
              <div style={{ fontSize:28,marginBottom:6 }}>{emoji}</div>
              <div style={{ fontSize:13,fontWeight:800,color:active?tc.text:C.text }}>{label}</div>
              <div style={{ fontSize:11,color:active?tc.text:C.muted,marginTop:3 }}>{capped?"Low energy day":desc}</div>
            </div>
          );
        })}
      </div>
      {energy==="low"&&(
        <div style={{ background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#dc2626" }}>
          😔 Low energy today — showing 15-min tasks only. One small thing is enough.
        </div>
      )}
      {activeTime&&(
        Object.keys(grouped).length===0
          ? <Card><div style={{ color:C.muted,fontSize:13,textAlign:"center",padding:"16px 0" }}>No open tasks fit this window. Add some in Goals or Tasks.</div></Card>
          : Object.entries(grouped).map(([time,tasks])=>{
              const tc=TC[time];
              return (
                <div key={time} style={{ marginBottom:18 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:10 }}>
                    <span style={{ background:tc.bg,color:tc.text,border:`1.5px solid ${tc.border}`,borderRadius:8,padding:"4px 14px",fontSize:12,fontWeight:800 }}>{tc.label}</span>
                    <div style={{ flex:1,height:1,background:C.border }} />
                  </div>
                  {tasks.map(task=>{
                    const isDone=task.isGoal?state.goalTasks[task.area]?.find(t=>t.id===task.id.replace("g_",""))?.done:state.adminTasks?.find(t=>t.id===task.id.replace("a_",""))?.done;
                    return (
                      <div key={task.id} style={{ background:"#fff",borderRadius:14,marginBottom:10,border:`1.5px solid ${tc.border}`,overflow:"hidden",display:"flex",alignItems:"stretch",opacity:isDone?0.5:1,transition:"opacity .3s" }}>
                        <div style={{ flex:1,padding:"14px 16px" }}>
                          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:6 }}>
                            <span style={{ fontSize:14 }}>{task.sourceIcon}</span>
                            <span style={{ fontSize:10,fontWeight:700,color:task.sourceColor,textTransform:"uppercase",letterSpacing:1 }}>{task.sourceLabel}</span>
                          </div>
                          <div style={{ fontSize:15,fontWeight:700,color:isDone?C.muted:C.text,textDecoration:isDone?"line-through":"none",lineHeight:1.3 }}>{task.text}</div>
                          {task.why&&!isDone&&<div style={{ fontSize:12,color:C.sub,marginTop:5,fontStyle:"italic",lineHeight:1.5 }}>💡 {task.why}</div>}
                        </div>
                        <div style={{ background:isDone?"#10b98122":tc.bg,borderLeft:`1.5px solid ${isDone?"#10b981":tc.border}`,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 14px",flexShrink:0,cursor:"pointer" }} onClick={()=>!isDone&&toggleTask(task)}>
                          <span style={{ fontSize:20,color:isDone?"#10b981":tc.text }}>{isDone?"✓":"→"}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })
      )}
    </div>
  );
}

// ── Goal Task Row ─────────────────────────────────────────────────────────────
function GoalTaskRow({ t, area, meta, state, setState }) {
  const [mode,setMode]=useState("view");
  const [editText,setET]=useState(t.text);
  const [editTime,setETm]=useState(t.time);
  const [splits,setSplits]=useState(["",""]);

  const saveEdit=()=>{
    if(!editText.trim()) return;
    const tasks=state.goalTasks[area].map(x=>x.id===t.id?{...x,text:editText.trim(),time:editTime}:x);
    const n={...state,goalTasks:{...state.goalTasks,[area]:tasks}}; setState(n); persist(n); setMode("view");
  };
  const deleteTask=()=>{
    const tasks=state.goalTasks[area].filter(x=>x.id!==t.id);
    const n={...state,goalTasks:{...state.goalTasks,[area]:tasks}}; setState(n); persist(n);
  };
  const saveSplit=()=>{
    const valid=splits.filter(s=>s.trim());
    if(!valid.length) return;
    const newTasks=valid.map((s,i)=>({ id:`${t.id}_s${i}_${Date.now()}`, text:s.trim(), time:t.time, stage:t.stage, done:false, doneAt:null, why:t.why, custom:true }));
    const tasks=state.goalTasks[area].filter(x=>x.id!==t.id);
    const idx=state.goalTasks[area].findIndex(x=>x.id===t.id);
    tasks.splice(idx,0,...newTasks);
    const n={...state,goalTasks:{...state.goalTasks,[area]:tasks}}; setState(n); persist(n); setMode("view");
  };
  const toggleDone=()=>{
    const tasks=state.goalTasks[area].map(x=>x.id===t.id?{...x,done:!x.done,doneAt:x.done?null:todayKey()}:x);
    const cl=[...(state.completionLog||[])];
    if(!t.done){
      cl.push({date:todayKey(),type:"goal",label:t.text,area});
      showToast(`${meta.icon} Moved your ${meta.label} goal forward`, meta.color);
    }
    const currentStage=state.currentStage[area];
    const stageTasks=tasks.filter(x=>x.stage===currentStage);
    const allDone=stageTasks.every(x=>x.done);
    let newGoalTasks={...state.goalTasks,[area]:tasks};
    let newStage={...state.currentStage};
    const nextStage=currentStage+1;
    if(allDone&&GOAL_LIBRARY[area].some(x=>x.stage===nextStage)){
      const newT=GOAL_LIBRARY[area].filter(x=>x.stage===nextStage).map((x,i)=>({...x,id:`${area[0]}${nextStage}${i}`,done:false,doneAt:null}));
      newGoalTasks={...newGoalTasks,[area]:[...tasks,...newT]};
      newStage={...newStage,[area]:nextStage};
    }
    const lt={...state.lastTouched,[area]:todayKey()};
    const n={...state,goalTasks:newGoalTasks,currentStage:newStage,lastTouched:lt,completionLog:cl};
    setState(n); persist(n);
  };
  const tc=TC[t.time]||{bg:"#f1f5f9",text:C.sub,border:C.border,label:t.time};

  if(mode==="edit") return (
    <div style={{ background:"#f8fafc",borderRadius:12,padding:"12px 14px",marginBottom:10,border:`1.5px solid ${meta.color}55` }}>
      <div style={{ fontSize:11,color:meta.color,fontWeight:700,marginBottom:8,letterSpacing:1 }}>EDITING TASK</div>
      <textarea style={{ ...iStyle(),height:60,resize:"none",marginBottom:10 }} value={editText} onChange={e=>setET(e.target.value)} />
      <div style={{ fontSize:11,color:C.muted,marginBottom:6,fontWeight:700 }}>TIME ESTIMATE</div>
      <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:12 }}>
        {[...TIME_OPTIONS,"varies"].map(tm=>{ const stc=TC[tm]||{bg:"#f1f5f9",text:C.sub,border:C.border}; const sel=editTime===tm; return (
          <div key={tm} onClick={()=>setETm(tm)} style={{ background:sel?stc.bg:"#fff",color:sel?stc.text:C.muted,border:`2px solid ${sel?stc.border:C.border}`,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:800,cursor:"pointer" }}>{stc.label||tm}</div>
        );})}
      </div>
      <div style={{ display:"flex",gap:8 }}>
        <Btn variant="ghost" small onClick={()=>setMode("view")}>Cancel</Btn>
        <Btn small onClick={saveEdit} style={{ background:meta.color,border:"none",color:"#fff" }}>Save</Btn>
        <Btn small variant="ghost" onClick={deleteTask} style={{ color:"#ef4444",borderColor:"#ef444433",marginLeft:"auto" }}>Delete</Btn>
      </div>
    </div>
  );

  if(mode==="split") return (
    <div style={{ background:"#f8fafc",borderRadius:12,padding:"12px 14px",marginBottom:10,border:`1.5px solid ${meta.color}55` }}>
      <div style={{ fontSize:11,color:meta.color,fontWeight:700,marginBottom:4,letterSpacing:1 }}>BREAK INTO SMALLER STEPS</div>
      <div style={{ fontSize:12,color:C.muted,marginBottom:10 }}>"{t.text}" will be replaced by these steps:</div>
      {splits.map((s,i)=>(
        <input key={i} style={{ ...iStyle(),marginBottom:8 }} placeholder={`Step ${i+1}...`} value={s} onChange={e=>{ const ns=[...splits]; ns[i]=e.target.value; setSplits(ns); }} />
      ))}
      <Btn variant="ghost" small onClick={()=>setSplits([...splits,""])} style={{ marginBottom:12 }}>+ Add step</Btn>
      <div style={{ display:"flex",gap:8 }}>
        <Btn variant="ghost" small onClick={()=>setMode("view")}>Cancel</Btn>
        <Btn small onClick={saveSplit} style={{ background:meta.color,border:"none",color:"#fff" }} disabled={!splits.some(s=>s.trim())}>Split task</Btn>
      </div>
    </div>
  );

  return (
    <div style={{ display:"flex",alignItems:"stretch",background:C.surface,borderRadius:14,marginBottom:10,overflow:"hidden",border:`1.5px solid ${t.done?meta.color+"44":C.border}`,opacity:t.done?0.6:1,transition:"opacity .3s" }}>
      <div style={{ flex:1,padding:"13px 14px" }}>
        <div style={{ display:"flex",alignItems:"flex-start",gap:10 }}>
          <div onClick={toggleDone} style={{ width:24,height:24,borderRadius:7,flexShrink:0,cursor:"pointer",background:t.done?meta.color:"transparent",border:`2px solid ${t.done?meta.color:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,transition:"all .2s",marginTop:1 }}>{t.done?"✓":""}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:14,fontWeight:600,color:t.done?C.muted:C.text,textDecoration:t.done?"line-through":"none",lineHeight:1.4 }}>{t.text}</div>
            {t.why&&!t.done&&<div style={{ fontSize:11,color:C.sub,marginTop:4,fontStyle:"italic",lineHeight:1.5 }}>💡 {t.why}</div>}
            {!t.done&&(
              <div style={{ display:"flex",gap:8,marginTop:8 }}>
                <span onClick={()=>setMode("edit")} style={{ fontSize:11,color:meta.color,fontWeight:700,cursor:"pointer" }}>✏️ Edit</span>
                <span onClick={()=>setMode("split")} style={{ fontSize:11,color:meta.color,fontWeight:700,cursor:"pointer" }}>✂️ Split</span>
              </div>
            )}
          </div>
        </div>
      </div>
      <div style={{ background:t.done?meta.color+"22":tc.bg,borderLeft:`1.5px solid ${t.done?meta.color+"44":tc.border}`,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 12px",flexShrink:0 }}>
        <span style={{ color:t.done?meta.color:tc.text,fontSize:11,fontWeight:800,whiteSpace:"nowrap" }}>{tc.label||t.time}</span>
      </div>
    </div>
  );
}

// ── Add custom goal task ──────────────────────────────────────────────────────
function AddGoalTask({ area, meta, state, setState }) {
  const [open,setOpen]=useState(false);
  const [text,setText]=useState("");
  const [time,setTime]=useState("30min");
  const add=()=>{
    if(!text.trim()) return;
    const stage=state.currentStage[area];
    const newTask={ id:`custom_${area}_${Date.now()}`, text:text.trim(), time, stage, done:false, doneAt:null, why:"", custom:true };
    const tasks=[...state.goalTasks[area],newTask];
    const n={...state,goalTasks:{...state.goalTasks,[area]:tasks}}; setState(n); persist(n);
    setText(""); setTime("30min"); setOpen(false);
  };
  if(!open) return (
    <div onClick={()=>setOpen(true)} style={{ display:"flex",alignItems:"center",gap:8,padding:"10px 14px",border:`1.5px dashed ${meta.color}44`,borderRadius:12,cursor:"pointer",marginTop:4 }}>
      <span style={{ fontSize:18,color:meta.color }}>+</span>
      <span style={{ fontSize:13,color:meta.color,fontWeight:600 }}>Add a custom task to {meta.label}</span>
    </div>
  );
  return (
    <div style={{ background:"#f8fafc",borderRadius:12,padding:"12px 14px",marginTop:4,border:`1.5px solid ${meta.color}55` }}>
      <div style={{ fontSize:11,color:meta.color,fontWeight:700,marginBottom:8,letterSpacing:1 }}>NEW TASK — {meta.label.toUpperCase()}</div>
      <input style={{ ...iStyle(),marginBottom:10 }} placeholder="e.g. Check job postings on LinkedIn..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} />
      <div style={{ fontSize:11,color:C.muted,marginBottom:6,fontWeight:700 }}>TIME ESTIMATE</div>
      <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:12 }}>
        {[...TIME_OPTIONS,"varies"].map(tm=>{ const stc=TC[tm]||{bg:"#f1f5f9",text:C.sub,border:C.border}; const sel=time===tm; return (
          <div key={tm} onClick={()=>setTime(tm)} style={{ background:sel?stc.bg:"#fff",color:sel?stc.text:C.muted,border:`2px solid ${sel?stc.border:C.border}`,borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:800,cursor:"pointer" }}>{stc.label||tm}</div>
        );})}
      </div>
      <div style={{ display:"flex",gap:8 }}>
        <Btn variant="ghost" small onClick={()=>setOpen(false)}>Cancel</Btn>
        <Btn small onClick={add} style={{ background:meta.color,border:"none",color:"#fff" }} disabled={!text.trim()}>Add task</Btn>
      </div>
    </div>
  );
}

// ── GOALS TAB ─────────────────────────────────────────────────────────────────
function GoalsTab({ state, setState }) {
  const [editingNS,setEditingNS]=useState(false);
  const [nsForm,setNsForm]=useState({...state.northStar});
  const [levelUp,setLevelUp]=useState(null);
  const [showPast,setShowPast]=useState({});
  const saveNS=()=>{ const n={...state,northStar:nsForm}; setState(n); persist(n); setEditingNS(false); };

  return (
    <div>
      {editingNS?(
        <Card color="#f59e0b" style={{ marginBottom:14 }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
            <SLabel color="#f59e0b">Edit Your North Star Goals</SLabel>
            <Btn variant="ghost" small onClick={()=>setEditingNS(false)}>Cancel</Btn>
          </div>
          {Object.entries(AREA_META).map(([key,meta])=>(
            <div key={key} style={{ marginBottom:12 }}>
              <div style={{ fontSize:12,fontWeight:800,color:meta.color,marginBottom:4 }}>{meta.icon} {meta.label}</div>
              <textarea style={{ ...iStyle(),height:52,resize:"none" }} value={nsForm[key]} onChange={e=>setNsForm({...nsForm,[key]:e.target.value})} />
            </div>
          ))}
          <Btn onClick={saveNS} style={{ background:"#f59e0b",border:"none",color:"#fff" }}>Save changes</Btn>
        </Card>
      ):(
        <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:10 }}>
          <Btn variant="ghost" small onClick={()=>{ setNsForm({...state.northStar}); setEditingNS(true); }}>✏️ Edit North Star goals</Btn>
        </div>
      )}

      {levelUp&&(
        <div style={{ background:"linear-gradient(135deg,#ecfdf5,#d1fae5)",border:"1px solid #6ee7b7",borderRadius:14,padding:"14px 18px",marginBottom:16,textAlign:"center" }}>
          <div style={{ fontSize:22,marginBottom:4 }}>🎉</div>
          <div style={{ fontSize:15,fontWeight:800,color:"#065f46" }}>Stage unlocked in {AREA_META[levelUp].label}!</div>
          <div style={{ fontSize:13,color:"#047857",marginTop:4 }}>Real progress. What made this possible?</div>
        </div>
      )}

      {Object.entries(AREA_META).map(([area,meta])=>{
        const tasks=state.goalTasks[area]||[];
        const currentStage=state.currentStage[area];
        const stageTasks=tasks.filter(t=>t.stage===currentStage);
        const doneCurrent=stageTasks.filter(t=>t.done).length;
        const pastTasks=tasks.filter(t=>t.stage<currentStage);
        const ds=daysSince(state.lastTouched[area]);
        const stale=ds!==null&&ds>=5;
        const isPastOpen=showPast[area];
        return (
          <div key={area} style={{ marginBottom:20 }}>
            <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"10px 14px",background:`linear-gradient(135deg,${meta.color}18,${meta.color}08)`,borderRadius:12,border:`1px solid ${meta.color}33` }}>
              <span style={{ fontSize:22 }}>{meta.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14,fontWeight:800,color:C.text }}>{meta.label}</div>
                <div style={{ fontSize:11,color:C.sub,fontStyle:"italic",marginTop:1 }}>"{state.northStar[area]}"</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:10,fontWeight:700,color:meta.color,background:meta.color+"1a",border:`1px solid ${meta.color}33`,borderRadius:20,padding:"2px 9px" }}>
                  Stage {currentStage} · {doneCurrent}/{stageTasks.length}
                </div>
                {stale&&<div style={{ fontSize:9,color:"#ef4444",fontWeight:700,marginTop:3 }}>⚠ {ds}d ago</div>}
              </div>
            </div>
            <div style={{ height:4,background:`${meta.color}22`,borderRadius:4,overflow:"hidden",marginBottom:10,marginLeft:4,marginRight:4 }}>
              <div style={{ height:"100%",width:`${stageTasks.length?(doneCurrent/stageTasks.length)*100:0}%`,background:meta.color,borderRadius:4,transition:"width .5s" }} />
            </div>
            {stageTasks.map(t=>(
              <GoalTaskRow key={t.id} t={t} area={area} meta={meta} state={state} setState={setState} />
            ))}
            <AddGoalTask area={area} meta={meta} state={state} setState={setState} />
            {pastTasks.length>0&&(
              <div style={{ marginTop:8 }}>
                <div onClick={()=>setShowPast(p=>({...p,[area]:!isPastOpen}))} style={{ fontSize:11,color:C.muted,cursor:"pointer",fontWeight:600,padding:"4px 0" }}>
                  {isPastOpen?"▲ Hide":"▼ Show"} {pastTasks.length} completed stage task{pastTasks.length>1?"s":""}
                </div>
                {isPastOpen&&(
                  <div style={{ opacity:0.45,marginTop:6 }}>
                    {pastTasks.map(t=>(
                      <GoalTaskRow key={t.id} t={t} area={area} meta={meta} state={state} setState={setState} />
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Events Manager ────────────────────────────────────────────────────────────
function EventsSection({ state, setState }) {
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({title:"",date:"",time:"",note:""});
  const today=todayKey();
  const pruneOld=(events)=>events.filter(e=>{ const d=new Date(e.date+"T12:00:00"); return (Date.now()-d.getTime())<30*86400000; });
  const addEvent=()=>{
    if(!form.title.trim()||!form.date||!form.time) return;
    const events=pruneOld([...(state.events||[]),{...form,id:Date.now(),attended:false}]);
    const n={...state,events}; setState(n); persist(n);
    setForm({title:"",date:"",time:"",note:""}); setShowForm(false);
  };
  const startEdit=(e)=>{ setEditId(e.id); setForm({title:e.title,date:e.date,time:e.time,note:e.note||""}); setShowForm(true); };
  const saveEdit=()=>{
    if(!form.title.trim()||!form.date||!form.time) return;
    const events=(state.events||[]).map(e=>e.id===editId?{...e,...form}:e);
    const n={...state,events}; setState(n); persist(n);
    setEditId(null); setForm({title:"",date:"",time:"",note:""}); setShowForm(false);
  };
  const removeEvent=(id)=>{ const n={...state,events:(state.events||[]).filter(e=>e.id!==id)}; setState(n); persist(n); };
  const cancelForm=()=>{ setShowForm(false); setEditId(null); setForm({title:"",date:"",time:"",note:""}); };
  const formatTime=(t)=>{ if(!t) return ""; const [h,m]=t.split(":").map(Number); const ampm=h>=12?"PM":"AM"; const hr=h%12||12; return `${hr}:${m.toString().padStart(2,"0")} ${ampm}`; };
  const upcoming=(state.events||[]).filter(e=>e.date>=today).sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
  const past=(state.events||[]).filter(e=>e.date<today).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  return (
    <div style={{ marginTop:24 }}>
      <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:12 }}>
        <div style={{ fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#0284c7",fontWeight:700 }}>📆 Events</div>
        <div style={{ flex:1,height:1,background:"#e0f2fe" }} />
        {!showForm&&<Btn small onClick={()=>setShowForm(true)} style={{ background:"#0ea5e9",border:"none",color:"#fff" }}>+ Add event</Btn>}
      </div>
      {showForm&&(
        <Card color="#0ea5e9" style={{ marginBottom:14,background:"linear-gradient(135deg,#f0f9ff,#e0f2fe)" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
            <SLabel color="#0284c7">{editId?"Edit Event":"New Event"}</SLabel>
            <Btn variant="ghost" small onClick={cancelForm}>Cancel</Btn>
          </div>
          <input style={{ ...iStyle(),marginBottom:10 }} placeholder="e.g. Dentist appointment" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} />
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10 }}>
            <div>
              <div style={{ fontSize:11,color:C.muted,marginBottom:4,fontWeight:700 }}>DATE</div>
              <input type="date" style={iStyle()} value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
            </div>
            <div>
              <div style={{ fontSize:11,color:C.muted,marginBottom:4,fontWeight:700 }}>TIME</div>
              <input type="time" style={iStyle()} value={form.time} onChange={e=>setForm({...form,time:e.target.value})} />
            </div>
          </div>
          <input style={{ ...iStyle(),marginBottom:12 }} placeholder="Note — e.g. bring insurance card" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} />
          <Btn onClick={editId?saveEdit:addEvent} disabled={!form.title.trim()||!form.date||!form.time} style={{ background:"#0ea5e9",border:"none",color:"#fff",width:"100%" }}>
            {editId?"Save changes":"Add event"}
          </Btn>
        </Card>
      )}
      {upcoming.length===0&&!showForm&&(
        <div style={{ fontSize:13,color:C.muted,textAlign:"center",padding:"12px 0" }}>
          No upcoming events. Add one-off appointments, calls, or occasions and they'll appear on Today automatically.
        </div>
      )}
      {upcoming.map(e=>{
        const isToday=e.date===today;
        return (
          <div key={e.id} style={{ background:C.surface,borderRadius:14,marginBottom:10,border:`1.5px solid ${isToday?"#0ea5e9":"#e0f2fe"}`,boxShadow:isToday?"0 2px 12px #0ea5e922":"none",overflow:"hidden" }}>
            <div style={{ display:"flex",alignItems:"center",gap:12,padding:"12px 14px" }}>
              <div style={{ background:isToday?"#0ea5e9":"#e0f2fe",borderRadius:10,padding:"6px 10px",textAlign:"center",flexShrink:0,minWidth:54 }}>
                <div style={{ fontSize:10,fontWeight:800,color:isToday?"#fff":"#0369a1" }}>{isToday?"TODAY":new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                <div style={{ fontSize:13,fontWeight:900,color:isToday?"#fff":"#0284c7",marginTop:1 }}>{formatTime(e.time)}</div>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:14,fontWeight:700,color:C.text }}>{e.title}</div>
                {e.note&&<div style={{ fontSize:12,color:C.sub,marginTop:2 }}>{e.note}</div>}
              </div>
              <div style={{ display:"flex",gap:8,alignItems:"center" }}>
                <span onClick={()=>startEdit(e)} style={{ fontSize:12,color:"#0284c7",cursor:"pointer",fontWeight:600 }}>✏️</span>
                <span onClick={()=>removeEvent(e.id)} style={{ color:C.muted,cursor:"pointer",fontSize:20,lineHeight:1 }}>×</span>
              </div>
            </div>
          </div>
        );
      })}
      {past.length>0&&(
        <div style={{ marginTop:12,opacity:0.5 }}>
          <div style={{ fontSize:10,color:C.muted,letterSpacing:2,fontWeight:700,marginBottom:8 }}>PAST (auto-removed after 30 days)</div>
          {past.map(e=>(
            <div key={e.id} style={{ display:"flex",alignItems:"center",gap:10,padding:"8px 12px",marginBottom:6,background:C.surface,borderRadius:10,border:`1px solid ${C.border}` }}>
              <div style={{ fontSize:11,color:C.muted,fontWeight:700,minWidth:80 }}>{new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})} · {formatTime(e.time)}</div>
              <div style={{ flex:1,fontSize:13,color:C.muted,textDecoration:"line-through" }}>{e.title}</div>
              <span onClick={()=>removeEvent(e.id)} style={{ color:C.muted,cursor:"pointer",fontSize:16 }}>×</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── TASKS TAB ─────────────────────────────────────────────────────────────────
function TasksTab({ state, setState }) {
  const [showForm,setShowForm]=useState(false);
  const [expandedId,setExpId]=useState(null);
  const [editingId,setEditId]=useState(null);
  const [form,setForm]=useState({text:"",time:"15min",category:"personal",deadline:"",notes:""});
  const addTask=()=>{
    if(!form.text.trim()) return;
    const n={...state,adminTasks:[...state.adminTasks,{...form,id:Date.now(),done:false,created:todayKey()}]};
    setState(n); persist(n); setForm({text:"",time:"15min",category:"personal",deadline:"",notes:""}); setShowForm(false);
  };
  const toggleTask=(id)=>{ const n={...state,adminTasks:(state.adminTasks||[]).map(t=>t.id===id?{...t,done:!t.done}:t)}; setState(n); persist(n); };
  const saveEdit=(id,ch)=>{ const n={...state,adminTasks:(state.adminTasks||[]).map(t=>t.id===id?{...t,...ch}:t)}; setState(n); persist(n); setEditId(null); };
  const removeTask=(id)=>{ const n={...state,adminTasks:(state.adminTasks||[]).filter(t=>t.id!==id)}; setState(n); persist(n); };
  const sorted=[...(state.adminTasks||[])].sort((a,b)=>{ const o={"15min":0,"30min":1,"1hr":2,"2hr+":3}; return (o[a.time]||0)-(o[b.time]||0); });
  const open=sorted.filter(t=>!t.done); const done=sorted.filter(t=>t.done);

  return (
    <div>
      <div style={{ display:"flex",gap:8,flexWrap:"wrap",marginBottom:12 }}>
        {TIME_OPTIONS.map(t=>{ const tc=TC[t]; return <span key={t} style={{ background:tc.bg,color:tc.text,border:`1.5px solid ${tc.border}`,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800 }}>{tc.label}</span>; })}
        <span style={{ fontSize:11,color:C.muted }}>· tap for details</span>
      </div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
        <div style={{ fontSize:13,color:C.sub }}>{open.length} open · sorted by time needed</div>
        <Btn small onClick={()=>setShowForm(!showForm)}>{showForm?"Cancel":"+ Add task"}</Btn>
      </div>
      {showForm&&(
        <Card style={{ marginBottom:14 }}>
          <SLabel>New Task</SLabel>
          <input style={{ ...iStyle(),marginBottom:10 }} placeholder="What needs to get done?" value={form.text} onChange={e=>setForm({...form,text:e.target.value})} onKeyDown={e=>e.key==="Enter"&&addTask()} />
          <div style={{ fontSize:11,color:C.muted,marginBottom:6,fontWeight:700 }}>TIME NEEDED</div>
          <div style={{ display:"flex",gap:8,flexWrap:"wrap",marginBottom:12 }}>
            {TIME_OPTIONS.map(t=>{ const tc=TC[t]; const sel=form.time===t; return <div key={t} onClick={()=>setForm({...form,time:t})} style={{ background:sel?tc.bg:"#f8fafc",color:sel?tc.text:C.muted,border:`2px solid ${sel?tc.border:C.border}`,borderRadius:8,padding:"5px 14px",fontSize:12,fontWeight:800,cursor:"pointer" }}>{tc.label}</div>; })}
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12 }}>
            <div>
              <div style={{ fontSize:11,color:C.muted,marginBottom:4,fontWeight:700 }}>CATEGORY</div>
              <select style={iStyle()} value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATEGORY_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}</select>
            </div>
            <div>
              <div style={{ fontSize:11,color:C.muted,marginBottom:4,fontWeight:700 }}>DUE DATE</div>
              <input type="date" style={iStyle()} value={form.deadline} onChange={e=>setForm({...form,deadline:e.target.value})} />
            </div>
          </div>
          <Btn onClick={addTask} disabled={!form.text.trim()} full>Add task</Btn>
        </Card>
      )}
      {open.length===0&&!showForm&&<Card><div style={{ color:C.muted,fontSize:13,textAlign:"center",padding:"14px 0" }}>No tasks. Add appointments, calls, or paperwork you've been putting off.</div></Card>}
      {open.map(t=><AdminTaskRow key={t.id} t={t} onToggle={toggleTask} onRemove={removeTask} onSave={saveEdit} expandedId={expandedId} setExpandedId={setExpId} editingId={editingId} setEditingId={setEditId} />)}
      {done.length>0&&<>
        <div style={{ fontSize:11,color:C.muted,margin:"16px 0 8px",letterSpacing:2,fontWeight:700 }}>COMPLETED</div>
        {done.slice(0,5).map(t=>(
          <div key={t.id} onClick={()=>toggleTask(t.id)} style={{ display:"flex",alignItems:"stretch",background:C.surface,borderRadius:12,marginBottom:8,border:`1px solid ${C.border}`,opacity:0.45,cursor:"pointer",overflow:"hidden" }}>
            <div style={{ flex:1,padding:"12px 14px",display:"flex",alignItems:"center",gap:10 }}>
              <div style={{ width:22,height:22,borderRadius:6,background:"#10b981",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,flexShrink:0 }}>✓</div>
              <span style={{ fontSize:14,color:C.muted,textDecoration:"line-through" }}>{t.text}</span>
            </div>
            <div style={{ background:TC[t.time]?.bg||"#f1f5f9",borderLeft:`1px solid ${TC[t.time]?.border||C.border}`,display:"flex",alignItems:"center",padding:"0 12px",flexShrink:0 }}>
              <span style={{ color:TC[t.time]?.text||C.muted,fontSize:11,fontWeight:800 }}>{TC[t.time]?.label||t.time}</span>
            </div>
          </div>
        ))}
      </>}
      <EventsSection state={state} setState={setState} />
    </div>
  );
}

// ── Review Question ───────────────────────────────────────────────────────────

  return (
    <Card style={{ marginBottom:12 }}>
      <div style={{ fontSize:14,fontWeight:700,color:C.text,marginBottom:10,lineHeight:1.5 }}>{q.label}</div>
      <textarea style={{ ...iStyle(),height:75,resize:"none" }} placeholder="Be honest with yourself..." value={answers[q.key]} onChange={e=>setAnswers({...answers,[q.key]:e.target.value})} />
      {pastAnswers.length>0&&(
        <div style={{ marginTop:8 }}>
          <div onClick={()=>setShowPast(!showPast)} style={{ fontSize:11,color:"#6366f1",fontWeight:700,cursor:"pointer",userSelect:"none" }}>
            {showPast?"▲ Hide past answers":"▼ See what you wrote before"}
          </div>
          {showPast&&(
            <div style={{ marginTop:8,display:"flex",flexDirection:"column",gap:8 }}>
              {pastAnswers.map((p,i)=>(
                <div key={i} style={{ background:"#f8fafc",borderRadius:8,padding:"10px 12px",border:`1px solid ${C.border}` }}>
                  <div style={{ fontSize:10,color:C.muted,fontWeight:700,marginBottom:4 }}>{p.date}</div>
                  <div style={{ fontSize:13,color:C.sub,lineHeight:1.6,fontStyle:"italic" }}>"{p.text}"</div>

              ))}

      )}

  );
}
